<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CARNET · Assurance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@1,6..96,400;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════════════
   CARNET · Assurance · charte v8 canonical
   ───────────────────────────────────────────────────────────────────
   LOGIQUE DE CONSTRUCTION 3·6·9 — un organisme à deux faces, énergie
   en boucle fermée : pilote (3·UX) → moteur (6·Function) → assureur
   (9·Web3) → moteur → pilote. Rien ne stagne, tout circule.
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --encre:#1a1410; --encre-soft:#4a3d33;
  --papier:#faf6ef; --papier-soft:#f3ede1; --papier-deep:#ebe3d3; --papier-bright:#fdf9f2;
  --orange-polo:#E85A1F; --orange-soft:rgba(232,90,31,.08); --orange-line:rgba(232,90,31,.28);
  --vert-anglais:#1F4D2F; --vert-soft:rgba(31,77,47,.09); --vert-line:rgba(31,77,47,.28);
  --gris:#6b5d4f; --gris-line:rgba(26,20,16,.12); --gris-line-soft:rgba(26,20,16,.07);
  --ambre:#9a7b32; --ambre-soft:rgba(154,123,50,.10);
  --display:'Bodoni Moda','Cormorant Garamond',Georgia,serif;
  --editorial:'Cormorant Garamond','EB Garamond',Georgia,serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --s-1:3px; --s-2:5px; --s-3:8px; --s-4:13px; --s-5:21px; --s-6:34px; --s-7:55px; --s-8:89px;
  --r:2px;
}
*,*::before,*::after{box-sizing:border-box;}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
html{-webkit-text-size-adjust:100%;}
body{margin:0;background:var(--papier);color:var(--encre);font-family:var(--editorial);
  font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
::selection{background:var(--orange-soft);color:var(--encre);}
button{font:inherit;color:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent;}
input{font:inherit;color:inherit;}

/* ── App shell ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--papier);
  display:flex;flex-direction:column;position:relative;}
@media(min-width:520px){.app{border-left:1px solid var(--gris-line);border-right:1px solid var(--gris-line);}}

/* ── Header ── */
.hdr{padding:var(--s-5) var(--s-5) var(--s-4);border-bottom:1px solid var(--gris-line);
  position:sticky;top:0;background:var(--papier);z-index:20;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s-4);}
.wordmark{font-family:var(--display);font-style:italic;font-weight:500;font-size:25px;
  line-height:1;letter-spacing:-.02em;display:inline-flex;align-items:baseline;gap:6px;}
.dot{display:inline-block;width:7px;height:7px;background:var(--orange-polo);border-radius:var(--r);flex-shrink:0;}
.hdr-sub{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gris);}

/* ════ LE DASHBOARD-WIDGET — profondeur de lecture 3·6·9 ════
   replié : 3 KPI en widget visuel · déplié : les 9, vue complète */
.dashboard{margin-top:var(--s-4);}

/* ── widget replié : 3 cellules, une sparkline chacune ── */
.dash-widget{display:flex;gap:1px;background:var(--gris-line);border:1px solid var(--gris-line);
  border-radius:var(--r);overflow:hidden;}
.dash-cell{flex:1;background:var(--papier-soft);padding:var(--s-4) var(--s-3) var(--s-3);
  display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0;
  transition:background .15s;cursor:pointer;text-align:center;position:relative;}
.dash-cell:hover{background:var(--papier-bright);}
.dash-cell.accent{background:var(--orange-soft);}
.dash-cell.good{background:var(--vert-soft);}
.dash-cell-label{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);line-height:1;margin-bottom:2px;}
.dash-cell-value{font-family:var(--display);font-style:italic;font-weight:500;font-size:20px;
  line-height:1;color:var(--encre);white-space:nowrap;margin-top:2px;}
.dash-cell.accent .dash-cell-value{color:var(--orange-polo);}
.dash-cell.good .dash-cell-value{color:var(--vert-anglais);}
.dash-cell-viz{height:44px;display:flex;align-items:center;justify-content:center;width:100%;}
.dash-cell-viz svg{display:block;}

/* ── sparkline (assureur) ── */
.spark-line{fill:none;stroke:var(--encre);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.spark-line.orange{stroke:var(--orange-polo);}
.spark-line.green{stroke:var(--vert-anglais);}
.spark-area{opacity:.10;}
.spark-area.orange{fill:var(--orange-polo);}
.spark-area.green{fill:var(--vert-anglais);}
.spark-area.encre{fill:var(--encre);}
.spark-dot{r:1.9;}
.spark-dot.orange{fill:var(--orange-polo);}
.spark-dot.green{fill:var(--vert-anglais);}
.spark-dot.encre{fill:var(--encre);}

/* ── la poignée de dépliage ── */
.dash-expand{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:var(--s-2) 0;margin-top:1px;background:var(--papier-soft);
  border:1px solid var(--gris-line);border-top:none;border-radius:0 0 var(--r) var(--r);
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);transition:background .15s,color .15s;}
.dash-expand:hover{background:var(--papier-bright);color:var(--encre);}
.dash-expand svg{transition:transform .3s ease;}
.dash-expand.open svg{transform:rotate(180deg);}

/* ── vue complète dépliée : 3 blocs de 3 ── */
.dash-full{margin-top:1px;border:1px solid var(--gris-line);border-top:none;
  border-radius:0 0 var(--r) var(--r);background:var(--papier-bright);overflow:hidden;
  animation:dashopen .35s cubic-bezier(.4,0,.2,1) both;}
@keyframes dashopen{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.dash-block{border-top:1px solid var(--gris-line-soft);}
.dash-block:first-child{border-top:none;}
.dash-block-head{display:flex;align-items:baseline;gap:var(--s-3);padding:var(--s-3) var(--s-4) var(--s-2);}
.dash-block-dot{width:6px;height:6px;border-radius:var(--r);flex-shrink:0;}
.dash-block-dot.b1{background:var(--orange-polo);}
.dash-block-dot.b2{background:var(--encre);}
.dash-block-dot.b3{background:var(--vert-anglais);}
.dash-block-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);}
.dash-rows{padding:0 var(--s-4) var(--s-3);}
.dash-row{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) 0;
  border-bottom:1px solid var(--gris-line-soft);}
.dash-row:last-child{border-bottom:none;}
.dash-row-main{flex:1;min-width:0;}
.dash-row-label{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--encre);}
.dash-row-hint{font-family:var(--mono);font-size:9px;color:var(--gris);letter-spacing:.02em;margin-top:1px;}
.dash-row-viz{width:64px;height:24px;flex-shrink:0;}
.dash-row-value{font-family:var(--display);font-style:italic;font-weight:500;font-size:19px;
  color:var(--encre);white-space:nowrap;flex-shrink:0;min-width:54px;text-align:right;}
.dash-row-trend{font-family:var(--mono);font-size:9px;flex-shrink:0;min-width:34px;text-align:right;}
.dash-row-trend.up{color:var(--vert-anglais);}
.dash-row-trend.down{color:var(--orange-polo);}
.dash-row-trend.flat{color:var(--gris);}
.dash-full-foot{padding:var(--s-3) var(--s-4);border-top:1px solid var(--gris-line-soft);
  font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--gris);line-height:1.6;text-align:center;}

/* ── export data — la donnée sort, exploitable par leurs experts ── */
.dash-export{border-top:1px solid var(--gris-line-soft);padding:var(--s-3) var(--s-4) var(--s-4);}
.dash-export-head{display:flex;align-items:baseline;gap:var(--s-2);margin-bottom:var(--s-3);}
.dash-export-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);}
.dash-export-hint{font-family:var(--editorial);font-style:italic;font-size:11px;color:var(--gris);}
.dash-export-row{display:flex;gap:var(--s-2);}
.export-btn{flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  background:var(--papier-soft);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-3);cursor:pointer;transition:background .15s,border-color .15s;text-align:left;}
.export-btn:hover{background:var(--papier-bright);border-color:var(--encre);}
.export-btn-fmt{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--encre);
  display:flex;align-items:center;gap:5px;}
.export-btn-fmt svg{width:11px;height:11px;}
.export-btn-desc{font-family:var(--editorial);font-style:italic;font-size:10px;color:var(--gris);line-height:1.3;}

/* ── Mode switch ── */
.mode-switch{display:flex;background:var(--papier-bright);border:1px solid var(--gris-line);
  border-radius:var(--r);padding:3px;gap:3px;margin-top:var(--s-4);}
.mode-btn{flex:1;padding:var(--s-3);font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--gris);border-radius:var(--r);
  transition:background .2s,color .2s;text-align:center;}
.mode-btn.on{background:var(--encre);color:var(--papier);}

/* ── Layout ── */
.view{flex:1;padding:var(--s-5) var(--s-5) 130px;}
.eyebrow{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.16em;
  text-transform:uppercase;color:var(--gris);margin:0 0 var(--s-3);}
h1,h2,h3{font-family:var(--display);font-style:italic;font-weight:500;color:var(--encre);
  letter-spacing:-.01em;margin:0;}
.h-big{font-size:30px;line-height:1.12;margin-bottom:var(--s-3);}
.h-mid{font-size:22px;line-height:1.18;margin-bottom:var(--s-3);}
.lede{font-family:var(--editorial);font-style:italic;font-weight:300;font-size:17px;
  line-height:1.45;color:var(--encre-soft);margin:0 0 var(--s-5);}
.muted{color:var(--gris);}
.divider{border:none;border-top:1px solid var(--gris-line);margin:var(--s-6) 0;}
.section-gap{margin-top:var(--s-6);}

/* ── Section header — un point de couleur + un titre, rien de plus ── */
.passe-head{display:flex;align-items:center;gap:var(--s-3);margin-bottom:var(--s-5);
  padding-bottom:var(--s-4);border-bottom:1px solid var(--gris-line);}
.passe-orb{width:9px;height:9px;border-radius:var(--r);flex-shrink:0;}
.passe-orb.l3{background:var(--orange-polo);}
.passe-orb.l6{background:var(--encre);}
.passe-orb.l9{background:var(--vert-anglais);}
.passe-meta{flex:1;min-width:0;}
.passe-title{font-family:var(--display);font-style:italic;font-weight:500;font-size:20px;line-height:1.15;}

/* ── Cards ── */
.card{background:var(--papier-bright);border:1px solid var(--gris-line);
  border-radius:var(--r);padding:var(--s-5);margin-bottom:var(--s-4);}
.card-tight{padding:var(--s-4);}

/* ── Car card ── */
.car-card{background:var(--papier-bright);border:1px solid var(--gris-line);
  border-radius:var(--r);margin-bottom:var(--s-4);overflow:hidden;}
.car-card-body{padding:var(--s-5);}
.car-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s-4);}
.car-brand{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-2);}
.car-name{font-family:var(--display);font-style:italic;font-weight:500;font-size:23px;
  line-height:1.1;margin-bottom:var(--s-2);}
.car-meta{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--gris);}
.car-value{font-family:var(--display);font-style:italic;font-weight:500;font-size:19px;white-space:nowrap;}
.car-value-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);text-align:right;margin-top:2px;}

/* ── Pastille statut ── */
.pastille{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  font-weight:500;letter-spacing:.06em;padding:5px 9px;border-radius:var(--r);margin-top:var(--s-4);}
.pastille::before{content:"";width:6px;height:6px;border-radius:var(--r);flex-shrink:0;}
.pastille.repos{background:var(--vert-soft);color:var(--vert-anglais);}
.pastille.repos::before{background:var(--vert-anglais);}
.pastille.active{background:var(--orange-soft);color:var(--orange-polo);}
.pastille.active::before{background:var(--orange-polo);}
.pastille.pending{background:var(--ambre-soft);color:var(--ambre);}
.pastille.pending::before{background:var(--ambre);}
.pastille.none{background:var(--papier-soft);color:var(--gris);}
.pastille.none::before{background:var(--gris);}

.car-foot{border-top:1px solid var(--gris-line-soft);padding:var(--s-3) var(--s-5);
  display:flex;justify-content:space-between;align-items:center;background:var(--papier-soft);gap:var(--s-3);}
.car-foot-txt{font-family:var(--editorial);font-style:italic;font-size:13px;color:var(--gris);}
.mini-cta{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;color:var(--encre);display:inline-flex;align-items:center;gap:5px;
  padding:6px 0;white-space:nowrap;flex-shrink:0;}
.mini-cta:hover{color:var(--orange-polo);}

/* ── Coverage rows ── */
.cov-list{margin:var(--s-4) 0 0;}
.cov-row{display:flex;justify-content:space-between;gap:var(--s-4);padding:var(--s-3) 0;
  border-bottom:1px solid var(--gris-line-soft);}
.cov-row:last-child{border-bottom:none;}
.cov-name{font-family:var(--editorial);font-size:15px;color:var(--encre);flex-shrink:0;}
.cov-val{font-family:var(--mono);font-size:11px;color:var(--encre-soft);text-align:right;line-height:1.5;}

/* ── 6-block quote ── */
.six-block{border:1px solid var(--gris-line);border-radius:var(--r);overflow:hidden;margin-bottom:var(--s-4);}
.sb-row{display:flex;gap:var(--s-3);padding:var(--s-4);border-bottom:1px solid var(--gris-line-soft);
  background:var(--papier-bright);}
.sb-row:last-child{border-bottom:none;}
.sb-n{font-family:var(--display);font-style:italic;font-weight:500;font-size:15px;color:var(--orange-polo);
  flex-shrink:0;width:18px;}
.sb-body{flex:1;min-width:0;}
.sb-name{font-family:var(--editorial);font-style:italic;font-size:15px;color:var(--encre);}
.sb-detail{font-family:var(--mono);font-size:10px;color:var(--gris);letter-spacing:.02em;margin-top:2px;line-height:1.5;}
.sb-amount{font-family:var(--mono);font-size:11px;color:var(--encre);text-align:right;flex-shrink:0;white-space:nowrap;}

/* ── CTA ── */
.cta{display:flex;align-items:center;justify-content:center;gap:var(--s-3);width:100%;
  padding:var(--s-4) var(--s-5);font-family:var(--mono);font-size:12px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;border-radius:var(--r);
  border:1px solid var(--encre);transition:background .2s,color .2s,border-color .2s;}
.cta-primary{background:var(--encre);color:var(--papier);}
.cta-primary:hover{background:var(--orange-polo);border-color:var(--orange-polo);}
.cta-primary .dot{background:var(--orange-polo);}
.cta-primary:hover .dot{background:var(--papier);}
.cta-ghost{background:transparent;color:var(--encre);border-color:var(--gris-line);}
.cta-ghost:hover{border-color:var(--encre);}
.cta-sos{background:var(--orange-polo);color:var(--papier);border-color:var(--orange-polo);}
.cta-sos:hover{background:var(--encre);border-color:var(--encre);}
.cta:disabled{opacity:.4;cursor:not-allowed;}
.cta:disabled:hover{background:var(--encre);border-color:var(--encre);color:var(--papier);}
.cta-ghost:disabled:hover{background:transparent;color:var(--encre);border-color:var(--gris-line);}
.cta-mt{margin-top:var(--s-3);}

/* ── Stepper (wizard) ── */
.steps{display:flex;gap:var(--s-2);margin-bottom:var(--s-5);}
.step-pip{flex:1;height:2px;background:var(--gris-line);border-radius:var(--r);transition:background .3s;}
.step-pip.done{background:var(--orange-polo);}
.step-pip.on{background:var(--encre);}

/* ── Selectable rows ── */
.opt-list{display:flex;flex-direction:column;border:1px solid var(--gris-line);border-radius:var(--r);
  overflow:hidden;margin-bottom:var(--s-4);background:var(--papier-bright);}
.opt-row{display:flex;align-items:center;gap:var(--s-4);padding:var(--s-4);width:100%;text-align:left;
  border-bottom:1px solid var(--gris-line-soft);transition:background .15s;min-height:60px;}
.opt-row:last-child{border-bottom:none;}
.opt-row:hover{background:var(--papier-soft);}
.opt-row.sel{background:var(--encre);color:var(--papier);}
.opt-row.disabled{opacity:.4;cursor:not-allowed;}
.opt-row.disabled:hover{background:var(--papier-bright);}
.opt-main{flex:1;min-width:0;}
.opt-title{font-family:var(--display);font-style:italic;font-weight:500;font-size:18px;line-height:1.15;margin-bottom:2px;}
.opt-desc{font-family:var(--editorial);font-style:italic;font-size:13px;color:var(--gris);line-height:1.35;}
.opt-row.sel .opt-desc{color:var(--papier-deep);}
.opt-tick{width:16px;height:16px;color:var(--orange-polo);flex-shrink:0;opacity:0;}
.opt-row.sel .opt-tick{opacity:1;color:var(--papier);}
.opt-price{font-family:var(--mono);font-size:11px;color:var(--gris);flex-shrink:0;white-space:nowrap;}
.opt-row.sel .opt-price{color:var(--papier-deep);}

/* ── Field ── */
.field-row{display:flex;gap:var(--s-3);margin-bottom:var(--s-4);}
.field{flex:1;}
.field-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-2);display:block;}
.field input{width:100%;padding:var(--s-3) var(--s-4);background:var(--papier-bright);
  border:1px solid var(--gris-line);border-radius:var(--r);font-family:var(--mono);font-size:13px;}
.field input:focus{outline:1px solid var(--orange-polo);outline-offset:-1px;}

/* ── Composer — module rows + steppers ── */
.mod-group{margin-bottom:var(--s-5);}
.mod-group-title{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-3);display:flex;justify-content:space-between;align-items:baseline;}
.mod-list{border:1px solid var(--gris-line);border-radius:var(--r);overflow:hidden;background:var(--papier-bright);}
.mod-row{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-4);
  border-bottom:1px solid var(--gris-line-soft);transition:background .15s;}
.mod-row:last-child{border-bottom:none;}
.mod-row.on{background:var(--orange-soft);}
.mod-toggle{width:22px;height:22px;border:1px solid var(--gris-line);border-radius:var(--r);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.15s;}
.mod-row.on .mod-toggle{background:var(--encre);border-color:var(--encre);color:var(--papier);}
.mod-toggle svg{width:13px;height:13px;opacity:0;}
.mod-row.on .mod-toggle svg{opacity:1;}
.mod-body{flex:1;min-width:0;}
.mod-code{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--orange-polo);}
.mod-name{font-family:var(--display);font-style:italic;font-weight:500;font-size:16px;line-height:1.15;}
.mod-desc{font-family:var(--editorial);font-style:italic;font-size:12px;color:var(--gris);line-height:1.35;margin-top:1px;}
.mod-price{font-family:var(--mono);font-size:11px;color:var(--encre);text-align:right;flex-shrink:0;white-space:nowrap;}
.mod-price .per{color:var(--gris);font-size:9px;display:block;}
.mod-info{font-family:var(--mono);font-size:9px;color:var(--vert-anglais);background:var(--vert-soft);
  padding:3px 7px;border-radius:var(--r);flex-shrink:0;}

.stepper{display:flex;align-items:center;gap:var(--s-3);flex-shrink:0;}
.step-btn{width:26px;height:26px;border:1px solid var(--gris-line);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;
  color:var(--encre);transition:.15s;}
.step-btn:hover{border-color:var(--encre);background:var(--papier-soft);}
.step-btn:disabled{opacity:.3;cursor:not-allowed;}
.step-qty{font-family:var(--mono);font-size:13px;font-weight:500;min-width:20px;text-align:center;}

/* ── Composer total ── */
.total-card{background:var(--encre);color:var(--papier);border-radius:var(--r);
  padding:var(--s-5);margin-bottom:var(--s-4);}
.total-big{font-family:var(--display);font-style:italic;font-weight:500;font-size:38px;line-height:1;}
.total-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--papier-deep);margin-top:var(--s-2);}
.total-break{margin-top:var(--s-4);padding-top:var(--s-4);border-top:1px solid rgba(250,246,239,.18);}
.total-line{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
  color:var(--papier-deep);padding:var(--s-1) 0;}
.total-line.accent{color:var(--orange-polo);}

/* ── Bundle nudge ── */
.nudge{display:flex;gap:var(--s-3);align-items:flex-start;background:var(--vert-soft);
  border:1px solid var(--vert-line);border-radius:var(--r);padding:var(--s-4);margin-bottom:var(--s-4);}
.nudge-icon{color:var(--vert-anglais);flex-shrink:0;margin-top:2px;}
.nudge-txt{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--vert-anglais);line-height:1.4;}
.nudge-txt strong{font-weight:500;}

/* ── RFQ dispatch ── */
.rfq-live{text-align:center;padding:var(--s-6) 0 var(--s-5);}
.rfq-pulse{width:54px;height:54px;margin:0 auto var(--s-5);border-radius:50%;
  border:1px solid var(--orange-line);position:relative;}
.rfq-pulse::before,.rfq-pulse::after{content:"";position:absolute;inset:-1px;border-radius:50%;
  border:1px solid var(--orange-polo);animation:ping 1.8s cubic-bezier(0,0,.2,1) infinite;}
.rfq-pulse::after{animation-delay:.9s;}
.rfq-pulse-core{position:absolute;inset:18px;background:var(--orange-polo);border-radius:50%;}
@keyframes ping{0%{transform:scale(.85);opacity:.9;}80%,100%{transform:scale(1.9);opacity:0;}}
.rfq-status{font-family:var(--editorial);font-style:italic;font-size:16px;color:var(--encre-soft);}
.rfq-count{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--gris);margin-top:var(--s-3);line-height:1.6;}

/* ── Quote cards ── */
.quote-card{background:var(--papier-bright);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-5);margin-bottom:var(--s-3);animation:slidein .4s ease both;}
@keyframes slidein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.quote-card.chosen{border-color:var(--orange-polo);background:var(--orange-soft);}
.quote-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--s-3);}
.quote-who{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--gris);}
.quote-who.revealed{color:var(--orange-polo);font-weight:500;}
.quote-resp{font-family:var(--mono);font-size:9px;color:var(--gris);letter-spacing:.06em;}
.quote-price{font-family:var(--display);font-style:italic;font-weight:500;font-size:34px;line-height:1;margin-bottom:var(--s-1);}
.quote-price-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-4);}
.quote-restrict{font-family:var(--editorial);font-style:italic;font-size:13px;color:var(--gris);
  line-height:1.4;margin-bottom:var(--s-4);}

/* ── Confirmation ── */
.confirm-mark{width:48px;height:48px;border:1px solid var(--vert-line);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto var(--s-5);color:var(--vert-anglais);}
.kv{display:flex;justify-content:space-between;gap:var(--s-4);padding:var(--s-3) 0;
  border-bottom:1px solid var(--gris-line-soft);}
.kv:last-child{border-bottom:none;}
.kv-k{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gris);}
.kv-v{font-family:var(--editorial);font-style:italic;font-size:15px;text-align:right;}

/* ── Budget / Mon année ── */
.budget-hero{text-align:center;padding:var(--s-5) 0 var(--s-4);}
.budget-big{font-family:var(--display);font-style:italic;font-weight:500;font-size:46px;line-height:1;}
.budget-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gris);margin-top:var(--s-3);}
.compare{display:flex;gap:var(--s-3);margin:var(--s-5) 0;}
.compare-side{flex:1;text-align:center;padding:var(--s-4);border:1px solid var(--gris-line);
  border-radius:var(--r);background:var(--papier-bright);}
.compare-side.win{border-color:var(--vert-line);background:var(--vert-soft);}
.compare-amount{font-family:var(--display);font-style:italic;font-weight:500;font-size:22px;}
.compare-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);margin-top:var(--s-2);}
.save-banner{text-align:center;font-family:var(--editorial);font-style:italic;font-size:18px;
  color:var(--vert-anglais);padding:var(--s-4);background:var(--vert-soft);border:1px solid var(--vert-line);
  border-radius:var(--r);margin-bottom:var(--s-5);}
.save-banner strong{font-weight:500;}

/* ── Timeline ── */
.tl-row{display:flex;gap:var(--s-4);padding:var(--s-3) 0;align-items:flex-start;}
.tl-marker{width:9px;height:9px;border-radius:var(--r);margin-top:6px;flex-shrink:0;}
.tl-marker.balade,.tl-marker.route{background:var(--vert-anglais);}
.tl-marker.track{background:var(--orange-polo);}
.tl-marker.rally_eu,.tl-marker.rally_histo,.tl-marker.rally_transcon{background:var(--ambre);}
.tl-marker.transport,.tl-marker.import{background:var(--gris);}
.tl-body{flex:1;border-bottom:1px solid var(--gris-line-soft);padding-bottom:var(--s-3);}
.tl-title{font-family:var(--editorial);font-style:italic;font-size:15px;}
.tl-meta{font-family:var(--mono);font-size:10px;color:var(--gris);letter-spacing:.04em;margin-top:2px;}
.tl-price{font-family:var(--mono);font-size:12px;color:var(--encre);}

/* ── Track record on-chain ── */
.track-rec{background:var(--papier-soft);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-5);margin-bottom:var(--s-4);}
.tr-headline{font-family:var(--editorial);font-style:italic;font-size:16px;color:var(--encre);
  line-height:1.4;margin-bottom:var(--s-4);}
.tr-stats{display:flex;flex-wrap:wrap;gap:var(--s-4) var(--s-6);}
.tr-stat{}
.tr-num{font-family:var(--display);font-style:italic;font-weight:500;font-size:24px;line-height:1;}
.tr-num.green{color:var(--vert-anglais);}
.tr-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--gris);margin-top:3px;}
.tr-bonus{margin-top:var(--s-4);padding-top:var(--s-4);border-top:1px solid var(--gris-line-soft);
  font-family:var(--mono);font-size:11px;color:var(--vert-anglais);}

/* ── Contrat vivant ── */
.back-link{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);display:inline-flex;align-items:center;gap:6px;margin-bottom:var(--s-4);}
.back-link:hover{color:var(--encre);}
.cv-map{position:relative;height:170px;border:1px solid var(--gris-line);border-radius:var(--r);
  overflow:hidden;background:var(--papier-soft);margin-bottom:var(--s-4);}
.cv-map svg{position:absolute;inset:0;width:100%;height:100%;}
.cv-pos{position:absolute;width:12px;height:12px;background:var(--orange-polo);border-radius:50%;
  border:2px solid var(--papier);box-shadow:0 0 0 4px var(--orange-soft);}
.cv-map-tag{position:absolute;bottom:var(--s-3);left:var(--s-3);font-family:var(--mono);font-size:9px;
  letter-spacing:.06em;color:var(--encre);background:var(--papier-bright);padding:3px 7px;
  border:1px solid var(--gris-line);border-radius:var(--r);}
.countdown{display:flex;gap:var(--s-3);margin-bottom:var(--s-4);}
.cd-unit{flex:1;text-align:center;padding:var(--s-4) var(--s-2);border:1px solid var(--gris-line);
  border-radius:var(--r);background:var(--papier-bright);}
.cd-num{font-family:var(--display);font-style:italic;font-weight:500;font-size:26px;line-height:1;}
.cd-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gris);margin-top:3px;}
.live-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.08em;color:var(--orange-polo);margin-bottom:var(--s-3);}
.live-tag::before{content:"";width:7px;height:7px;background:var(--orange-polo);border-radius:50%;
  animation:blink 1.6s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── Sinistre flow ── */
.claim-step{display:flex;gap:var(--s-4);margin-bottom:var(--s-4);}
.claim-n{width:28px;height:28px;border:1px solid var(--encre);border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;}
.claim-n.done{background:var(--vert-anglais);border-color:var(--vert-anglais);color:var(--papier);}
.claim-n.on{background:var(--encre);color:var(--papier);}
.claim-body{flex:1;}
.claim-title{font-family:var(--display);font-style:italic;font-weight:500;font-size:17px;margin-bottom:var(--s-2);}
.claim-desc{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--gris);line-height:1.4;}
.photo-grid{display:flex;gap:var(--s-2);margin-top:var(--s-3);}
.photo-slot{flex:1;aspect-ratio:1;border:1px dashed var(--gris-line);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;background:var(--papier-bright);
  font-family:var(--mono);font-size:9px;color:var(--gris);text-align:center;line-height:1.3;transition:.15s;}
.photo-slot.filled{border-style:solid;border-color:var(--vert-line);background:var(--vert-soft);color:var(--vert-anglais);}

/* ── Tab bar ── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:var(--papier-bright);border-top:1px solid var(--gris-line);display:flex;z-index:30;
  padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;padding:var(--s-4) var(--s-1);text-align:center;}
.tab-pass{font-family:var(--mono);font-size:8px;letter-spacing:.08em;color:var(--gris);transition:color .2s;}
.tab-name{font-family:var(--display);font-style:italic;font-size:14px;color:var(--gris);transition:color .2s;margin-top:2px;}
.tab.on .tab-pass{color:var(--orange-polo);}
.tab.on .tab-name{color:var(--encre);}

/* ── Misc ── */
.notice{text-align:center;padding:var(--s-6) var(--s-4);font-family:var(--editorial);
  font-style:italic;font-size:15px;color:var(--gris);line-height:1.5;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--encre);
  color:var(--papier);font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  padding:var(--s-3) var(--s-5);border-radius:var(--r);z-index:50;opacity:0;transition:opacity .3s;
  max-width:90%;text-align:center;}
.toast.show{opacity:1;}
.foot-note{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--gris);
  line-height:1.7;text-align:center;padding:var(--s-6) var(--s-4) 0;}

/* ── Manifeste 3·6·9 ── */
.manifesto{margin-top:var(--s-6);padding:var(--s-5);background:var(--papier-soft);
  border:1px solid var(--gris-line);border-radius:var(--r);}
.manif-line{display:flex;gap:var(--s-3);padding:var(--s-3) 0;align-items:baseline;}
.manif-line + .manif-line{border-top:1px solid var(--gris-line-soft);}
.manif-n{font-family:var(--display);font-style:italic;font-weight:500;font-size:22px;
  color:var(--orange-polo);flex-shrink:0;width:24px;}
.manif-txt{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--encre-soft);line-height:1.4;}
.manif-txt strong{font-weight:500;color:var(--encre);font-style:normal;
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;}

/* ═══ WEB3 — emplacements prévus, dégradent proprement ═══ */
/* tout passe par web3Slot() : live=false → "à venir" sobre ;
   live=true → vrai tokenId/hash/lien. L'UI ne bouge pas, le state bascule. */
.w3-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;
  letter-spacing:.06em;padding:4px 8px;border-radius:var(--r);white-space:nowrap;}
.w3-badge::before{content:"";width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.w3-badge.pending{background:var(--papier-soft);color:var(--gris);border:1px solid var(--gris-line);}
.w3-badge.pending::before{background:var(--gris);}
.w3-badge.live{background:var(--vert-soft);color:var(--vert-anglais);border:1px solid var(--vert-line);}
.w3-badge.live::before{background:var(--vert-anglais);animation:blink 1.8s ease-in-out infinite;}

.w3-row{display:flex;justify-content:space-between;gap:var(--s-4);padding:var(--s-3) 0;
  border-bottom:1px solid var(--gris-line-soft);align-items:baseline;}
.w3-row:last-child{border-bottom:none;}
.w3-k{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gris);flex-shrink:0;}
.w3-v{font-family:var(--mono);font-size:11px;text-align:right;word-break:break-all;}
.w3-v.pending{color:var(--gris);font-style:normal;}
.w3-v a{color:var(--vert-anglais);text-decoration:none;border-bottom:1px solid var(--vert-line);}
.w3-v a:hover{color:var(--orange-polo);border-color:var(--orange-line);}

/* bloc on-chain dans une fiche (confirmation, contrat vivant) */
.w3-block{background:var(--papier-soft);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-4) var(--s-5);margin-top:var(--s-4);}
.w3-block-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--s-3);
  padding-bottom:var(--s-3);border-bottom:1px solid var(--gris-line-soft);}
.w3-block-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gris);}
.w3-note{font-family:var(--editorial);font-style:italic;font-size:12px;color:var(--gris);
  line-height:1.4;margin-top:var(--s-3);}

/* settlement RLUSD — la barre de répartition */
.settle-bar{display:flex;height:8px;border-radius:var(--r);overflow:hidden;margin:var(--s-3) 0;
  border:1px solid var(--gris-line);}
.settle-seg-partner{background:var(--encre);}
.settle-seg-asso{background:var(--orange-polo);}
.settle-legend{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--gris);}
.settle-legend .asso{color:var(--orange-polo);}

/* transfert de police — l'assurance liquide */
.transfer-card{background:var(--papier-bright);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-5);margin-bottom:var(--s-4);}
.transfer-flow{display:flex;align-items:center;gap:var(--s-3);margin:var(--s-4) 0;}
.transfer-party{flex:1;text-align:center;padding:var(--s-4) var(--s-2);border:1px solid var(--gris-line);
  border-radius:var(--r);background:var(--papier-soft);}
.transfer-party.you{border-color:var(--encre);}
.transfer-party-role{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-2);}
.transfer-party-name{font-family:var(--display);font-style:italic;font-weight:500;font-size:15px;line-height:1.1;}
.transfer-arrow{font-family:var(--mono);font-size:16px;color:var(--orange-polo);flex-shrink:0;}
.transfer-step{display:flex;gap:var(--s-3);padding:var(--s-2) 0;align-items:baseline;}
.transfer-step-n{font-family:var(--mono);font-size:10px;color:var(--orange-polo);flex-shrink:0;width:16px;}
.transfer-step-txt{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--encre-soft);line-height:1.4;}
.prorata-box{background:var(--vert-soft);border:1px solid var(--vert-line);border-radius:var(--r);
  padding:var(--s-4);margin:var(--s-4) 0;text-align:center;}
.prorata-amount{font-family:var(--display);font-style:italic;font-weight:500;font-size:26px;color:var(--vert-anglais);}
.prorata-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--vert-anglais);margin-top:var(--s-2);}

/* track record — preuves cliquables */
.tr-proof{display:flex;justify-content:space-between;align-items:center;padding:var(--s-3) 0;
  border-bottom:1px solid var(--gris-line-soft);}
.tr-proof:last-child{border-bottom:none;}
.tr-proof-label{font-family:var(--editorial);font-style:italic;font-size:14px;}
.tr-proof-link{font-family:var(--mono);font-size:10px;color:var(--vert-anglais);
  border-bottom:1px solid var(--vert-line);}
.tr-proof-link.pending{color:var(--gris);border-color:var(--gris-line);}
/* sub-nav (connected assureur) */
.sub-nav{display:flex;background:var(--papier-bright);border:1px solid var(--gris-line);
  border-radius:var(--r);padding:3px;gap:3px;margin-bottom:var(--s-5);}
.sub-btn{flex:1;padding:var(--s-3) var(--s-2);font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;color:var(--gris);border-radius:var(--r);
  transition:background .2s,color .2s;text-align:center;}
.sub-btn.on{background:var(--vert-anglais);color:var(--papier);}

/* onboarding steps */
.bo-step{display:flex;gap:var(--s-4);margin-bottom:var(--s-5);}
.bo-num{width:28px;height:28px;border:1px solid var(--encre);border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;}
.bo-num.done{background:var(--vert-anglais);border-color:var(--vert-anglais);color:var(--papier);}
.bo-body{flex:1;min-width:0;}
.bo-title{font-family:var(--display);font-style:italic;font-weight:500;font-size:18px;margin-bottom:var(--s-2);}
.bo-desc{font-family:var(--editorial);font-style:italic;font-size:14px;color:var(--gris);line-height:1.45;margin-bottom:var(--s-3);}
.bo-desc code{font-family:var(--mono);font-size:12px;background:var(--papier-soft);padding:1px 5px;
  border-radius:var(--r);font-style:normal;color:var(--encre);}
.code{font-family:var(--mono);font-size:11px;background:var(--encre);color:var(--papier);
  padding:var(--s-3) var(--s-4);border-radius:var(--r);overflow-x:auto;white-space:pre;line-height:1.6;margin-bottom:var(--s-3);}
.code .k{color:#d9a86c;} .code .s{color:#9bb38f;} .code .c{color:var(--gris);}

/* segments */

.seg-chip.on{background:var(--encre);color:var(--papier);border-color:var(--encre);}

/* RFQ inbox */

  padding:var(--s-5);margin-bottom:var(--s-4);}

.inbox-car{font-family:var(--display);font-style:italic;font-weight:500;font-size:20px;line-height:1.1;margin-bottom:var(--s-3);}

  border-radius:var(--r);margin-bottom:var(--s-3);}
.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-3) var(--s-4);margin-bottom:var(--s-4);}
.param-k{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--gris);}
.param-v{font-family:var(--editorial);font-style:italic;font-size:14px;}
.composer{border-top:1px solid var(--gris-line-soft);padding-top:var(--s-4);margin-top:var(--s-4);}
.composer-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gris);margin-bottom:var(--s-3);}

  border:1px solid var(--gris-line);border-radius:var(--r);font-family:var(--mono);font-size:13px;margin-bottom:var(--s-3);}
.composer input:focus{outline:1px solid var(--vert-anglais);outline-offset:-1px;}
.tpl-hint{font-family:var(--editorial);font-style:italic;font-size:12px;color:var(--gris);
  margin-bottom:var(--s-3);line-height:1.4;}

/* win-rate metrics */
.metric-row{display:flex;gap:var(--s-3);margin-bottom:var(--s-5);}
.metric{flex:1;text-align:center;padding:var(--s-4) var(--s-2);border:1px solid var(--gris-line);
  border-radius:var(--r);background:var(--papier-bright);}
.metric-num{font-family:var(--display);font-style:italic;font-weight:500;font-size:26px;line-height:1;}
.metric-num.green{color:var(--vert-anglais);}
.metric-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gris);margin-top:3px;}

/* pricing book */
.pb-entry{background:var(--papier-bright);border:1px solid var(--gris-line);border-radius:var(--r);
  padding:var(--s-4);margin-bottom:var(--s-3);}
.pb-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--s-3);
  padding-bottom:var(--s-3);border-bottom:1px solid var(--gris-line-soft);gap:var(--s-3);}
.pb-name{font-family:var(--display);font-style:italic;font-weight:500;font-size:16px;line-height:1.15;}
.pb-code{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--orange-polo);}
.pb-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;padding:var(--s-1) 0;}
.pb-row .who{color:var(--gris);}
.pb-stats{display:flex;gap:var(--s-5);margin-top:var(--s-3);padding-top:var(--s-3);
  border-top:1px solid var(--gris-line-soft);}
.pb-stat{font-family:var(--mono);font-size:9px;color:var(--gris);}
.pb-stat strong{font-family:var(--display);font-style:italic;font-size:15px;color:var(--encre);

/* transparency */
.transp{background:var(--papier-soft);border:1px solid var(--gris-line);border-radius:var(--r);padding:var(--s-5);}
.transp-row{display:flex;justify-content:space-between;padding:var(--s-2) 0;font-family:var(--mono);font-size:11px;gap:var(--s-3);}
.transp-row .lbl{color:var(--gris);}
.transp-row .val{text-align:right;}

/* stub (kept for safety) */
.stub{text-align:center;padding:var(--s-8) var(--s-5);}
.stub-orb{width:54px;height:54px;border-radius:50%;border:1px solid var(--vert-line);

  justify-content:center;margin:0 auto var(--s-5);font-family:var(--display);font-style:italic;
  font-weight:500;font-size:24px;}

/* ─── générateurs SVG ─────────────────────────────────────────────── */
// sparkline — série de nombres, tone, largeur/hauteur
function svgSpark(series, tone, w, h){
  w=w||58; h=h||30;
  if(!series||series.length<2) return `<svg width="${w}" height="${h}"></svg>`;
  const mn=Math.min(...series), mx=Math.max(...series), span=(mx-mn)||1;
  const pad=3;
  const pts=series.map((v,i)=>{
    const x=pad+i*((w-2*pad)/(series.length-1));
    const y=h-pad-((v-mn)/span)*(h-2*pad);
    return [x,y];
  });
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${h-pad} L${pts[0][0].toFixed(1)} ${h-pad} Z`;
  const last=pts[pts.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path class="spark-area ${tone}" d="${area}"></path>
    <path class="spark-line ${tone}" d="${line}"></path>
    <circle class="spark-dot ${tone}" cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}"></circle>
  </svg>`;
}
// tendance entre l'avant-dernier et le dernier point (ou premier/dernier)
function trendOf(series, invert){
  if(!series||series.length<2) return {dir:'flat',pct:0};
  const a=series[0], b=series[series.length-1];
  if(a===0) return {dir:b>0?'up':'flat',pct:0};
  let pct=Math.round((b-a)/Math.abs(a)*100);
  let dir = pct>1?'up':pct<-1?'down':'flat';
  if(invert && dir!=='flat') dir = dir==='up'?'down':'up'; // ex: temps de réponse ↓ = bon
  return {dir,pct};
}

/* ── Voyant de bord — couverture active ou non ──────────────────────
   Cercle lumineux style tableau de bord automobile.
   active=true → vert pulsé. active=false → gris éteint. */
function svgVoyant(active, w, h){
  w=w||58; h=h||44;
  const cx=w/2, cy=h/2;
  const color = active ? 'var(--vert-anglais)' : 'var(--gris)';
  const pulse = active ? `
      <animate attributeName="r" values="13;16;13" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="2.4s" repeatCount="indefinite"/>` : '';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    ${active ? `<circle cx="${cx}" cy="${cy}" r="13" fill="${color}" opacity="0.15">${pulse}</circle>` : ''}
    <rect x="${cx-13}" y="${cy-8}" width="26" height="16" rx="3" fill="rgba(26,20,16,.07)"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="${color}" opacity="${active?'1':'0.35'}"/>
    ${active ? `<circle cx="${cx}" cy="${cy}" r="3" fill="white" opacity="0.3"/>` : ''}
  </svg>`;
}

/* ── Deux barres — économie vs classique ─────────────────────────────
   Pas de flèche. Deux barres verticales côte à côte :
   gauche haute = prix classique, droite basse = prix CARNET.
   Le gap visuel EST l'économie. Rappelle une comparaison de conso. */
function svgBars(savePct, w, h){
  w=w||58; h=h||44;
  const labelH = 9;
  const pad = 4;
  const availH = h - pad - labelH;
  const barW = Math.round((w - pad*3) / 2);
  const classX = pad;
  const classH = availH;
  const classY = pad;
  const carnetH = Math.max(5, Math.round(availH * (1 - (savePct||0)/100)));
  const carnetX = classX + barW + pad;
  const carnetY = pad + classH - carnetH;
  const labelY = h - 1;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${classX}" y="${classY}" width="${barW}" height="${classH}" rx="2"
      fill="var(--papier-deep)" stroke="var(--gris-line)" stroke-width="0.8"/>
    <rect x="${carnetX}" y="${carnetY}" width="${barW}" height="${carnetH}" rx="2"
      fill="var(--vert-anglais)" opacity="0.9"/>
    <text x="${classX + barW/2}" y="${labelY}" text-anchor="middle"
      font-family="var(--mono)" font-size="6" fill="var(--gris)">ancien</text>
    <text x="${carnetX + barW/2}" y="${labelY}" text-anchor="middle"
      font-family="var(--mono)" font-size="6" fill="var(--vert-anglais)">CARNET</text>
  </svg>`;
}

/* ── Taille de fonte adaptative selon longueur du display ──────────────
   La cellule du widget est étroite. Texte court = grande fonte, texte
   long = fonte réduite, au-delà on tronque avec ellipsis. */
function cellFontSize(text){
  const l=(text||'').length;
  if(l<=8)  return '20px';
  if(l<=13) return '17px';
  if(l<=18) return '14px';
  return '12px';
}
function cellDisplay(text){
  const max=22;
  return (text||'').length>max ? (text||'').slice(0,max-1)+'…' : (text||'');
}

/* ── ASSUREUR — Pipeline · Économie · Compétitivité ── */
function dashDataAssureur(){
  const a=State.assureur;
  const m=a.metrics;

  // RFQ en attente : recalculé live depuis l'inbox
  const openCount = a.connected
    ? a.inbox.filter(r=>!a.quoted[r.id]&&r.status!=='bound'&&r.status!=='expired').length
    : Object.values(State.rfqs).filter(r=>r.status==='open'||r.status==='quoted').length;
  m.pipeline.kpis[0].value=openCount;
  m.pipeline.kpis[0].spark=m.pipeline.kpis[0].spark.slice(-6).concat(openCount);

  // construit un bloc d'affichage depuis un groupe de metrics
  const mkBlock=(grp,dot,title)=>({
    key:dot, title, dot,
    kpis: grp.kpis.map(k=>{
      const t=trendOf(k.spark,k.invert);
      const tone = dot==='b1'?'orange':dot==='b2'?'encre':'green';
      const disp = k.unit==='€' ? fmtEur(k.value)
        : k.unit==='%' ? k.value+'%'
        : k.unit==='s' ? k.value+'s'
        : k.unit ? k.value+k.unit
        : String(k.value);
      return {
        label:k.label, display:disp, sub:k.hint,
        tone, good: dot==='b3',
        viz: svgSpark(k.spark,tone,58,30),
        vizRow: svgSpark(k.spark,tone,64,24),
        trend:t,
        accent: k.id==='rfq_open' && k.value>0,
        onclick: a.connected
          ? (dot==='b1'?`setSubtab('inbox')`:dot==='b2'?`setSubtab('transp')`:`setSubtab('book')`)
          : ''
      };
    })
  });

  return {
    face:'assureur',
    connected:a.connected,
    blocks:[
      mkBlock(m.pipeline,'b1','Pipeline'),
      mkBlock(m.marche,'b2','Économie & marché'),
      mkBlock(m.risque,'b3','Risque & compétitivité')
    ]
  };
}

/* ─── le widget replié : 3 cellules visuelles ─────────────────────────
   on prend le 1er KPI de chaque bloc — un par dimension. */
function dashWidget(data){
  const cells=data.blocks.map(b=>{
    const k=b.kpis[0];
    const cls = [k.accent?'accent':'', k.good?'good':'', k.cta?'cta-cell':''].filter(Boolean).join(' ');
    return `<button class="dash-cell ${cls}" ${k.onclick?`onclick="${k.onclick}"`:''}>
      <div class="dash-cell-label">${k.label}</div>
      <div class="dash-cell-viz">${k.viz}</div>
      <div class="dash-cell-value" style="font-size:${cellFontSize(k.display)};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${cellDisplay(k.display)}</div>
    </button>`;
  }).join('');
  return `<div class="dash-widget">${cells}</div>`;
}

/* ─── la vue complète dépliée : 3 blocs de 3 ──────────────────────────── */
function dashFull(data){
  const blocks=data.blocks.map(b=>{
    const rows=b.kpis.map(k=>{
      const tr=k.trend;
      let trendHtml='';
      if(tr){
        const sign=tr.dir==='up'?'↑':tr.dir==='down'?'↓':'·';
        trendHtml=`<span class="dash-row-trend ${tr.dir}">${sign}${tr.pct?Math.abs(tr.pct)+'%':''}</span>`;
      }
      const viz = k.vizRow || '';
      return `<div class="dash-row">
        <div class="dash-row-main">
          <div class="dash-row-label">${k.label}</div>
          <div class="dash-row-hint">${k.sub}</div>
        </div>
        ${viz?`<div class="dash-row-viz">${viz}</div>`:''}
        <div class="dash-row-value">${k.display}</div>
        ${trendHtml}
      </div>`;
    }).join('');
    return `<div class="dash-block">
      <div class="dash-block-head">
        <span class="dash-block-dot ${b.dot}"></span>
        <span class="dash-block-title">${b.title}</span>
      </div>
      <div class="dash-rows">${rows}</div>
    </div>`;
  }).join('');
  const foot = data.face==='assureur'
    ? (data.connected
        ? 'Tendances sur 7 jours · données rafraîchies en continu'
        : 'Aperçu du marché — branchez-vous pour vos données réelles')
    : 'Votre année d\'assurance, en un coup d\'œil';
  // l'export — seulement côté assureur branché : la donnée sort, exploitable
  const exportBlock = (data.face==='assureur' && data.connected) ? dashExportBlock() : '';
  return `<div class="dash-full">${blocks}<div class="dash-full-foot">${foot}</div>${exportBlock}</div>`;
}

/* assemble le paquet analytics — la même forme que servira l'API.
   Trois sections : kpis (les 9 agrégés + historique), pricing_book
   (tous segments/assureurs, public par design), meta (contexte). */
function buildAnalyticsPayload(){
  const a=State.assureur;
  const m=a.metrics;
  const groups=[['pipeline',m.pipeline],['marche',m.marche],['risque',m.risque]];
  const kpis=[];
  groups.forEach(([gkey,grp])=>{
    grp.kpis.forEach(k=>{
      const t=trendOf(k.spark,k.invert);
      kpis.push({
        group:gkey, id:k.id, label:k.label,
        value:k.value, unit:k.unit||'',
        history_7d:k.spark.slice(),
        trend_dir:t.dir, trend_pct:t.pct,
        hint:k.hint
      });
    });
  });
  const pricing_book=a.pricingBook.map(seg=>({
    code:seg.code, segment:seg.name, profile:seg.profile,
    unit:seg.unit||'', volume:seg.volume, claims:seg.claims,
    quotes:seg.rows.map(r=>({ insurer:r[0], premium:r[1] }))
  }));
  // couche 9 — les définitions, jointes à chaque export : un actuaire
  // voit la donnée ET le calcul qui la produit, dans le même fichier.
  const d=State.kpiDefinitions;
  const definitions={
    version:d.version,
    published:d.published,
    note:d.note,
    kpis:d.defs.map(x=>({
      id:x.id, group:x.group, unit:x.unit,
      source:x.source, formula:x.formula, plain:x.plain,
      lower_is_better: !!x.invert
    }))
  };
  return {
    meta:{
      generated_at:new Date().toISOString(),
      insurer:a.name,
      segments:a.segments.slice(),
      source:'CARNET Assurance — OpenInsurance analytics',
      definitions_version:d.version,
      note:'Données agrégées. Détail nominatif jamais exposé entre assureurs (contrat §7).'
    },
    kpis,
    pricing_book,
    definitions
  };
}

/* CSV plat — une ligne par point exploitable, ouvrable tel quel dans Excel */
function analyticsToCSV(p){
  const esc=v=>{ const s=String(v==null?'':v); return /[",;\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const lines=[];
  // section meta en commentaire léger
  lines.push('# CARNET Assurance — export analytics');
  lines.push('# '+p.meta.insurer+' · '+p.meta.generated_at);
  lines.push('');
  // bloc KPI
  lines.push(['section','group','id','label','value','unit','trend_dir','trend_pct','j1','j2','j3','j4','j5','j6','j7','hint'].join(';'));
  p.kpis.forEach(k=>{
    const h=k.history_7d.concat(['','','','','','','']).slice(0,7);
    lines.push(['kpi',k.group,k.id,k.label,k.value,k.unit,k.trend_dir,k.trend_pct,...h,k.hint].map(esc).join(';'));
  });
  lines.push('');
  // bloc pricing book — une ligne par devis (segment × assureur)
  lines.push(['section','segment_code','segment','profile','unit','volume','claims','insurer','premium'].join(';'));
  p.pricing_book.forEach(seg=>{
    seg.quotes.forEach(q=>{
      lines.push(['pricing_book',seg.code,seg.segment,seg.profile,seg.unit,seg.volume,seg.claims,q.insurer,q.premium].map(esc).join(';'));
    });
  });
  // bloc définitions — le calcul de chaque KPI, dans le même fichier
  if(p.definitions){
    lines.push('');
    lines.push('# définitions KPI · version '+p.definitions.version+' · publié '+p.definitions.published);
    lines.push(['section','id','group','unit','lower_is_better','source','formula','plain'].join(';'));
    p.definitions.kpis.forEach(x=>{
      lines.push(['definition',x.id,x.group,x.unit,x.lower_is_better,x.source,x.formula,x.plain].map(esc).join(';'));
    });
  }
  return lines.join('\n');
}

/* déclenche le téléchargement côté client — Blob + lien synthétique */
function exportAnalytics(fmt){
  const p=buildAnalyticsPayload();
  let content, mime, ext;
  if(fmt==='json'){
    content=JSON.stringify(p,null,2); mime='application/json'; ext='json';
  } else {
    content=analyticsToCSV(p); mime='text/csv;charset=utf-8'; ext='csv';
  }
  const stamp=new Date().toISOString().slice(0,10);
  const fname='carnet-analytics_'+p.meta.insurer.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'_'+stamp+'.'+ext;
  try{
    const blob=new Blob([content],{type:mime});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url; link.download=fname;
    document.body.appendChild(link); link.click();
    document.body.removeChild(link);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Export '+fmt.toUpperCase()+' — '+p.kpis.length+' KPI + '+p.pricing_book.length+' segments');
  }catch(e){
    toast('Export indisponible dans cet aperçu');
  }
}

/* ─── WEB3 — les emplacements prévus, dégradation propre ────────────────
   Une seule règle : tout ce qui touchera la chaîne passe par ces helpers.
   web3.live=false → "à venir" sobre. web3.live=true → vrai tokenid + lien.
   Quand le Web3 se branche, on ne touche AUCUN écran — on remplit le state. */

// badge d'état on-chain — pending (gris) ou live (vert qui pulse)
function web3Badge(label){
  return State.web3.live
    ? `<span class="w3-badge live">${label||'ancré on-chain'}</span>`
    : `<span class="w3-badge pending">on-chain à venir</span>`;
}

// une ligne clé/valeur on-chain. ref = l'objet du state (ou null/undefined).
// field = la clé à lire dedans (tokenid, txHash…). pendingLabel = quoi
// afficher tant que ce n'est pas branché.
function web3Slot(label, ref, field, pendingLabel){
  if(State.web3.live && ref && ref[field]){
    const val=ref[field];
    const short=val.length>22 ? val.slice(0,10)+'…'+val.slice(-6) : val;
    const href=State.web3.explorerBase+'/transactions/'+val;
    return `<div class="w3-row">
      <span class="w3-k">${label}</span>
      <span class="w3-v"><a href="${href}" target="_blank" rel="noopener">${short}</a></span>
    </div>`;
  }
  return `<div class="w3-row">
    <span class="w3-k">${label}</span>
    <span class="w3-v pending">${pendingLabel||'à venir'}</span>
  </div>`;
}

// le bloc on-chain réutilisable — titre + badge + lignes
function web3Block(title, rowsHtml, note){
  return `<div class="w3-block">
    <div class="w3-block-head">
      <span class="w3-block-title">${title}</span>
      ${web3Badge()}
    </div>
    ${rowsHtml}

  </div>`;
}

/* ── PASSE 2 · Composer — le calculateur à la carte ──────────────── */
function planTotals(){
  const p=State.plan;
  let permanent=0, discountPct=0, activations=0, copilote=0;
  p.permanent.forEach(id=>{
    const m=modById(id);
    if(!m) return;
    if(m.kind==='discount') discountPct+=m.pct;
    else permanent+=m.price;
  });
  Object.entries(p.activations).forEach(([id,qty])=>{
    const m=modById(id); if(m) activations+=m.price*qty;
  });
  Object.entries(p.copilote).forEach(([id,qty])=>{
    const m=modById(id); if(m) copilote+=m.price*qty;
  });
  const grossAnnual = permanent*(1-discountPct/100);
  const subtotal = grossAnnual + activations + copilote;
  const commission = subtotal*0.071;
  const total = subtotal + commission;
  const classic = subtotal>0 ? subtotal/0.74 : 0;   // ~ -26% structurel
  return { permanent, discountPct, grossAnnual, activations, copilote, subtotal, commission, total, classic };
}
function detectBundles(){
  const p=State.plan, out=[];
  const a4=p.activations['A4']||0;
  if(a4>=3 && a4<6) out.push('Tu as 3 track days amateur — le <strong>Pack 3 track days</strong> ferait −10 % sur ces sessions.');
  if(a4>=6) out.push('6 track days ou plus — le <strong>Pack 6 track days</strong> ferait −15 %.');
  if((p.activations['A9']||0)>=1 && (p.activations['A7']||0)>=1)
    out.push('Rallye historique + concours — le <strong>Pack rallye historique annuel</strong> ferait −8 %.');
  const actCount=Object.values(p.activations).reduce((s,n)=>s+n,0);
  if(p.permanent.includes('M1') && actCount>=12)
    out.push('Base + 12 activations ou plus — le <strong>Pack collectionneur</strong> ferait −5 % sur l\'ensemble.');
  return out;
}
function togglePermanent(id){
  const p=State.plan, i=p.permanent.indexOf(id);
  if(i>=0){
    p.permanent.splice(i,1);
    // si on retire M1, M2 (qui en dépend) tombe aussi
    if(id==='M1'){ const j=p.permanent.indexOf('M2'); if(j>=0) p.permanent.splice(j,1); }
  } else {
    const m=modById(id);
    if(m && m.requires && !p.permanent.includes(m.requires)) p.permanent.push(m.requires);
    p.permanent.push(id);
  }
  renderPilote();
}
function changeActQty(id,delta){
  const p=State.plan;
  const cur=p.activations[id]||0;
  const next=Math.max(0,cur+delta);
  if(next===0) delete p.activations[id]; else p.activations[id]=next;
  renderPilote();
}
function changeCopiQty(id,delta){
  const p=State.plan;
  const cur=p.copilote[id]||0;
  const next=Math.max(0,cur+delta);
  if(next===0) delete p.copilote[id]; else p.copilote[id]=next;
  renderPilote();
}

/* ── LAYER FUNCTION (6) — le moteur. dispatchRFQ = passes 4·5·6. ── */
function dispatchRFQ(){
  const w=State.wiz, ctx=ctxById(w.ctxId);
  const rfqId='rfq_'+Date.now().toString(36);
  w.rfqId=rfqId; w.quotes=[]; w.chosen=null; w.step=3;
  setEnergy(6,true);

  const segment=ctx.seg;
  const car=carById(w.carId);
  const rfq={ id:rfqId, carId:w.carId, ctxId:w.ctxId, segment,
    dateStart:w.dateStart, dateEnd:w.dateEnd, car, ctx, createdAt:Date.now(), status:'open' };
  State.rfqs[rfqId]=rfq;
  if(State.assureur.segments.includes(segment)){
    State.assureur.inbox.unshift(rfq);
    // si l'assureur regarde son inbox, l'énergie y arrive en direct
    if(State.mode==='assureur' && State.assureur.connected) renderAssureur();
  }
  if(State.mode==='pilote') renderPilote();

  const responders=State.partners.filter(p=>p.segments.includes(segment));
  if(responders.length===0 && !State.assureur.segments.includes(segment)){
    setTimeout(()=>{ rfq.status='expired'; if(State.wiz.rfqId===rfqId){ setEnergy(6,false); renderPilote(); } },2400);
    return;
  }
  responders.forEach(p=>{
    const delay=900 + Math.random()*2600;
    setTimeout(()=>{
      if(State.wiz.rfqId!==rfqId) return;
      const jitter=0.82 + Math.random()*0.4;
      const premium=ctx.base? Math.round(ctx.base*jitter/5)*5 : 0;
      addQuote(rfqId,{ partnerId:p.id, premium, deductible: car.value>1000000?2500:1500,
        responseMs:Math.round(delay), restrictions:restrictFor(w.ctxId) });
    },delay);
  });
}
function restrictFor(ctxId){
  return {
    route:'Conduite sur route ouverte uniquement.',
    track:'Circuit homologué requis · vitesse libre sur piste uniquement.',
    rally_eu:'Itinéraire déclaré · ouvert UE + CH + UK + Norvège.',
    rally_histo:'Voiture homologuée route · provenance vérifiée incluse.',
    rally_transcon:'Devis soumis à review expert bénévole · 24–48 h.',
    import:'Carnet ATA requis · couverture route EU temporaire.',
    transport:'Couvre voiture + véhicule tracteur en convoi.'
  }[ctxId];
}
function addQuote(rfqId,q){
  const rfq=State.rfqs[rfqId];
  if(!rfq) return;
  rfq.status='quoted';
  if(State.wiz.rfqId===rfqId){
    State.wiz.quotes.push(q);
    setEnergy(6,false);
    if(State.tab==='activer' && State.mode==='pilote') renderPilote();
  }
  if(State.mode==='assureur') toast('Un devis vient d\'être déposé');
}

/* ── Transfert de police à la revente — l'assurance liquide (§6) ───────
   Quand une voiture change de main via CARNET, la couverture suit sans
   rupture : police originale 'transferred', nouvelle police prorata au
   nom de l'acheteur, remboursement vendeur des jours non utilisés.
   [Web3] tout atomique via smart contract — la voiture n'est jamais à
   découvert. L'UI est complète ; le mint atomique se branche plus tard. */
function openTransfer(carId){
  State.transfer={ open:true, carId, step:1, buyerHandle:'', accordAssureur:false };
  State.viewing=null;
  renderPilote(); window.scrollTo(0,0);
}
function closeTransfer(){
  State.transfer.open=false;
  renderPilote(); window.scrollTo(0,0);
}
function transferNext(){
  if(State.transfer.step<3){ State.transfer.step++; renderPilote(); window.scrollTo(0,0); }
}
function transferToggleAccord(){
  State.transfer.accordAssureur=!State.transfer.accordAssureur;
  renderPilote();
}
function transferSubmit(){
  const c=carById(State.transfer.carId);
  // [mock] la police passe 'transferred' — côté vrai, le Worker + le
  // smart contract font le mint atomique de la nouvelle police.
  if(c) c.insurance.status='repos';   // visuellement : la couverture s'est détachée
  toast('Transfert initié — police transférée, remboursement prorata en route');
  State.transfer.open=false;
  renderPilote(); window.scrollTo(0,0);
}
// prorata : combien de jours "au repos" restent sur l'année, remboursés au vendeur
function transferProrata(car){
  const annual=car.insurance.base_premium_annual||0;
  // mock : on suppose ~210 jours restants sur 365
  const daysLeft=210;
  return Math.round(annual*daysLeft/365);
}

function renderTransfer(){
  const t=State.transfer, c=carById(t.carId);
  const pips=[1,2,3].map(n=>{
    let cls='step-pip'; if(n<t.step) cls+=' done'; else if(n===t.step) cls+=' on';
    return `<div class="${cls}"></div>`;
  }).join('');
  const prorata=transferProrata(c);

  let body;
  if(t.step===1){
    body=`
      <div class="transfer-card">

  } else if(t.step===2){

      <div class="transfer-card">

/* PASSE 8 — l'inbox : RFQ certifiés + composer de devis 6 blocs */
function renderAssureurInbox(){
  const a=State.assureur;
  const open=a.inbox.filter(r=>!a.quoted[r.id] && r.status!=='bound' && r.status!=='expired');
  const done=a.inbox.filter(r=>a.quoted[r.id] || r.status==='bound');

  const winRate=a.stats.quotes? Math.round(a.stats.won/a.stats.quotes*100) : 0;
  const metrics=`
    <div class="metric-row">
      <div class="metric"><div class="metric-num">${a.stats.quotes}</div><div class="metric-lbl">devis · 30 j</div></div>
      <div class="metric"><div class="metric-num green">${winRate}%</div><div class="metric-lbl">win-rate</div></div>
      <div class="metric"><div class="metric-num">${a.stats.avgResponseS}s</div><div class="metric-lbl">réponse moy.</div></div>
      <div class="metric"><div class="metric-num">${a.stats.claims}</div><div class="metric-lbl">sinistres</div></div>
    </div>`;

  const openCards = open.length ? open.map(r=>{
    const car=r.car, ctx=r.ctx;
    return `
    <div class="inbox-item urgent">
      <div class="inbox-top">
        <span class="inbox-ctx">${ctx.title}</span>
        <span class="inbox-timer">réponse attendue &lt; 90 s</span>
      </div>
      <div class="inbox-car">${car.mk} ${car.mo}</div>
      <span class="cert-badge">
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2 6.2l2.6 2.6L10 3" stroke="currentColor" stroke-width="1.5"/></svg>
        paquet client certifié CARNET — zéro KYC à refaire
      </span>
      <div class="param-grid">
        <div><div class="param-k">Valeur cote NFT</div><div class="param-v">${fmtEur(car.value)}</div></div>
        <div><div class="param-k">Période</div><div class="param-v">${r.dateStart} → ${r.dateEnd}</div></div>
        <div><div class="param-k">Pilote</div><div class="param-v">FIA grade C · permis 22 ans</div></div>
        <div><div class="param-k">Sinistres 36 m</div><div class="param-v">0 · score 88/100</div></div>
      </div>
      <div class="composer">
        <div class="composer-lbl">Votre devis — couverture 6 blocs</div>
        <div class="tpl-hint">Tarif suggéré pour ce profil : prime ${ctx.base?fmtEur(Math.round(ctx.base*0.95)):'sur mesure'} ·
          franchise ${car.value>1000000?'2 500 €':'1 500 €'}. À ajuster librement.</div>
        <input type="text" inputmode="numeric" id="prem-${r.id}" placeholder="Prime € — ex. ${ctx.base||250}">
        <input type="text" inputmode="numeric" id="ded-${r.id}" placeholder="Franchise € — ex. 1500">
        <button class="cta cta-primary" onclick="sendQuoteAsAssureur('${r.id}')">
          Valider le devis <span class="dot"></span></button>
      </div>
    </div>`;
  }).join('') : `<div class="notice">Aucune demande en attente.<br>Les demandes de vos segments arrivent ici en temps réel —
    elles vous attendent dès qu'un conducteur active une sortie.</div>`;

  const doneCards = done.length ? `
    <div class="eyebrow section-gap">Devis transmis</div>
    ${done.map(r=>{
      const bound=r.status==='bound';
      return `
      <div class="inbox-item">
        <div class="inbox-top">
          <span class="inbox-ctx" style="color:var(--gris)">${r.ctx.title}</span>
          <span class="inbox-timer">${bound?'retenu par le conducteur ✓':'en attente du choix du conducteur'}</span>
        </div>
        <div class="inbox-car" style="font-size:17px">${r.car.mk} ${r.car.mo}</div>
      </div>`;
    }).join('')}` : '';

  return `
    ${passeHead(9,'Demandes de devis')}
    <h1 class="h-big">Bonjour, ${a.name}.</h1>
    <p class="lede">Les demandes arrivent certifiées — conducteur et véhicule sont déjà vérifiés.
      Vous répondez à l'aveugle : le conducteur compare sans voir les noms, choisit, puis
      votre identité se révèle. Être souvent retenu, c'est le signal qui compte.</p>
    ${metrics}
    <div class="eyebrow">RFQ en attente · ${open.length}</div>
    ${openCards}
    ${doneCards}
    <div class="foot-note">
      Anti-collusion structurel : alignement systématique de prix → alerte régulateur EU (DG FISMA / ACPR).<br>
      Le pricing book mensuel rend tout écart visible.
    </div>`;
}

/* l'assureur scelle un devis → il voyage vers le wizard du pilote */
function sendQuoteAsAssureur(rfqId){
  const rfq=State.rfqs[rfqId];
  if(!rfq){ toast('RFQ introuvable'); return; }
  const premEl=document.getElementById('prem-'+rfqId);
  const dedEl=document.getElementById('ded-'+rfqId);
  const premium=premEl? parseInt(premEl.value,10)||0 : 0;
  const deductible=dedEl? parseInt(dedEl.value,10)||1500 : 1500;
  if(premium<=0){ toast('Renseignez une prime avant de valider'); return; }

  State.assureur.quoted[rfqId]=true;
  State.assureur.stats.quotes++;
  setEnergy(6,true);

  /* le devis revient sur le canal partagé — passe 8 → 6 → 3 */
  const quote={ partnerId:'self', premium, deductible,
    responseMs:Math.round(2000+Math.random()*1500),
    restrictions:restrictFor(rfq.ctxId) };
  if(State.wiz.rfqId===rfqId){
    State.wiz.quotes.push(quote);
  }
  rfq.status='quoted';
  toast('Devis transmis — il part vers le conducteur');

  setTimeout(()=>{ if(State.mode==='assureur'){ setEnergy(9,false); } },1400);
  renderAssureur();
}

/* PASSE 9 — Open Pricing Book : la transparence radicale, publiée */
function renderPricingBook(){
  const month=new Intl.DateTimeFormat('fr-FR',{month:'long',year:'numeric'}).format(new Date());
  const entries=State.assureur.pricingBook.map(e=>{
    const vals=e.rows.map(r=>r[1]);
    const min=Math.min(...vals), max=Math.max(...vals);
    const med=vals.slice().sort((a,b)=>a-b)[Math.floor(vals.length/2)];
    const rows=e.rows.map(([who,price])=>`
      <div class="pb-row"><span class="who">${who}</span><span>${fmtEur(price)}${e.unit}</span></div>
    `).join('');
    return `
    <div class="pb-entry">
      <div class="pb-head">
        <div>
          <div class="pb-code">${e.code}</div>
          <div class="pb-name">${e.name}</div>
        </div>
        <div class="param-v muted" style="text-align:right;font-size:12px">${e.profile}</div>
      </div>
      ${rows}
      <div class="pb-stats">
        <div class="pb-stat"><strong>${fmtEur(min)}</strong>min</div>
        <div class="pb-stat"><strong>${fmtEur(med)}</strong>médian</div>
        <div class="pb-stat"><strong>${fmtEur(max)}</strong>max</div>
        <div class="pb-stat"><strong>${e.volume}</strong>volume CARNET</div>
        <div class="pb-stat"><strong>${e.claims}</strong>sinistre${e.claims>1?'s':''}</div>
      </div>
    </div>`;
  }).join('');

  return `
    ${passeHead(9,'Open Pricing Book')}
    <h1 class="h-big">Le livre des prix, ouvert.</h1>
    <p class="lede">Chaque mois, CARNET publie les tarifs réels par module, par profil, par assureur.
      Aucun courtier classique ne le fait. C'est le principe d'OpenStreetMap appliqué au prix :
      une référence commune que tout le monde finit par consulter.</p>
    <div class="eyebrow">Pricing Book CARNET · ${month}</div>
    ${entries}
    <div class="card card-tight">
      <div class="tpl-hint" style="margin:0">
        Pour vous : un écart visible pousse au prix juste — la clarté remplace la boîte noire.
        Pour le conducteur : il comprend les vraies réalités économiques. Pour le régulateur :
        une référence lisible. La transparence entretient une concurrence saine.
      </div>
    </div>
    <div class="foot-note">
      Publié en commit signé · github.com/carnet-asso/pricing-book<br>
      Audit ouvert — journalistes, régulateurs, fédérations.
    </div>`;
}
