  const icon = opts.icon || (tone === 'danger' ? '!' : tone === 'warning' ? '?' : tone === 'success' ? '\u2713' : '·');
  const tag = (opts.tag || (tone === 'danger' ? 'attention' : tone === 'warning' ? 'à vérifier' : 'confirmation')).toUpperCase();
  const confirmLabel = opts.confirmLabel || 'Confirmer';

      <h2 class="confirm-title">${esc(opts.title || 'Confirmer')}</h2>
      ${opts.message ? `<p class="confirm-message">${esc(opts.message)}</p>` : ''}
      ${opts.detail ? `<div class="confirm-detail">${esc(opts.detail)}</div>` : ''}
    </div>
    <div class="sheet-actions sheet-actions-detail">
      <div class="sheet-actions-row">
        <button class="sheet-btn ghost half" data-action="cancelConfirm">${esc(cancelLabel)}</button>
        <button class="${confirmCls}" data-action="executeConfirm">${esc(confirmLabel)}</button>
      </div>
    </div>
  `;
}

function showToastFloat(message, duration){
  duration = duration || 2400;
  const existing = document.getElementById('carnet-toast-float');
  if(existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'carnet-toast-float';
  toast.className = 'carnet-toast-float';
  toast.textContent = message;
  document.body.appendChild(toast);
  // Force reflow + animation
  requestAnimationFrame(() => {
    requestAnimationFrame(() => toast.classList.add('visible'));
  });
  setTimeout(() => {
    toast.classList.remove('visible');
    setTimeout(() => { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 280);
  }, duration);
}

function compressImageForGarage(file, maxDim, quality){
  maxDim = maxDim || 1200;
  quality = quality || 0.85;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round((h / w) * maxDim); w = maxDim; }
          else { w = Math.round((w / h) * maxDim); h = maxDim; }
        }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch(err){ reject(err); }
      };
      img.onerror = () => reject(new Error('Image non lisible'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Lecture fichier impossible'));
    reader.readAsDataURL(file);
  });
}

window.garagePhotoInputChange = async function(e){
  const files = Array.from((e.target && e.target.files) || []);
  if(files.length === 0) return;
  if(!Array.isArray(GarageFormState.photos)) GarageFormState.photos = [];
  // Limit total à 8 photos
  const MAX_PHOTOS = 8;
  for(const file of files){
    if(GarageFormState.photos.length >= MAX_PHOTOS){
      const errBox = document.getElementById('garage-form-error');
      if(errBox){
        errBox.textContent = `Maximum ${MAX_PHOTOS} photos par voiture pour l\u2019ajout initial. Tu pourras en ajouter plus depuis la fiche.`;
        errBox.style.display = 'block';
      }
      break;
    }
    if(!file.type || !file.type.startsWith('image/')) continue;
    try {
      const dataUrl = await compressImageForGarage(file, 1200, 0.85);
      GarageFormState.photos.push({
        id: 'gp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
        dataUrl: dataUrl,
        addedAt: Date.now()
      });
    } catch(err){
      console.error('[garage photo upload]', err);
    }
  }
  if(e.target) e.target.value = ''; // reset input pour re-upload même fichier possible
  updateGaragePhotosPreview();
};

function getAgeFactorsUCurve(age, tier){
  const p = U_CURVE_PROFILES[tier] || U_CURVE_PROFILES['medium'];
  let factorLow, factorHigh;
  if(age <= 3){
    // Phase neuve : pleine valeur
    factorLow = 1; factorHigh = 1;
  } else if(age <= 10){
    // Décote rapide : la high décote un poil moins vite
    factorLow = Math.pow(p.newDecay, age - 3);
    factorHigh = Math.pow(p.newDecay + 0.015, age - 3);
  } else if(age <= 18){
    // Vers le bottom (interpolation linéaire)
    const t = (age - 10) / 8;  // 0 à 1
    const startLow = Math.pow(p.newDecay, 7);
    const startHigh = Math.pow(p.newDecay + 0.015, 7);
    factorLow = startLow + (p.bottomLow - startLow) * t;
    factorHigh = startHigh + (p.bottomHigh - startHigh) * t;
  } else if(age <= 25){
    // Plateau bottom : valeur la plus basse
    factorLow = p.bottomLow;
    factorHigh = p.bottomHigh;
  } else if(age <= 35){
    // Remontée vers vintage (interpolation)
    const t = (age - 25) / 10;
    factorLow = p.bottomLow + (p.vintageLow - p.bottomLow) * t;
    factorHigh = p.bottomHigh + (p.vintageHigh - p.bottomHigh) * t;
  } else if(age <= 50){
    // Plateau vintage
    factorLow = p.vintageLow;
    factorHigh = p.vintageHigh;
  } else if(age <= 80){
    // Transition vers oldtimer
    const t = (age - 50) / 30;
    factorLow = p.vintageLow + (p.oldtimerLow - p.vintageLow) * t;
    factorHigh = p.vintageHigh + (p.oldtimerHigh - p.vintageHigh) * t;
  } else {
    // Oldtimer rare
    factorLow = p.oldtimerLow;
    factorHigh = p.oldtimerHigh;
  }
  return { factorLow, factorHigh };
}

function estimateCoteRange(brand, model, year, km, finish, tunerName, tunerCategories, serviceUpToDate, fullServiceHistory, hasLeather){
  if(!brand || !brand.trim()) return null;
  const cleanBrand = brand.trim();
  const cleanModel = (model || '').trim();
  // Étape 1 : Modèle iconique (valeur collector marché)
  const iconicKey = cleanBrand + '/' + cleanModel;
  if(ICONIC_VALUATIONS[iconicKey]){
    const [iLow, iHigh] = ICONIC_VALUATIONS[iconicKey];
    let factor = 1;
    if(km && km > 0){
      if(km < 5000) factor = 1.08;
      else if(km < 20000) factor = 1.02;
      else if(km < 50000) factor = 0.98;
      else if(km < 100000) factor = 0.90;
      else factor = 0.75;
    }
    // Boost finition + tuner même sur iconiques
    let finalLow = iLow * factor;
    let finalHigh = iHigh * factor;
    if(finish && typeof FINISH_BOOST !== 'undefined' && FINISH_BOOST[finish]){
      const fb = FINISH_BOOST[finish];
      finalLow *= fb; finalHigh *= fb;
    }
    if(tunerName && typeof getTunerBoost === 'function'){
      const tb = getTunerBoost(tunerName, tunerCategories);
      finalLow *= tb; finalHigh *= tb;
    }
    // Condition bonus (entretien + carnet + cuir) — léger même sur iconiques
    if(serviceUpToDate){ finalLow *= 1.05; finalHigh *= 1.05; }
    if(fullServiceHistory){ finalLow *= 1.04; finalHigh *= 1.04; }
    if(hasLeather){ finalLow *= 1.03; finalHigh *= 1.03; }
    return {
      low: Math.round(finalLow),
      high: Math.round(finalHigh),
      confidence: 'high',
      iconic: true,
      missing: []
    };
  }
  // Étape 2 : Modèle référencé (prix neuf typique) → applique la courbe d'âge
  let baseSource = 'brand';
  let baseRange;
  if(typeof MODEL_PRICE_OVERRIDE !== 'undefined' && MODEL_PRICE_OVERRIDE[iconicKey]){
    baseRange = MODEL_PRICE_OVERRIDE[iconicKey];
    baseSource = 'model';
  }
  // Fallback : fourchette marque + modulation âge/km
  const base = baseRange || BRAND_BASE_RANGE[cleanBrand] || [15000, 50000];
  let [low, high] = base;
  if(year){
    const yearNum = parseInt(year, 10);
    if(!isNaN(yearNum)){
      const age = new Date().getFullYear() - yearNum;
      // Courbe en U : décote vers 18-25 ans, puis remontée selon tier collector
      const tier = getCollectorTier(cleanBrand);
      const { factorLow, factorHigh } = getAgeFactorsUCurve(age, tier);
      low = Math.round(low * factorLow);
      high = Math.round(high * factorHigh);
    }
  }
  if(km && km > 0){
    let kmFactorLow = 1, kmFactorHigh = 1;
    if(km < 5000){ kmFactorLow = 1.18; kmFactorHigh = 1.30; }   // delivery miles / zéro km
    else if(km < 15000){ kmFactorLow = 1.08; kmFactorHigh = 1.18; }
    else if(km < 40000){ kmFactorLow = 1.02; kmFactorHigh = 1.08; }
    else if(km < 90000){ kmFactorLow = 0.96; kmFactorHigh = 1.00; }
    else if(km < 160000){ kmFactorLow = 0.88; kmFactorHigh = 0.94; }
    else if(km < 250000){ kmFactorLow = 0.75; kmFactorHigh = 0.85; }
    else { kmFactorLow = 0.60; kmFactorHigh = 0.75; }
    low = Math.round(low * kmFactorLow);
    high = Math.round(high * kmFactorHigh);
  }
  // Floor : on ne descend jamais en dessous d'un seuil minimum digne (valorisation)
  const baseLow = base[0];
  if(low < baseLow * 0.35) low = Math.round(baseLow * 0.35);
  // Boost finition (pack/trim) si reconnu
  if(finish && typeof FINISH_BOOST !== 'undefined' && FINISH_BOOST[finish]){
    const fb = FINISH_BOOST[finish];
    low = Math.round(low * fb);
    high = Math.round(high * fb);
  }
  // Boost préparation tuner
  if(tunerName && typeof getTunerBoost === 'function'){
    const tb = getTunerBoost(tunerName, tunerCategories);
    low = Math.round(low * tb);
    high = Math.round(high * tb);
  }
  // Bonus condition : entretien (+5%) + carnet complet (+4%) + cuir (+3%)
  if(serviceUpToDate){ low = Math.round(low * 1.05); high = Math.round(high * 1.05); }
  if(fullServiceHistory){ low = Math.round(low * 1.04); high = Math.round(high * 1.04); }
  if(hasLeather){ low = Math.round(low * 1.03); high = Math.round(high * 1.03); }
  // Confidence selon completion
  const missing = [];
  if(!cleanModel) missing.push('le modèle');
  if(!year) missing.push("l'année");
  if(!km && km !== 0) missing.push('le kilométrage');
  let confidence;
  if(missing.length === 0) confidence = 'medium';
  else if(missing.length === 1) confidence = 'low';
  else confidence = 'very-low';
  return {low, high, confidence, iconic: false, missing};
}

function renderCoteEstimateBlock(){
  const f = GarageFormState;
  const est = estimateCoteRange(f.brand, f.model, f.year, parseInt(f.km, 10) || 0, f.finish, f.tunerName, f.tunerCategories, f.serviceUpToDate, f.fullServiceHistory, f.hasLeather);
  if(!est) return '';
  const fmtNum = (n) => {
    if(n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace('.', ',') + ' M\u202f\u20ac';
    if(n >= 1000) return Math.round(n / 1000) + ' k\u202f\u20ac';
    return n + ' \u20ac';
  };
  // Calcul de l'âge pour adapter le hint
  let age = null;
  if(f.year){
    const yn = parseInt(f.year, 10);
    if(!isNaN(yn)) age = new Date().getFullYear() - yn;
  }
  const tier = getCollectorTier(f.brand);
  let confLabel = '';
  let hint = '';
  if(est.iconic){
    confLabel = 'modèle iconique';
    hint = est.missing && est.missing.length > 0
      ? `Renseigne ${est.missing.join(' et ')} pour affiner.`
      : 'Valeur établie sur le marché collector.';
  } else if(est.confidence === 'medium'){
    confLabel = 'estimation calibrée';
    // Hint adapté à la phase de la courbe
    if(age !== null){
      if(age <= 10){
        hint = 'Décote rapide sur les premières années. Une préparation tuner peut compenser sensiblement.';
      } else if(age >= 18 && age <= 25){
        hint = (tier === 'very-high' || tier === 'high')
          ? 'Période creuse de la cote — c\u2019est le moment d\u2019acheter avant la remontée collector.'
          : 'Phase basse de la cote. Une rareté ou un état exceptionnel change la donne.';
      } else if(age >= 26 && age <= 35){
        hint = (tier === 'very-high' || tier === 'high')
          ? 'Voiture qui entre en phase collector. La cote remonte si la voiture est bien suivie.'
          : 'Voiture mature. Selon l\u2019état et la rareté, la cote peut commencer à remonter.';
      } else if(age >= 36 && age <= 50){
        hint = (tier === 'very-high' || tier === 'high')
          ? 'Pleine valeur collector. État, provenance et matching numbers font toute la différence.'
          : 'Vintage. La cote dépend beaucoup du modèle et de son état.';
      } else if(age > 50){
        hint = 'Oldtimer. Les belles pièces de cette époque s\u2019échangent bien au-dessus du marché de masse.';
      } else {
        hint = 'Si modifiée par un tuner ou une rareté de configuration, la cote peut varier sensiblement.';
      }
    } else {
      hint = 'Si modifiée par un tuner ou une rareté de configuration, la cote peut varier sensiblement.';
    }
  } else if(est.confidence === 'low'){
    confLabel = 'approximative';
    hint = `Renseigne ${est.missing.join(' et ')} pour affiner.`;
  } else {
    confLabel = 'très approximative';
    hint = `Renseigne ${est.missing.join(', ')} pour affiner.`;
  }
  // Médiane au juste milieu de la fourchette (plus prudent)
  const median = Math.round(est.low * 0.5 + est.high * 0.5);
  return `
    <div class="cote-estimate-block confidence-${est.confidence}">
      <div class="cote-estimate-header">
        <span class="cote-estimate-label">FOURCHETTE CARNET</span>
        <span class="cote-estimate-conf">${esc(confLabel)}</span>
      </div>
      <div class="cote-estimate-range-prominent">${esc(fmtNum(est.low))} \u2014 ${esc(fmtNum(est.high))}</div>
      <div class="cote-estimate-median-line">médiane indicative · ${esc(fmtNum(median))}</div>
      <div class="cote-estimate-hint">${esc(hint)}</div>
    </div>
  `;
}

function searchBrands(query){
  if(!query) return [];
  const q = String(query).toLowerCase().trim();
  if(q.length === 0) return [];
  // Étape 1 : aliases exacts (raccourcis multi-suggestion)
  const aliasMatches = BRAND_SEARCH_ALIASES[q] || [];
  // Étape 2 : recherche standard startsWith puis includes
  const startsWith = [];
  const includes = [];
  const seen = new Set(aliasMatches);
  for(const b of BRANDS_REFERENTIAL){
    if(seen.has(b)) continue;
    seen.add(b);
    const bl = b.toLowerCase();
    if(bl.startsWith(q)) startsWith.push(b);
    else if(bl.indexOf(q) !== -1) includes.push(b);
  }
  return [...aliasMatches, ...startsWith, ...includes];
}

function searchModels(brand, query){
  if(!brand) return [];
  // Aliases : raccourcis qui résolvent vers la marque complète
  const BRAND_ALIASES = {
    'mercedes': 'Mercedes-Benz',
    'mb': 'Mercedes-Benz',
    'amg': 'Mercedes-AMG',
    'land': 'Land Rover',
    'rover': 'Range Rover',
    'rolls': 'Rolls-Royce'
    // 'rr' retiré : ambigu (Range Rover ou Rolls-Royce)
  };
  let resolvedBrand = brand;
  const lowerBrand = String(brand).toLowerCase().trim();
  if(BRAND_ALIASES[lowerBrand]) resolvedBrand = BRAND_ALIASES[lowerBrand];
  let models = MODELS_BY_BRAND[resolvedBrand] || MODELS_BY_BRAND[(resolvedBrand || '').trim()] || [];
  if(!models || models.length === 0 || models === null){
    // Tenter recherche insensible à la casse
    for(const key in MODELS_BY_BRAND){
      if(key.toLowerCase() === lowerBrand && MODELS_BY_BRAND[key]){
        return searchModels(key, query);
      }
    }
    return [];
  }
  if(!Array.isArray(models)) return [];
  if(!query) return models.slice(0, 12); // dropdown initial sans query : afficher top 12
  const q = String(query).toLowerCase().trim();
  if(q.length === 0) return models.slice(0, 12);
  const startsWith = [];
  const includes = [];
  for(const m of models){
    const ml = m.toLowerCase();
    if(ml.startsWith(q)) startsWith.push(m);
    else if(ml.indexOf(q) !== -1) includes.push(m);
  }
  return [...startsWith, ...includes];
}

function checkSaleTransitions(){
  const garage = State.garage || [];
  const transitions = [];
  const now = Date.now();
  garage.forEach((car, idx) => {
    if(car.saleStatus === 'listing' && car.saleData && car.saleData.expiresAt < now){
      // Transition automatique annonce → enchère 14 jours
      const oldData = car.saleData;
      const askingPrice = oldData.askingPrice || car.cote || 0;
      car.saleStatus = 'auction';
      car.saleData = {
        mode: 'auction',
        startedAt: now,
        expiresAt: now + 14 * 86400000,
        estimateLow: Math.round(askingPrice * 0.85),
        estimateHigh: Math.round(askingPrice * 1.15),
        reservePrice: Math.round(askingPrice * 0.90),
        durationDays: 14,
        narrative: oldData.narrative || '',
        currentBid: 0,
        bidCount: 0,
        // Lignée
        transitionedFromListing: true,
        originalListingStartedAt: oldData.startedAt,
        originalAskingPrice: askingPrice
      };
      transitions.push(car);
    }
  });
  if(transitions.length > 0){
    safePersistGarage();
  }
  return transitions;
}

function announceTransitions(transitions){
  if(!transitions || transitions.length === 0) return;
  setTimeout(() => {
    if(transitions.length === 1){
      const c = transitions[0];
      showToastFloat(`Annonce expirée pour « ${c.brand} ${c.model} » \u00b7 transition automatique en enchère 14 jours.`);
    } else {
      showToastFloat(`${transitions.length} annonces expirées \u00b7 transition en enchère effectuée.`);
    }
  }, 800); // léger délai pour ne pas overlap avec l'init
}

    if(!BuilderState.draft.filters) BuilderState.draft.filters = { budget: null, km: null, yearRange: null, options: [] };
    const opts = BuilderState.draft.filters.options || [];
    const idx = opts.indexOf(id);
    if(idx === -1) opts.push(id); else opts.splice(idx, 1);
    BuilderState.draft.filters.options = opts;
    this.render();
  },
  toggleReceptionChannel(id){
    if(!BuilderState.draft.reception) BuilderState.draft.reception = { channels: [], frequency: null, hours: null };
    const ch = BuilderState.draft.reception.channels || [];
    const idx = ch.indexOf(id);
    if(idx === -1) ch.push(id); else ch.splice(idx, 1);
    BuilderState.draft.reception.channels = ch;
    this.render();
  },
  setReceptionFrequency(id){
    if(!BuilderState.draft.reception) BuilderState.draft.reception = { channels: [], frequency: null, hours: null };
    BuilderState.draft.reception.frequency = id;
    this.render();
  },
  setReceptionHours(id){
    if(!BuilderState.draft.reception) BuilderState.draft.reception = { channels: [], frequency: null, hours: null };
    BuilderState.draft.reception.hours = id;
    this.render();
  },
  create(){
    const d = BuilderState.draft;
    const n = calcBuilderMatches();
    const t = TYPES.find(x => x.id === d.type);
    // Build rule (concise headline) + meta (details), mirroring the existing alert format
    let rule;
    if(d.type === 'modele'){
      const m = MODELS.find(x => x.id === d.modelId);
      rule = m ? (m.brand + ' ' + m.model) : 'Modèle';
    } else if(d.type === 'criteres'){
      const preset = PRESETS.find(p => p.id === d.presetUsed);
      const posture = POSTURES.find(p => p.id === d.posture);
      rule = preset ? preset.title : (posture ? posture.label : 'Critères personnalisés');
    } else if(d.type === 'rarete'){
      const r = d.rarity || {};
      if(r.production){
        const p = RARITY_PRODUCTION.find(x => x.id === r.production);
        rule = p ? 'Production ' + p.label.toLowerCase() : 'Rareté';
      } else if(r.circulation){
        const c = RARITY_CIRCULATION.find(x => x.id === r.circulation);
        rule = c ? 'Circulation ' + c.label.toLowerCase() : 'Rareté';
      } else {
        rule = 'Configurations atypiques';
      }
    } else if(d.type === 'signal'){
      const flags = (d.signal && d.signal.flags) || [];
      if(flags.length === 1){
        const f = SIGNAL_FLAGS.find(x => x.id === flags[0]);
        rule = f ? f.label : 'Signal';
      } else {
        rule = flags.length + ' signaux suivis';
      }
    } else if(d.type === 'ecr'){
      const e = d.ecr || {};
      if(e.tier){
        const tier = ECR_TIERS.find(x => x.id === e.tier);
        rule = tier ? 'Référencée ECR ' + tier.label.split('—')[0].trim() : 'Référencée ECR';
      } else {
        rule = 'Référencée ECR';
      }
    } else {
      rule = t ? t.label : 'Alerte';
    }
    // Meta line — combine filters and reception (kept short)
    const filterMeta = getFiltersSummary(d);
    const metaParts = [];
    if(filterMeta && filterMeta !== 'Aucun filtre') metaParts.push(filterMeta);
    // For modele/criteres/rarete with extra context already in rule, add target summary if useful
    if(d.type === 'modele'){
      const m = MODELS.find(x => x.id === d.modelId);
      if(m && m.years) metaParts.unshift(m.years);
    } else if(d.type === 'criteres'){
      const targetSum = getTargetSummary(d);
      // skip if rule already contains it
      if(targetSum && !targetSum.startsWith(rule)) metaParts.unshift(targetSum);
    } else if(d.type === 'rarete' || d.type === 'signal' || d.type === 'ecr'){
      const targetSum = getTargetSummary(d);
      if(targetSum && targetSum !== rule) metaParts.unshift(targetSum);
    }
    const meta = metaParts.length > 0 ? metaParts.join(' · ') : 'tous les filtres';
    const now = Date.now();
    const isEdit = !!BuilderState.editingAlertId;
    // Deep clone du draft pour le stocker dans l'alerte (pour permettre l'édition future)
    const draftSnapshot = JSON.parse(JSON.stringify(d));
    if(isEdit){
      // Update alerte existante
      const idx = State.alerts.findIndex(a => a.id === BuilderState.editingAlertId);
      if(idx === -1){
        // L'alerte a été supprimée entre temps — fallback en création
        const fallbackAlert = {
          id: 'a' + now,
          type: d.type,
          label: (t ? t.label : 'ALERTE').toUpperCase(),
          rule: rule,
          meta: meta,
          matches: n,
          since: 'à l\u2019instant',
          paused: false,
          draft: draftSnapshot,
          createdAt: now,
          lastModifiedAt: now
        };
        State.alerts = [fallbackAlert, ...(State.alerts || [])];
      } else {
        const existing = State.alerts[idx];
        State.alerts[idx] = {
          ...existing,
          type: d.type,
          label: (t ? t.label : 'ALERTE').toUpperCase(),
          rule: rule,
          meta: meta,
          matches: n,
          since: 'modifiée à l\u2019instant',
          draft: draftSnapshot,
          lastModifiedAt: now
        };
      }
      BuilderState.editingAlertId = null;
    } else {
      // Création nouvelle alerte
      const newAlert = {
        id: 'a' + now,
        type: d.type,
        label: (t ? t.label : 'ALERTE').toUpperCase(),
        rule: rule,
        meta: meta,
        matches: n,
        since: 'à l\u2019instant',
        paused: false,
        draft: draftSnapshot,
        createdAt: now,
        lastModifiedAt: now
      };
      State.alerts = [newAlert, ...(State.alerts || [])];
    }
    persistAlerts();
    if(typeof clearPersistedDraft === 'function') clearPersistedDraft();
    this.close();
    setTimeout(() => {
      const toastMsg = isEdit
        ? 'Alerte « ' + rule + ' » modifiée. ' + n + ' voiture' + (n === 1 ? '' : 's') + ' correspond' + (n === 1 ? '' : 'ent') + ' maintenant.'
        : 'Alerte « ' + rule + ' » créée. ' + n + ' voiture' + (n === 1 ? '' : 's') + ' déjà détectée' + (n === 1 ? '' : 's') + '.';
      Sheet.open('toast', toastMsg);
      if(typeof renderAlerts === 'function') renderAlerts();
      if(typeof renderKpis === 'function') renderKpis();
    }, 340);
  },
  canContinue(){
    if(BuilderState.step === 1) return !!BuilderState.draft.type;
    if(BuilderState.step === 2){
      if(BuilderState.draft.type === 'criteres'){
        let hasAxis = false;
        if(BuilderState.draft.axes){
          for(const k in BuilderState.draft.axes){
            if((BuilderState.draft.axes[k] || []).length > 0){ hasAxis = true; break; }
          }
        }
        return !!(BuilderState.draft.posture || BuilderState.draft.presetUsed || hasAxis);
      }
      if(BuilderState.draft.type === 'modele'){
        return !!BuilderState.draft.modelId;
      }
      if(BuilderState.draft.type === 'rarete'){
        const r = BuilderState.draft.rarity || {};
        return !!(r.production || r.circulation || (r.configs && r.configs.length > 0));
      }
      if(BuilderState.draft.type === 'signal'){
        const flags = (BuilderState.draft.signal && BuilderState.draft.signal.flags) || [];
        return flags.length > 0;
      }
      if(BuilderState.draft.type === 'ecr'){
        const e = BuilderState.draft.ecr || {};
        return !!(e.tier || (e.requirements && e.requirements.length > 0));
      }
      return false;
    }
    if(BuilderState.step === 4){
      const r = BuilderState.draft.reception || {};
      return (r.channels && r.channels.length > 0) && !!r.frequency && !!r.hours;
    }
    return true;
  },
  render(){
    const el = document.querySelector('.builder');
    const prevMain = el.querySelector('.builder-main');
    const scrollTop = prevMain ? prevMain.scrollTop : 0;
    const prevSearch = el.querySelector('.builder-search-input');
    const searchHadFocus = prevSearch && document.activeElement === prevSearch;
    const searchSelStart = prevSearch ? prevSearch.selectionStart : null;
    const searchSelEnd = prevSearch ? prevSearch.selectionEnd : null;
    el.innerHTML = `
      ${this.renderHeader()}
      <div class="builder-main">${this.renderStepContent()}</div>
      ${this.renderFooter()}
    `;
    if(scrollTop){
      const newMain = el.querySelector('.builder-main');
      if(newMain) newMain.scrollTop = scrollTop;
    }
    if(searchHadFocus){
      const newSearch = el.querySelector('.builder-search-input');
      if(newSearch){
        newSearch.focus();
        if(searchSelStart !== null){
          try { newSearch.setSelectionRange(searchSelStart, searchSelEnd); } catch(e) {}
        }
      }
    }
    // Persist draft after every render (mutations bubble through here)
    if(typeof persistDraft === 'function') persistDraft(BuilderState.draft, BuilderState.step);
  },
  renderHeader(){
    let dots = '';
    for(let i = 1; i <= 5; i++){
      let cls = '';
      if(i < BuilderState.step) cls = ' done';
      else if(i === BuilderState.step) cls = ' current';
      dots += `<div class="builder-progress-dot${cls}"></div>`;
    }
    return `
      <div class="builder-header">
        <button class="builder-back" data-action="builderPrev" aria-label="Retour">${BuilderState.step === 1 ? '×' : '‹'}</button>
        <div class="builder-step-indicator">
          <div class="builder-step-num">ÉTAPE ${BuilderState.step} / 5</div>
          <div class="builder-progress">${dots}</div>
        </div>
        <button class="builder-close" data-action="builderClose" aria-label="Fermer">×</button>
      </div>
    `;
  },
  renderStepContent(){
    switch(BuilderState.step){
      case 1: return this.renderStep1();
      case 2: return this.renderStep2();
      case 3: return this.renderStep3();
      case 4: return this.renderStep4();
      case 5: return this.renderStep5();
    }
    return '';
  },
  renderStep1(){
    return `
      <h1 class="builder-step-title">Quel type d'alerte ?</h1>

  renderStep2(){
    const type = BuilderState.draft.type;
    if(type === 'criteres') return this.renderCriteresStep();

    if(type === 'rarete')   return this.renderRarityStep();

  },
  renderCriteresStep(){
    const q = BuilderState.draft.searchQuery || '';

    const presetMatches = (p) => matchesQuery(p.title, q, (p.sub || '') + ' ' + (p.keywords || ''));

      filteredPresets = [...PRESETS.filter(p => presetMatches(p)), ...PRESETS.filter(p => !presetMatches(p))];
    } else if(BuilderState.draft.posture){
      filteredPresets = [...PRESETS.filter(p => p.posture === BuilderState.draft.posture), ...PRESETS.filter(p => p.posture !== BuilderState.draft.posture)];

      filteredPresets = PRESETS;
    }
    return `
      <h1 class="builder-step-title">Cible</h1>

            const pos = POSTURES.find(po => po.id === p.posture);
            const dimmed = isQuery && !presetMatches(p);
            return `
              <button class="preset-card ${BuilderState.draft.presetUsed === p.id ? 'selected' : ''} ${dimmed ? 'dimmed' : ''}" data-action="builderApplyPreset" data-preset="${esc(p.id)}">
                <svg class="preset-silhouette" viewBox="0 0 200 60" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">${SILHOUETTES[p.silhouette]}</svg>
                <div class="preset-card-posture-tag">${esc(pos ? pos.label : '')}</div>
                <div class="preset-card-title">${esc(p.title)}</div>

              </button>

        </div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-axis-label">AFFINAGE PAR AXE <span class="builder-axis-hint">— optionnel, cumulable</span></div>
        ${this.renderSearchBar()}

        ${this.renderAxisAccordion('caracteres')}
        ${this.renderAxisAccordion('carrosseries')}

  },
  renderModelStep(){

  renderUpcomingStep(type){

  },
  renderSearchBar(){
    const q = BuilderState.draft.searchQuery || '';
    const active = q.trim().length > 0;
    let hint = '';
    if(active){
      let total = 0;
      let axesWithHits = 0;
      let sigCount = 0;
      for(const reg of Object.values(SIGNATURES_BY_REGION)){
        sigCount += reg.items.filter(s => matchesQuery(s.label, q, s.keywords)).length;
      }
      if(sigCount > 0){ axesWithHits++; total += sigCount; }
      for(const axisKey of Object.keys(AXIS_CONFIG)){
        const c = AXIS_CONFIG[axisKey].items.filter(it => matchesQuery(it.label, q, it.keywords)).length;
        if(c > 0){ axesWithHits++; total += c; }
      }
      hint = total === 0
        ? '<div class="builder-search-hint no-results">Aucun résultat dans les 5 axes.</div>'
        : '<div class="builder-search-hint">' + total + ' résultat' + (total === 1 ? '' : 's') + ' dans ' + axesWithHits + ' ax' + (axesWithHits === 1 ? 'e' : 'es') + '.</div>';
    }
    return `
      <div class="builder-search-wrap ${active ? 'active' : ''}">
        <svg class="builder-search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="8" cy="8" r="6"/>
          <path d="M13 13l3 3" stroke-linecap="round"/>
        </svg>
        <input class="builder-search-input" type="text" data-action="builderSetSearch" placeholder="Chercher dans tous les axes — 911, V12, années 70…" value="${esc(q)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button class="builder-search-clear" data-action="builderClearSearch" aria-label="Effacer la recherche">×</button>
      </div>
      ${hint}
    `;
  },
  renderSigAccordion(){
    const sigs = BuilderState.draft.axes.signatures;
    const count = sigs.length;
    const q = BuilderState.draft.searchQuery || '';
    const isQuery = q.trim().length > 0;
    let totalHits = 0;
    const filteredRegions = Object.entries(SIGNATURES_BY_REGION).map(([key, reg]) => {
      const items = isQuery ? reg.items.filter(s => matchesQuery(s.label, q, s.keywords)) : reg.items;
      totalHits += items.length;
      return { key, label: reg.label, items };
    });
    const isOpen = isQuery ? totalHits > 0 : (BuilderState.draft.openAxis === 'signatures');
    let countLabel;
    if(isQuery){
      countLabel = totalHits === 0
        ? 'aucun résultat'
        : totalHits + ' résultat' + (totalHits === 1 ? '' : 's') + ' visible' + (totalHits === 1 ? '' : 's');
    } else if(count === 0){
      countLabel = 'aucune sélectionnée · 50 disponibles';
    } else {
      countLabel = count + ' sélectionnée' + (count === 1 ? '' : 's');
    }
    const regions = filteredRegions
      .filter(r => r.items.length > 0)
      .map(r => `
        <div class="builder-axis-region">
          <div class="builder-axis-region-label">${esc(r.label)}</div>
          <div class="builder-chips">
            ${r.items.map(s => `<button class="builder-chip ${sigs.includes(s.id) ? 'selected' : ''}" data-action="builderToggleSig" data-sig="${esc(s.id)}">${esc(s.label)}</button>`).join('')}
          </div>
        </div>
      `).join('');
    const isDisabled = isQuery && totalHits === 0;
    return `
      <div class="builder-axis-accordion ${isOpen ? 'open' : ''} ${count > 0 ? 'has-selection' : ''} ${isDisabled ? 'disabled' : ''}">
        <button class="builder-axis-accordion-header" data-action="builderToggleAxis" data-axis="signatures">
          <div class="builder-axis-accordion-label">
            <span class="builder-axis-accordion-name">Signatures</span>
            <span class="builder-axis-accordion-count ${count > 0 && !isQuery ? 'active' : ''}">${esc(countLabel)}</span>
          </div>
          <span class="builder-axis-accordion-chev">›</span>
        </button>
        <div class="builder-axis-accordion-body">${regions}</div>
      </div>
    `;
  },
  renderAxisAccordion(axisKey){
    const cfg = AXIS_CONFIG[axisKey];
    if(!cfg) return '';
    const selected = BuilderState.draft.axes[axisKey] || [];
    const count = selected.length;
    const q = BuilderState.draft.searchQuery || '';
    const isQuery = q.trim().length > 0;
    const filteredItems = isQuery ? cfg.items.filter(it => matchesQuery(it.label, q, it.keywords)) : cfg.items;
    const hits = filteredItems.length;
    const isOpen = isQuery ? hits > 0 : (BuilderState.draft.openAxis === axisKey);
    const isF = cfg.gender === 'f';
    let countLabel;
    if(isQuery){
      countLabel = hits === 0
        ? 'aucun résultat'
        : hits + ' résultat' + (hits === 1 ? '' : 's') + ' visible' + (hits === 1 ? '' : 's');
    } else if(count === 0){
      countLabel = 'aucun' + (isF ? 'e' : '') + ' sélectionné' + (isF ? 'e' : '') + ' · ' + cfg.items.length + ' disponibles';
    } else {
      countLabel = count + ' sélectionné' + (isF ? 'e' : '') + (count === 1 ? '' : 's');
    }
    const isDisabled = isQuery && hits === 0;
    return `
      <div class="builder-axis-accordion ${isOpen ? 'open' : ''} ${count > 0 ? 'has-selection' : ''} ${isDisabled ? 'disabled' : ''}">
        <button class="builder-axis-accordion-header" data-action="builderToggleAxis" data-axis="${esc(axisKey)}">
          <div class="builder-axis-accordion-label">
            <span class="builder-axis-accordion-name">${esc(cfg.label)}</span>
            <span class="builder-axis-accordion-count ${count > 0 && !isQuery ? 'active' : ''}">${esc(countLabel)}</span>
          </div>
          <span class="builder-axis-accordion-chev">›</span>
        </button>
        <div class="builder-axis-accordion-body">
          <div class="builder-chips">
            ${filteredItems.map(it => `<button class="builder-chip ${selected.includes(it.id) ? 'selected' : ''}" data-action="builderToggleAxisItem" data-axis="${esc(axisKey)}" data-item="${esc(it.id)}">${esc(it.label)}</button>`).join('')}
          </div>
        </div>
      </div>
    `;
  },
  renderStep3(){
    const f = BuilderState.draft.filters || { budget: null, km: null, yearRange: null, options: [] };
    const opts = f.options || [];
    const budgetChips = FILTER_BUDGET.map(b => `
      <button class="builder-chip ${f.budget === b.id ? 'selected' : ''}" data-action="builderSetFilterBudget" data-filter="${esc(b.id)}">${esc(b.label)}</button>
    `).join('');
    const kmChips = FILTER_KM.map(k => `
      <button class="builder-chip ${f.km === k.id ? 'selected' : ''}" data-action="builderSetFilterKm" data-filter="${esc(k.id)}">${esc(k.label)}</button>
    `).join('');
    const yearChips = FILTER_YEARS.map(y => `
      <button class="builder-chip ${f.yearRange === y.id ? 'selected' : ''}" data-action="builderSetFilterYearRange" data-filter="${esc(y.id)}">${esc(y.label)}</button>
    `).join('');
    const optionChips = FILTER_OPTIONS.map(o => `
      <button class="builder-chip ${opts.includes(o.id) ? 'selected' : ''}" data-action="builderToggleFilterOption" data-filter="${esc(o.id)}">${esc(o.label)}</button>
    `).join('');
    return `
      <h1 class="builder-step-title">Filtres</h1>
      <p class="builder-step-sub">Affineurs optionnels — passe ou cumule. Le compteur s'ajuste en temps réel.</p>
      <div class="builder-axis-section">
        <div class="builder-axis-label">BUDGET</div>
        <p class="builder-rarity-desc">Une tranche de prix à la fois.</p>
        <div class="builder-chips">${budgetChips}</div>

        <div class="builder-axis-label">KILOMÉTRAGE</div>
        <p class="builder-rarity-desc">Plafond accepté.</p>
        <div class="builder-chips">${kmChips}</div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-axis-label">ANNÉES</div>
        <p class="builder-rarity-desc">Période de production.</p>
        <div class="builder-chips">${yearChips}</div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-axis-label">OPTIONS</div>
        <p class="builder-rarity-desc">Exigences cumulables.</p>
        <div class="builder-chips">${optionChips}</div>
      </div>
    `;
  },
  renderStep4(){
    const r = BuilderState.draft.reception || { channels: [], frequency: null, hours: null };
    const channels = r.channels || [];
    const channelRows = RECEPTION_CHANNELS.map(c => `
      <button class="builder-signal-row ${channels.includes(c.id) ? 'selected' : ''}" data-action="builderToggleReceptionChannel" data-reception="${esc(c.id)}">
        <div class="builder-signal-row-content">
          <div class="builder-signal-row-title">${esc(c.label)}</div>
          <div class="builder-signal-row-desc">${esc(c.desc)}</div>
        </div>
        <div class="builder-signal-row-check">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3.5 8.5l3 3 6-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    `).join('');
    const frequencyRows = RECEPTION_FREQUENCY.map(f => `
      <button class="builder-signal-row ${r.frequency === f.id ? 'selected' : ''}" data-action="builderSetReceptionFrequency" data-reception="${esc(f.id)}">
        <div class="builder-signal-row-content">
          <div class="builder-signal-row-title">${esc(f.label)}</div>
          <div class="builder-signal-row-desc">${esc(f.desc)}</div>
        </div>
        <div class="builder-signal-row-check">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3.5 8.5l3 3 6-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

    const hoursRows = RECEPTION_HOURS.map(h => `
      <button class="builder-signal-row ${r.hours === h.id ? 'selected' : ''}" data-action="builderSetReceptionHours" data-reception="${esc(h.id)}">
        <div class="builder-signal-row-content">
          <div class="builder-signal-row-title">${esc(h.label)}</div>
          <div class="builder-signal-row-desc">${esc(h.desc)}</div>
        </div>
        <div class="builder-signal-row-check">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3.5 8.5l3 3 6-7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </button>
    `).join('');
    return `
      <h1 class="builder-step-title">Réception</h1>
      <p class="builder-step-sub">Comment et quand être prévenu. Tu peux cumuler les canaux.</p>
      <div class="builder-axis-section">
        <div class="builder-axis-label">CANAL</div>
        <p class="builder-rarity-desc">Au moins un canal — cumulables.</p>
        <div class="builder-signal-list">${channelRows}</div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-axis-label">FRÉQUENCE</div>
        <p class="builder-rarity-desc">À quel rythme tu reçois les alertes.</p>
        <div class="builder-signal-list">${frequencyRows}</div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-axis-label">HEURES</div>
        <p class="builder-rarity-desc">Quand CARNET a le droit de te déranger.</p>
        <div class="builder-signal-list">${hoursRows}</div>
      </div>
    `;
  },
  renderStep5(){
    const d = BuilderState.draft;
    const t = TYPES.find(x => x.id === d.type);
    const typeLabel = t ? t.label : '—';
    const targetSummary = getTargetSummary(d);
    const filtersSummary = getFiltersSummary(d);
    const filtersMuted = filtersSummary === 'Aucun filtre';
    const receptionSummary = getReceptionSummary(d);
    const n = calcBuilderMatches();
    const monthlyEstimate = Math.floor(n * 4.3);
    const nFmt = n.toLocaleString('fr-FR').replace(/\s/g,'\u00A0');
    const monthlyFmt = monthlyEstimate.toLocaleString('fr-FR').replace(/\s/g,'\u00A0');
    return `
      <h1 class="builder-step-title">Voici ton alerte</h1>
      <p class="builder-step-sub">Récapitulatif avant création. Tu peux revenir en arrière pour ajuster.</p>
      <div class="builder-axis-section">
        <div class="builder-recap-block">
          <div class="builder-recap-type-badge">${esc(typeLabel)}</div>
          <div class="builder-recap-label">CIBLE</div>
          <div class="builder-recap-value">${esc(targetSummary)}</div>
        </div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-recap-block">
          <div class="builder-recap-label">FILTRES</div>
          <div class="builder-recap-value ${filtersMuted ? 'builder-recap-value-muted' : ''}">${esc(filtersSummary)}</div>
        </div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-recap-block">
          <div class="builder-recap-label">RÉCEPTION</div>
          <div class="builder-recap-value">${esc(receptionSummary)}</div>
        </div>
      </div>
      <div class="builder-axis-section">
        <div class="builder-counter-xl">
          <div class="builder-counter-xl-value">${nFmt}</div>
          <div class="builder-counter-xl-label">voitures matchent · 7 derniers jours</div>
          <div class="builder-counter-xl-sub">~${monthlyFmt} estimées par mois en moyenne</div>
        </div>
      </div>
    `;
  },
  renderFooter(){
    const canContinue = this.canContinue();
    const label = BuilderState.step === 5 ? 'Créer l\'alerte' : 'Continuer';
    let counter = '';
    if((BuilderState.step === 2 && (BuilderState.draft.type === 'criteres' || BuilderState.draft.type === 'rarete' || BuilderState.draft.type === 'signal' || BuilderState.draft.type === 'ecr')) || BuilderState.step === 3 || BuilderState.step === 4){
      const n = calcBuilderMatches();
      counter = `
        <div class="builder-counter">
          <span class="builder-counter-value">${n.toLocaleString('fr-FR').replace(/\s/g,'\u00A0')}</span>
          <span class="builder-counter-label">voitures matchent · 7 derniers jours</span>
        </div>
      `;
    }
    return `
      <div class="builder-footer">
        ${counter}
        <button class="builder-cta" data-action="builderNext"${canContinue ? '' : ' disabled'}>
          ${esc(label)} <span class="builder-cta-arrow">›</span>
        </button>
      </div>
    `;
  }
};

  const carForThumb = { brand, model, year: m.year };

  if(opp){
    if(opp.mode === 'big-win') voiceText = `\u00c0 surveiller \u00e9troitement. Le prix demand\u00e9 est nettement sous la cote estim\u00e9e (${esc(fmtPrice(opp.range.low))} \u2014 ${esc(fmtPrice(opp.range.high))}). Si l\u2019\u00e9tat suit, c\u2019est une belle affaire.`;
    else if(opp.mode === 'win') voiceText = `Bon prix. La fourchette CARNET pour cette config est ${esc(fmtPrice(opp.range.low))} \u2014 ${esc(fmtPrice(opp.range.high))}, l\u2019annonce est en bas de plage.`;
    else if(opp.mode === 'win-light') voiceText = `L\u00e9g\u00e8rement sous la m\u00e9diane. \u00c0 voir si l\u2019\u00e9tat correspond au prix.`;

    else if(opp.mode === 'loss') voiceText = `Au-dessus de la fourchette CARNET. Demande des arguments forts (matching numbers, provenance documentaire, options rares).`;
    else if(opp.mode === 'big-loss') voiceText = `Haut de gamme. Soit l\u2019annonce vise un acheteur final pr\u00e9cis, soit il y a un \u00e9l\u00e9ment exceptionnel non mentionn\u00e9 dans la description.`;

function renderAuctionSheet(a){
  if(!a) return '';
  const isWatched = (State.watchedAuctionIds || []).indexOf(a.id) !== -1;
  const flag = a.country ? getCountryFlag(a.country) : '';
  // Status line — uses dynamic offset
  const statusLine = formatStatusLine(a.hOffset, a.status);
  // Price section varies by status
  let priceSection;
  if(a.status === 'live'){
    const reserveTxt = a.reserveMet
      ? '<span class="auction-card-reserve auction-card-reserve-met">● Réserve atteinte</span>'
      : '<span class="auction-card-reserve auction-card-reserve-pending">○ Réserve non atteinte</span>';
    priceSection = `
      <div class="auction-detail-banner">
        <div class="auction-detail-time-label">ENCHÈRE ACTUELLE</div>
        <div class="auction-detail-time">${esc(fmtAuctionPrice(a.bidCurrent))}</div>
        <div class="auction-detail-date">Estimation ${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        <div style="margin-top:var(--s-2)">${reserveTxt}</div>
      </div>
    `;
  } else if(a.status === 'upcoming'){
    priceSection = `
      <div class="auction-detail-banner">
        <div class="auction-detail-time-label">ESTIMATION</div>
        <div class="auction-detail-time">${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        <div class="auction-detail-date">Enchères ouvertes dans ${esc(formatTimeLeft(a.hOffset))}</div>
      </div>
    `;
  } else {
    const delta = getSoldDelta(a.soldPrice || a.bidCurrent, a.estimateLow, a.estimateHigh);
    const deltaTxt = delta ? `<div class="auction-card-delta auction-card-delta-${delta.mood}" style="margin-top:var(--s-2)">${esc(delta.label)}</div>` : '';
    priceSection = `
      <div class="auction-detail-banner">
        <div class="auction-detail-time-label">PRIX DE VENTE</div>
        <div class="auction-detail-time">${esc(fmtAuctionPrice(a.soldPrice || a.bidCurrent))}</div>
        <div class="auction-detail-date">Estimation ${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        ${deltaTxt}
      </div>
    `;
  }
  // Lot 19-A — activityRows (code mort jamais inséré) retiré : renderAuctionSheet
  // a déjà ses lignes détail inline en .sheet-detail-row plus bas.
  // CTAs vary by status
  let ctas;
  if(a.status === 'sold'){
    ctas = `
      <button class="sheet-btn primary full" data-action="viewSource" data-id="${esc(a.id)}">Voir le résultat sur ${esc(a.source)}</button>
      <button class="sheet-btn full" data-action="addToGarageFromAuction" data-id="${esc(a.id)}">J'ai acquis cette voiture → Garage</button>
      <button class="sheet-btn full" data-action="closeSheet">Fermer</button>
    `;
  } else {
    ctas = `
      <button class="sheet-btn primary full" data-action="viewSource" data-id="${esc(a.id)}">Ouvrir sur ${esc(a.source)}</button>
      <button class="sheet-btn ${isWatched ? '' : ''} full" data-action="toggleWatchAuction" data-auction="${esc(a.id)}">${isWatched ? '✓ Suivie · arrêter' : 'Suivre cette enchère'}</button>
    `;
  }
  const carForThumb = { brand: a.brand, model: a.model, year: a.year };
  // Money block contextual par status
  let moneyBlock = '';
  if(a.status === 'live'){
    const reserveDot = a.reserveMet ? '\u25cf' : '\u25cb';
    const reserveLabel = a.reserveMet ? 'r\u00e9serve atteinte' : 'r\u00e9serve non atteinte';
    const reserveCls = a.reserveMet ? 'reserve-met' : 'reserve-pending';
    moneyBlock = `
      <div class="sheet-detail-money">
        <div class="sheet-detail-money-side">
          <div class="sheet-detail-price">${esc(fmtAuctionPrice(a.bidCurrent))}</div>
          <div class="sheet-detail-label">ench\u00e8re actuelle</div>
        </div>
        <div class="sheet-detail-money-side">
          <div class="sheet-detail-opp ${reserveCls}">${reserveDot} ${esc(reserveLabel)}</div>
          <div class="sheet-detail-label">${a.bids} ench\u00e8res</div>
        </div>
      </div>
      <div class="sheet-detail-range">
        <span class="sheet-detail-range-label">Estimation</span>
        <span class="sheet-detail-range-value">${esc(fmtAuctionPrice(a.estimateLow))} \u2014 ${esc(fmtAuctionPrice(a.estimateHigh))}</span>
      </div>
    `;
  } else if(a.status === 'upcoming'){
    moneyBlock = `
      <div class="sheet-detail-money">
        <div class="sheet-detail-money-side">
          <div class="sheet-detail-price">${esc(fmtAuctionPrice(a.estimateLow))} \u2014 ${esc(fmtAuctionPrice(a.estimateHigh))}</div>
          <div class="sheet-detail-label">estimation</div>
        </div>
        <div class="sheet-detail-money-side">
          <div class="sheet-detail-opp opp-upcoming">${esc(formatTimeLeft(a.hOffset))}</div>
          <div class="sheet-detail-label">avant ouverture</div>
        </div>
      </div>
    `;
  } else {
    const delta = getSoldDelta(a.soldPrice || a.bidCurrent, a.estimateLow, a.estimateHigh);
    moneyBlock = `
      <div class="sheet-detail-money">
        <div class="sheet-detail-money-side">
          <div class="sheet-detail-price">${esc(fmtAuctionPrice(a.soldPrice || a.bidCurrent))}</div>
          <div class="sheet-detail-label">prix de vente</div>
        </div>
        ${delta ? `
          <div class="sheet-detail-money-side">
            <div class="sheet-detail-opp delta-${delta.mood}">${esc(delta.label)}</div>
            <div class="sheet-detail-label">vs estimation</div>
          </div>
        ` : ''}
      </div>
      <div class="sheet-detail-range">
        <span class="sheet-detail-range-label">Estimation initiale</span>
        <span class="sheet-detail-range-value">${esc(fmtAuctionPrice(a.estimateLow))} \u2014 ${esc(fmtAuctionPrice(a.estimateHigh))}</span>
      </div>
    `;
  }
  // Voix CARNET contextuelle par status
  let voiceText = '';
  if(a.status === 'live'){
    if(!a.reserveMet){
      voiceText = `La r\u00e9serve n\u2019est pas encore atteinte. C\u2019est le moment de positionner si l\u2019auto t\u2019int\u00e9resse \u2014 le prix peut encore se figer en-dessous.`;
    } else {
      voiceText = `La r\u00e9serve est franchie, l\u2019auto sera vendue au plus offrant. Calcule ton seuil maximum avant de surench\u00e9rir dans le feu de l\u2019action.`;
    }
  } else if(a.status === 'upcoming'){
    voiceText = `Lot \u00e0 venir. Tu peux d\u00e9j\u00e0 t\u2019informer sur la provenance, les options et l\u2019historique avant que les ench\u00e8res ouvrent. CARNET te pr\u00e9viendra au d\u00e9marrage.`;
  } else {
    const delta = getSoldDelta(a.soldPrice || a.bidCurrent, a.estimateLow, a.estimateHigh);
    if(delta && delta.mood === 'above') voiceText = `Adjug\u00e9 au-dessus de l\u2019estimation. Signe d\u2019un march\u00e9 chaud sur ce mod\u00e8le. Garde-le \u00e0 l\u2019\u0153il pour les prochaines ventes.`;
    else if(delta && delta.mood === 'below') voiceText = `Adjug\u00e9 sous l\u2019estimation. Peut signaler un march\u00e9 mou ou un d\u00e9faut non public. \u00c0 confirmer sur les prochaines ventes du mod\u00e8le.`;
    else voiceText = `Adjug\u00e9 dans la fourchette. March\u00e9 stable sur ce mod\u00e8le.`;
  }
  return `
    <div class="sheet-handle-area" data-sheet-drag>
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-content sheet-content-detail">
      <button class="sheet-close-floating" data-action="closeSheet" aria-label="Fermer">\u00d7</button>
      ${renderCarThumb(carForThumb, 'hero')}
      <div class="sheet-detail-body">
        <div class="sheet-detail-strip">
          <span class="sheet-detail-source">${esc(String(a.source).toUpperCase())} \u00b7 ${esc(a.lot)}</span>
          <span class="sheet-detail-since" data-auction-statusline data-raw-h-offset="${a.hOffset}" data-status="${esc(a.status)}">${statusLine}</span>
        </div>
        <div class="sheet-detail-tag">${esc(String(a.brand).toUpperCase())} \u00b7 ${esc(a.year)}</div>
        <h2 class="sheet-detail-title">${esc(a.model)}</h2>
        <div class="sheet-detail-subline">${esc(a.km)}${a.km !== '\u2014' ? ' km' : ''} \u00b7 ${flag ? flag + ' ' : ''}${esc(a.ci)}, ${esc(a.co)}</div>
        <div class="sheet-detail-divider"></div>
        ${moneyBlock}
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-rows">
          <div class="sheet-detail-row">
            <span class="sheet-detail-row-label">Maison de vente</span>
            <span class="sheet-detail-row-value">${esc(a.source)}</span>
          </div>
          <div class="sheet-detail-row">
            <span class="sheet-detail-row-label">Num\u00e9ro de lot</span>
            <span class="sheet-detail-row-value">${esc(a.lot)}</span>
          </div>
          <div class="sheet-detail-row">
            <span class="sheet-detail-row-label">Suiveurs</span>
            <span class="sheet-detail-row-value">${a.watching}</span>
          </div>
          ${a.status !== 'upcoming' ? `
            <div class="sheet-detail-row">
              <span class="sheet-detail-row-label">Ench\u00e8res</span>
              <span class="sheet-detail-row-value">${a.bids}</span>
            </div>
          ` : ''}
        </div>
        <div class="sheet-detail-voice">
          <div class="sheet-detail-voice-label">CONSEIL CARNET</div>
          <em>${voiceText}</em>
        </div>
      </div>
    </div>
    <div class="sheet-actions sheet-actions-detail">
      ${ctas}
    </div>
  `;
}

      <div class="sale-status-block auction">

function renderGarageCarSheet(c){
  if(!c) return '';
  const cote = c.cote || 0;
  const paid = c.paidPrice || 0;
  const delta = cote - paid;
  let deltaCls = 'flat';
  if(paid > 0){
    if(delta > paid * 0.05) deltaCls = 'positive';
    else if(delta < -paid * 0.05) deltaCls = 'negative';
  }
  // Fourchette : récupère ou calcule
  let _range = c.coteRange;
  if(!_range && typeof estimateCoteRange === 'function'){
    const _e = estimateCoteRange(c.brand, c.model, c.year, c.km || 0, c.finish, c.tuner && c.tuner.name, c.tuner && c.tuner.categories, c.serviceUpToDate, c.fullServiceHistory, c.hasLeather);
    if(_e) _range = {low: _e.low, high: _e.high};
  }
  // Voix CARNET (gestionnaire collection)
  const voice = (typeof getCardVoice === 'function') ? getCardVoice(c) : {text: '', mode: 'neutral'};
  // Tag header : MARQUE · ANNÉE [· FINITION]
  const tagParts = [c.brand, c.year];
  if(c.finish) tagParts.push(c.finish);
  const topTag = tagParts.filter(p => p).map(p => esc(String(p).toUpperCase())).join(' \u00b7 ');
  // Subline : km · couleur
  const sublineParts = [];
  if(c.km && c.km > 0) sublineParts.push(fmtKm(c.km));
  if(c.color && c.color !== '—') sublineParts.push(c.color);
  const subline = sublineParts.join(' \u00b7 ');
  // Tuner badge
  let tunerBadge = '';
  if(c.tuner && c.tuner.name && c.tuner.name !== '__none__'){
    tunerBadge = `<div class="sheet-detail-tuner">pr\u00e9par\u00e9e par ${esc(c.tuner.name)}</div>`;
  } else if(c.tuner && c.tuner.name === '__none__'){
    tunerBadge = `<div class="sheet-detail-tuner sheet-detail-tuner-origine">d\u2019origine</div>`;
  }
  return `
    <div class="sheet-handle-area" data-sheet-drag>
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-content sheet-content-detail">
      <button class="sheet-close-floating" data-action="closeSheet" aria-label="Fermer">\u00d7</button>
      ${renderCarThumb(c, 'hero')}
      <div class="sheet-detail-body">
        <div class="sheet-detail-tag">${topTag}</div>
        <h2 class="sheet-detail-title">${esc(c.model)}</h2>
        ${subline ? `<div class="sheet-detail-subline">${esc(subline)}</div>` : ''}
        ${tunerBadge}
        <div class="sheet-detail-divider"></div>
        ${_range ? `
          <div class="sheet-detail-money">
            <div class="sheet-detail-money-side">
              <div class="sheet-detail-price">${esc(fmtPrice(_range.low))} \u2014 ${esc(fmtPrice(_range.high))}</div>
              <div class="sheet-detail-label">fourchette CARNET</div>
            </div>
            ${paid > 0 ? `
              <div class="sheet-detail-money-side">
                <div class="sheet-detail-opp opp-${deltaCls === 'positive' ? 'win' : deltaCls === 'negative' ? 'loss' : 'flat'}">${delta >= 0 ? '\u2197 +' : '\u2198 \u2212'} ${esc(fmtPrice(Math.abs(delta)))}</div>
                <div class="sheet-detail-label">sur achat</div>
              </div>
            ` : `
              <div class="sheet-detail-money-side">
                <div class="sheet-detail-opp opp-flat">\u2192 \u00e0 r\u00e9\u00e9valuer</div>
                <div class="sheet-detail-label">prix pay\u00e9 NR</div>
              </div>
            `}
          </div>
          <div class="sheet-detail-range">
            <span class="sheet-detail-range-label">M\u00e9diane indicative</span>
            <span class="sheet-detail-range-value">${esc(fmtPrice(cote))}</span>
          </div>
        ` : `
          <div class="sheet-detail-money">
            <div class="sheet-detail-money-side">
              <div class="sheet-detail-price">${esc(fmtPrice(cote))}</div>
              <div class="sheet-detail-label">cote CARNET</div>
            </div>
            ${paid > 0 ? `
              <div class="sheet-detail-money-side">
                <div class="sheet-detail-opp opp-${deltaCls === 'positive' ? 'win' : deltaCls === 'negative' ? 'loss' : 'flat'}">${delta >= 0 ? '\u2197 +' : '\u2198 \u2212'} ${esc(fmtPrice(Math.abs(delta)))}</div>
                <div class="sheet-detail-label">sur achat</div>
              </div>
            ` : ''}
          </div>
        `}
        ${voice.text ? `
          <div class="sheet-detail-voice">
            <div class="sheet-detail-voice-label">VOIX CARNET</div>
            <em>${esc(voice.text)}</em>
          </div>
        ` : ''}
        ${renderValuationProjection(c)}
        ${renderAIAdviceBlock(c)}
        ${c.saleStatus ? renderSaleStatusBlock(c) : ''}
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-section-label">DOSSIER VOITURE</div>
        <div class="sheet-detail-rows">
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Ann\u00e9e</span><span class="sheet-detail-row-value">${c.year}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Kilom\u00e9trage</span><span class="sheet-detail-row-value">${esc(fmtKm(c.km || 0))}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Couleur</span><span class="sheet-detail-row-value">${esc(c.color || '\u2014')}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Ch\u00e2ssis</span><span class="sheet-detail-row-value sheet-detail-row-value-mono">${esc(c.chassis || '\u2014')}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Localisation</span><span class="sheet-detail-row-value">${esc(c.location || '\u2014')}</span></div>
        </div>
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-section-label">ACQUISITION</div>
        <div class="sheet-detail-rows">
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Acquise</span><span class="sheet-detail-row-value">${esc(c.acquired || '\u2014')}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Prix pay\u00e9</span><span class="sheet-detail-row-value">${paid > 0 ? esc(fmtPrice(paid)) : '\u2014'}</span></div>
        </div>
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-section-label">ENTRETIEN</div>
        <div class="sheet-detail-rows">
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Derni\u00e8re r\u00e9vision</span><span class="sheet-detail-row-value">${esc(c.lastService || '\u2014')}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Prochaine \u00e9ch\u00e9ance</span><span class="sheet-detail-row-value">${esc(c.nextServiceDue || '\u2014')}</span></div>
        </div>
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-section-label">ARCHIVES</div>
        <div class="sheet-detail-rows">
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Documents</span><span class="sheet-detail-row-value">${c.docsCount || 0} fichier${(c.docsCount || 0) === 1 ? '' : 's'}</span></div>
          <div class="sheet-detail-row"><span class="sheet-detail-row-label">Photos</span><span class="sheet-detail-row-value">${c.photosCount || 0} clich\u00e9${(c.photosCount || 0) === 1 ? '' : 's'}</span></div>
        </div>
        <div class="sheet-detail-divider"></div>
        <div class="sheet-detail-section-label">PHOTOS \u00b7 ${(c.photos || []).length}</div>
        ${renderGaragePhotosGrid(c)}

        ${renderGarageDocsList(c)}
      </div>
    </div>
    <div class="sheet-actions sheet-actions-detail">
      <button class="sheet-btn primary full" data-action="viewGarageHistory" data-id="${esc(c.id)}">Voir l\u2019historique</button>
      <div class="sheet-actions-row">
        <button class="sheet-btn half" data-action="editGarageCar" data-id="${esc(c.id)}">Modifier</button>
        <button class="sheet-btn half" data-action="logService" data-id="${esc(c.id)}">Entretien</button>
      </div>
      <div class="sheet-actions-row">
        <button class="sheet-btn half" data-action="addPhoto" data-id="${esc(c.id)}">+ Photo</button>
        <button class="sheet-btn half" data-action="addDoc" data-id="${esc(c.id)}">+ Document</button>
      </div>
      <button class="sheet-btn full" data-action="exportCarnet" data-id="${esc(c.id)}">Exporter le carnet</button>
      ${c.saleStatus ? `
        <button class="sheet-btn full" data-action="markAsSold" data-id="${esc(c.id)}" style="border-color:var(--vert-anglais);color:var(--vert-anglais);font-weight:500">Marquer comme vendue</button>
        <button class="sheet-btn ghost full" data-action="cancelSale" data-id="${esc(c.id)}">Annuler la mise en vente</button>
      ` : `
        <button class="sheet-btn full" data-action="listForSale" data-id="${esc(c.id)}" style="border-color:var(--orange-polo);color:var(--orange-polo);font-weight:500">Mettre en vente</button>
      `}
      <button class="sheet-btn ghost full" data-action="removeFromGarage" data-id="${esc(c.id)}" style="color:#9c2a2a">Retirer du Garage</button>
    </div>
  `;
}

function renderGaragePhotosGrid(c){
  const photos = (c.photos || []);
  if(photos.length === 0){
    return `<div class="garage-empty-section">Aucune photo pour l'instant. Le bouton « Ajouter photo » est juste en bas.</div>`;
  }
  return `<div class="garage-photos-grid">${photos.map(p => `
    <button class="garage-photo-thumb" data-action="openPhoto" data-id="${esc(p.id)}" data-car="${esc(c.id)}">
      <img src="${esc(p.dataUrl)}" alt="${esc(p.name || 'photo')}" loading="lazy" />

function renderGarageDocsList(c){
  const docs = (c.docs || []);
  if(docs.length === 0){

  }
  return `<div class="garage-docs-list">${docs.map(d => {
    const iconHtml = (d.type === 'application/pdf') ? '<span class="garage-doc-icon">PDF</span>' :

    const sizeKb = d.size ? `${Math.ceil(d.size / 1024)} ko` : '';

}

function renderGarageHistorySheet(carId){
  const car = (State.garage || []).find(x => x.id === carId);
  if(!car) return '';
  const services = (car.services || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const total = services.reduce((sum, s) => sum + (parseInt(s.price, 10) || 0), 0);
  const lastDate = services[0] ? services[0].date : null;
  const firstDate = services[services.length - 1] ? services[services.length - 1].date : null;
  const span = (lastDate && firstDate) ? Math.max(1, Math.round((new Date(lastDate) - new Date(firstDate)) / (1000 * 60 * 60 * 24 * 365))) : 0;
  return `
    <div class="sheet-handle-area" data-sheet-drag>
      <div class="sheet-handle"></div>
    </div>
    <div class="sheet-header">
      <div>
        <div class="sheet-tag">HISTORIQUE · ${esc(car.brand.toUpperCase())} ${car.year}</div>
        <h2 class="sheet-title">${esc(car.model)}</h2>
        <div style="font-family:var(--editorial);font-style:italic;font-size:var(--t-sm);color:var(--gris);margin-top:var(--s-1)">Le carnet, dans l'ordre.</div>
      </div>
      <button class="sheet-close" data-action="closeSheet" aria-label="Fermer">×</button>
    </div>
    <div class="sheet-content">
      ${services.length === 0 ? `
        <div class="garage-empty-section" style="padding:var(--s-4) var(--s-3);text-align:center">
          Aucun entretien enregistré. Saisis le premier — il fondera l'historique de cette voiture.
        </div>
      ` : `
        <div class="garage-history-kpis">
          <div class="garage-history-kpi">
            <div class="garage-history-kpi-label">Entretiens</div>
            <div class="garage-history-kpi-value">${services.length}</div>
          </div>
          <div class="garage-history-kpi">
            <div class="garage-history-kpi-label">Total dépensé</div>
            <div class="garage-history-kpi-value">${esc(fmtPrice(total))}</div>
          </div>
          <div class="garage-history-kpi">
            <div class="garage-history-kpi-label">Couverture</div>
            <div class="garage-history-kpi-value">${span} an${span > 1 ? 's' : ''}</div>
          </div>
        </div>

        <div class="garage-timeline">
          ${services.map(s => {
            const typeLabel = (SERVICE_TYPES.find(t => t.id === s.type) || {}).label || s.type || 'Entretien';
            const date = s.date ? new Date(s.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : '—';
            return `
              <div class="garage-timeline-item">
                <div class="garage-timeline-dot"></div>
                <div class="garage-timeline-content">
                  <div class="garage-timeline-header">
                    <div class="garage-timeline-type">${esc(typeLabel)}</div>
                    <div class="garage-timeline-date">${esc(date)}</div>
                  </div>
                  <div class="garage-timeline-meta">
                    ${s.km ? `<span>${esc(fmtKm(parseInt(s.km, 10)))}</span>` : ''}
                    ${s.supplier ? `<span>${esc(s.supplier)}</span>` : ''}
                    ${s.price ? `<span>${esc(fmtPrice(parseInt(s.price, 10)))}</span>` : ''}
                  </div>
                  ${s.notes ? `<div class="garage-timeline-notes">${esc(s.notes)}</div>` : ''}
                  <button class="garage-timeline-remove" data-action="removeService" data-car="${esc(carId)}" data-id="${esc(s.id)}" aria-label="Retirer">Retirer cet entretien</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
    <div class="sheet-actions grid-2">
      <button class="sheet-btn primary full" data-action="logService" data-id="${esc(carId)}">Saisir un entretien</button>
      <button class="sheet-btn full" data-action="exportCarnet" data-id="${esc(carId)}">Exporter le carnet</button>
    </div>
  `;

// ─── Dashboard helpers (mock data déterministe par car.id) ───
function _hashCarId(id){
  let h = 0;
  const s = String(id || '');
  for(let i = 0; i < s.length; i++){
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateListingDashboard(car){
  const d = car.saleData || {};
  const h = _hashCarId(car.id);
  const daysSinceStart = d.startedAt ? Math.floor((Date.now() - d.startedAt) / 86400000) : 0;
  const baseDailyViews = 12 + (h % 45);
  // 7 derniers jours de vues (sparkline)
  const viewsByDay = [];
  for(let i = 6; i >= 0; i--){
    const dayAge = daysSinceStart - i;
    if(dayAge < 0){ viewsByDay.push(0); continue; }
    const decay = Math.exp(-dayAge / 25);
    const variance = 0.6 + (((h >> (i + 2)) % 100) / 100) * 0.8;
    viewsByDay.push(Math.max(0, Math.round(baseDailyViews * decay * variance)));
  }
  const recentViews = viewsByDay.reduce((a, b) => a + b, 0);
  const olderViews = Math.max(0, Math.round(baseDailyViews * Math.max(0, daysSinceStart - 7) * 0.25));
  const totalViews = recentViews + olderViews;
  // Watchers
  const watchers = Math.max(0, Math.round(totalViews * (0.08 + ((h >> 5) % 100) / 1000)));
  // Messages
  const numMessages = h % 5;
  const senderNames = ['M. Bertrand', 'Antoine V.', 'Sergei K.', 'Marc R.', 'Christophe L.', 'Italo G.', 'Hans W.', 'Olivier B.'];
  const askingPrice = d.askingPrice || car.cote || 100000;
  const messageTemplates = [
    { preview: 'Bonjour, votre voiture est-elle toujours disponible ? Je suis basé à Genève et serais intéressé.', offer: null, daysAgo: 1, status: 'unread' },
    { preview: "Bonjour, l'historique d'entretien complet est-il disponible ? Merci d'avance.", offer: null, daysAgo: 2, status: 'unread' },
    { preview: 'Je serais intéressé à venir l\u2019essayer ce week-end. Possible d\u2019organiser une visite ?', offer: null, daysAgo: 3, status: 'replied' },
    { preview: 'Très belle voiture. Je vous propose ' + Math.round(askingPrice * 0.92).toLocaleString('fr-FR') + ' \u20ac, paiement immédiat.', offer: Math.round(askingPrice * 0.92), daysAgo: 5, status: 'unread' },
    { preview: 'Disponible pour un appel téléphonique en début de semaine ?', offer: null, daysAgo: 7, status: 'replied' }
  ];
  const messages = [];
  for(let i = 0; i < numMessages; i++){
    const tpl = messageTemplates[i];
    messages.push({
      id: 'msg_' + car.id + '_' + i,
      from: senderNames[(h + i) % senderNames.length],
      preview: tpl.preview,
      offer: tpl.offer,
      daysAgo: tpl.daysAgo,
      status: tpl.status
    });
  }
  // Comparable marché
  const marketAvg = Math.round(askingPrice * (0.92 + ((h >> 8) % 22) / 100));
  const marketHigh = Math.round(askingPrice * (1.05 + ((h >> 10) % 12) / 100));
  const marketLow = Math.round(askingPrice * (0.78 + ((h >> 11) % 14) / 100));
  return { totalViews, viewsByDay, watchers, messages, marketAvg, marketHigh, marketLow, askingPrice };
}

function generateAuctionDashboard(car){
  const d = car.saleData || {};
  const h = _hashCarId(car.id);
  const daysSinceStart = d.startedAt ? Math.floor((Date.now() - d.startedAt) / 86400000) : 0;
  const baseDailyViews = 25 + (h % 65); // les enchères attirent plus
  const viewsByDay = [];
  for(let i = 6; i >= 0; i--){
    const dayAge = daysSinceStart - i;
    if(dayAge < 0){ viewsByDay.push(0); continue; }
    const variance = 0.6 + (((h >> (i + 2)) % 100) / 100) * 0.8;
    viewsByDay.push(Math.max(0, Math.round(baseDailyViews * variance)));
  }
  const totalViews = viewsByDay.reduce((a, b) => a + b, 0) + Math.round(baseDailyViews * Math.max(0, daysSinceStart - 7) * 0.5);
  const watchers = Math.max(0, Math.round(totalViews * (0.12 + ((h >> 5) % 100) / 1000)));
  // Bids
  const estimateLow = d.estimateLow || 50000;
  const estimateHigh = d.estimateHigh || estimateLow * 1.3;
  const numBids = Math.min(15, Math.max(0, (h % 18) - 2));
  const bids = [];
  let currentBid = 0;
  const startBid = Math.round(estimateLow * 0.7);
  for(let i = 0; i < numBids; i++){
    const progress = i / Math.max(1, numBids - 1);
    const targetPrice = startBid + (estimateLow - startBid) * progress + (estimateHigh - estimateLow) * progress * progress * 0.4;
    const variance = 0.97 + ((h >> i) % 100) / 1000 * 0.06;
    currentBid = Math.round(targetPrice * variance / 500) * 500;
    bids.push({
      id: 'bid_' + car.id + '_' + i,
      bidder: 'Enchérisseur #' + (1000 + ((h + i * 7) % 9000)),
      amount: currentBid,
      hoursAgo: Math.max(0.5, Math.round((daysSinceStart * 24 - i * 8 + (h % 5)) * 10) / 10)
    });
  }
  bids.reverse(); // plus récent en premier
  const reserveMet = d.reservePrice ? currentBid >= d.reservePrice : true;
  return { totalViews, viewsByDay, watchers, bids, currentBid, numBids: bids.length, reserveMet };
}

function renderSparkline(values, options){
  options = options || {};
  const w = options.width || 200;
  const h = options.height || 36;
  if(!values || values.length === 0) return '';
  const max = Math.max(1, ...values);
  const step = w / Math.max(1, values.length - 1);
  const points = values.map((v, i) => {
    const x = i * step;
    const y = h - (v / max) * h * 0.92 - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const lastX = (values.length - 1) * step;
  const lastY = h - (values[values.length - 1] / max) * h * 0.92 - 2;
  return `
    <svg class="sparkline" viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="none">
      <polyline points="${points.join(' ')}" fill="none" stroke="var(--orange-polo)" stroke-width="1.5" />
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="2.5" fill="var(--orange-polo)" />
    </svg>
  `;
}

// Mapping target → CSS selector pour scrollToSection (Chunk 9.d)
const KPI_TARGET_MAP = {
  alerts:   '.alerts-feed',
  matches:  '.matches-feed',
  auctions: '.auctions-feed',
  watched:  '.watched-rail'
};
function scrollToSection(target){
  const sel = KPI_TARGET_MAP[target];
  if(!sel) return;
  const el = document.querySelector(sel);
  if(!el) return;
  // Remonter au parent .section pour scroller au début, pas dans le feed
  const section = el.closest('.section') || el;
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function navigateToKpiTarget(target){
  // garage → switchTab vers Garage (pas un scroll dans Veille)
  if(target === 'garage'){
    if(State.activeTab !== 'garage') switchTab('garage');
    return;
  }
  // Tous les autres targets sont des sections de la page Veille
  if(State.activeTab !== 'affut'){
    switchTab('affut');
    setTimeout(() => scrollToSection(target), 50);
    return;
  }
  scrollToSection(target);
}

  async paywallSelectMethod(){
    const method = event.currentTarget.dataset.method;
    State.paywallState.method = method;
    State.paywallState.step = 3;
    State.paywallState.loading = true;
    State.paywallState.error = null;
    State.paywallState.expiredOrRejected = null;

    if (method === 'xrp' || method === 'rlusd') {
      // Render loading state immédiat
      const innerLoading = document.querySelector('.sheet-inner');
      if (innerLoading) innerLoading.innerHTML = renderPaywallStep3();

      try {
        const payload = await createXamanPayload({
          amount_eur: State.paywallState.tier_eur,
          currency: method.toUpperCase()
        });
        if (!State.paywallState) return;
        State.paywallState.payload = payload;
        State.paywallState.signed = null;
        State.paywallState.loading = false;
        const inner = document.querySelector('.sheet-inner');
        if (inner) inner.innerHTML = renderPaywallStep3();

        State.paywallPollHandle = pollXamanStatus(payload.uuid, (result) => {
          if (!State.paywallState || State.paywallState.payload?.uuid !== payload.uuid) return;

          if (result.status === 'signed') {
            State.paywallState.signed = result;
            const { newBadges } = recordDonation({
              amount_eur: State.paywallState.tier_eur,
              method: method,
              currency: method.toUpperCase(),
              tx_hash: result.tx_hash
            });
            State.paywallState.newBadges = newBadges;
            const inner3 = document.querySelector('.sheet-inner');
            if (inner3) inner3.innerHTML = renderPaywallStep3();
            setTimeout(() => {
              if (!State.paywallState) return;
              State.paywallState.step = 4;
              const inner4 = document.querySelector('.sheet-inner');
              if (inner4) inner4.innerHTML = renderPaywallStep4();
            }, 1400);
          } else if (result.status === 'expired' || result.status === 'rejected') {
            State.paywallState.expiredOrRejected = result.status;
            const innerExp = document.querySelector('.sheet-inner');
            if (innerExp) innerExp.innerHTML = renderPaywallStep3();
          } else if (result.status === 'error') {
            State.paywallState.error = result.error || 'Erreur réseau';
            const innerErr = document.querySelector('.sheet-inner');
            if (innerErr) innerErr.innerHTML = renderPaywallStep3();
          }
        });
      } catch (err) {
        if (!State.paywallState) return;
        State.paywallState.loading = false;
        State.paywallState.error = err.message || 'Impossible de joindre le serveur de paiement.';
        const inner = document.querySelector('.sheet-inner');
        if (inner) inner.innerHTML = renderPaywallStep3();
      }
    } else if (method === 'card') {
      State.paywallState.loading = false;
      const inner = document.querySelector('.sheet-inner');
      if (inner) inner.innerHTML = renderPaywallStep3();
    }
  },

  setListingsFilter(filterId){
    if(!LISTING_TIERS.find(x => x.id === filterId)) return;
    State.listingsFilter = filterId;
    // v6.4 : live mode → refetch avec nouveau tier
    if (State.liveMode) {
      State.liveListings = null;

    }
