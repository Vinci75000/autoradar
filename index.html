  setListingsSearch(query){
    State.listingsSearch = String(query || '');
    if(State.activeTab !== 'annonces') return;
    // v6.4 : live mode → refetch debounced
    if (State.liveMode) {
      clearTimeout(State._searchDebounce);
      State._searchDebounce = setTimeout(() => {
        State.liveListings = null;
        loadListingsLive();
      }, 350);
    }
    // Re-render seulement le feed + count + clear button, pour ne pas re-mount l'input (sinon perte focus)
    const feed = document.querySelector('.listings-feed');
    const countEl = document.querySelector('.listings-count');
    const searchWrap = document.querySelector('.listings-search-wrap');
    if(!feed && !countEl) return;
    const filter = State.listingsFilter || 'all';
    // v6.0 : priorité live data si dispo, sinon fallback mock LISTINGS
  const allListings = (State.liveListings && State.liveListings.length > 0)
    ? State.liveListings
    : (State.liveMode && State._loadingListings ? [] : ((typeof LISTINGS !== 'undefined') ? LISTINGS : []));
  // Si live mode mais pas encore chargé, déclenche le fetch en arrière-plan
  if (State.liveMode && !State.liveListings && !State._loadingListings) {
    loadListingsLive();
  }
    const filtered = allListings
      .filter(l => listingMatchesTier(l, filter))
      .filter(l => listingMatchesSearch(l, State.listingsSearch))
      .sort((a, b) => (b.sc || 0) - (a.sc || 0));
    const hasQuery = State.listingsSearch.trim().length > 0;
    const hasFilter = filter !== 'all';
    // Update count
    if(countEl){
      const totalStr = (State.liveListingsTotal && State.liveListingsTotal > 0)
        ? ' · sur ' + State.liveListingsTotal + ' au stock'
        : (hasFilter || hasQuery ? ' · sur ' + allListings.length + ' au stock' : '');
      countEl.textContent = filtered.length + ' ' + (filtered.length === 1 ? 'voiture' : 'voitures') + totalStr;
    }
    // Update clear button presence
    if(searchWrap){
      const existingClear = searchWrap.querySelector('.listings-search-clear');
      if(hasQuery && !existingClear){
        const btn = document.createElement('button');
        btn.className = 'listings-search-clear';
        btn.setAttribute('data-action', 'clearListingsSearch');
        btn.setAttribute('aria-label', 'Effacer');
        btn.textContent = '×';
        searchWrap.appendChild(btn);
      } else if(!hasQuery && existingClear){
        existingClear.remove();
      }
    }
    // Update feed — find scope (section qui contient le feed)
    if(feed){
      if(filtered.length > 0){
        feed.outerHTML = '<div class="listings-feed">' + filtered.map(renderListingCard).join('') + '</div>';
      } else {
        const emptyHtml = hasQuery
          ? renderEmptyState({ title: 'Aucun résultat pour « ' + State.listingsSearch + ' »', text: hasFilter ? 'Élargis le tier ou modifie la recherche.' : 'Modifie ta recherche pour parcourir l\u2019ensemble du stock.' })
          : renderEmptyState({ title: 'Aucune voiture dans ce tier', text: 'Élargis le tier pour voir plus de voitures du stock.' });
        feed.outerHTML = emptyHtml;
      }
    } else {
      // Le feed était dans un empty state — relancer un render complet
      renderListingsPage();
    }
  },

  garageFormSubmit(){
    try {
      // Validation INLINE : pas de Sheet.open('toast') qui remplace le form !
      const errors = [];
      if(!GarageFormState.brand.trim()) errors.push('marque');
      if(!GarageFormState.model.trim()) errors.push('modèle');
      if(!GarageFormState.year.trim() || !/^\d{4}$/.test(GarageFormState.year.trim())){
        errors.push('année (4 chiffres)');
      } else {
        const yearNum = parseInt(GarageFormState.year, 10);
        if(yearNum < 1900 || yearNum > new Date().getFullYear() + 1){
          errors.push('année entre 1900 et ' + (new Date().getFullYear() + 1));
        }
      }
      const errBox = document.getElementById('garage-form-error');
      if(errors.length > 0){
        if(errBox){
          errBox.textContent = 'Il manque : ' + errors.join(', ') + '.';
          errBox.style.display = 'block';
          // Scroll vers l'erreur si possible
          errBox.scrollIntoView({behavior: 'smooth', block: 'center'});
        }
        return;
      }
      // Clear error display si tout est valide
      if(errBox) errBox.style.display = 'none';
      if(GarageFormState._submitting) return;
      GarageFormState._submitting = true;
      // Cote = calcul CARNET exclusif (médiane biaisée valorisation, jamais saisie user)
      const _est = estimateCoteRange(
        GarageFormState.brand, GarageFormState.model,
        GarageFormState.year, parseInt(GarageFormState.km, 10) || 0,
        GarageFormState.finish, GarageFormState.tunerName, GarageFormState.tunerCategories,
        GarageFormState.serviceUpToDate, GarageFormState.fullServiceHistory, GarageFormState.hasLeather
      );
      // 50/50 = juste milieu de la fourchette (plus prudent que biais valorisation)
      const _computedCote = _est ? Math.round(_est.low * 0.5 + _est.high * 0.5) : 0;
    const f = GarageFormState;
    const now = Date.now();
    const paid = parseInt(f.paidPrice, 10) || 0;
    // Cote = calcul CARNET seulement (jamais saisie par l'user)
    const cote = _computedCote || paid || 0;

    // Mode EDIT : merger avec voiture existante (conserver services/photos/docs/chassis/location)
    if(f.editingId){
      const idx = (State.garage || []).findIndex(x => x.id === f.editingId);
      if(idx === -1){ resetGarageForm(); Sheet.close(); return; }
      const existing = State.garage[idx];
      // Photos : fusionner les nouvelles photos initiales avec les existantes (sans doublons par id)
      const existingPhotos = Array.isArray(existing.photos) ? existing.photos : [];
      const newInitial = Array.isArray(f.photos) ? f.photos : [];
      const seenIds = new Set(existingPhotos.map(p => p.id));
      const mergedPhotos = [...existingPhotos];
      for(const p of newInitial){
        if(!seenIds.has(p.id)){
          mergedPhotos.push({
            id: p.id, dataUrl: p.dataUrl,
            addedAt: p.addedAt || Date.now(), caption: ''
          });
          seenIds.add(p.id);
        }
      }
      const updated = Object.assign({}, existing, {
        brand: f.brand.trim(),
        model: f.model.trim(),
        finish: f.finish.trim() || existing.finish || '',
        tuner: (f.tunerName && f.tunerName !== '') ? {
          name: f.tunerName,
          categories: [...(f.tunerCategories || [])]
        } : (existing.tuner || null),
        serviceUpToDate: !!f.serviceUpToDate,
        fullServiceHistory: !!f.fullServiceHistory,
        hasLeather: !!f.hasLeather,
        coteRange: _est ? {low: _est.low, high: _est.high} : (existing.coteRange || null),
        year: parseInt(f.year, 10),
        km: parseInt(f.km, 10) || 0,
        color: f.color.trim() || existing.color || '—',
        spec: f.spec.trim() || existing.spec || '—',
        paidPrice: paid || existing.paidPrice,
        cote: cote || existing.cote,
        photos: mergedPhotos,
        photosCount: mergedPhotos.length
      });
      State.garage[idx] = updated;
      if(!safePersistGarage()){
        GarageFormState._submitting = false;
        const errBox = document.getElementById('garage-form-error');
        if(errBox){
          errBox.textContent = 'Sauvegarde locale impossible (stockage saturé).';
          errBox.style.display = 'block';
        }
        return;
      }
      if(typeof renderKpis === 'function') renderKpis();
      Sheet.close();
      setTimeout(() => {
        if(State.activeTab !== 'garage' && typeof switchTab === 'function'){
          switchTab('garage');
        } else if(typeof renderGaragePage === 'function'){
          renderGaragePage();
        }
        showToastFloat(`« ${updated.brand} ${updated.model} » mise à jour.`);
        resetGarageForm();
      }, 340);
      return;
    }

    // Mode ADD : créer une nouvelle entrée
    const _initialPhotos = Array.isArray(f.photos) ? f.photos.map(p => ({
      id: p.id,
      dataUrl: p.dataUrl,
      addedAt: p.addedAt || now,
      caption: ''
    })) : [];
    const newCar = {
      id: 'g' + now,
      brand: f.brand.trim(),
      model: f.model.trim(),
      finish: f.finish.trim() || '',
      tuner: (f.tunerName && f.tunerName !== '') ? {
        name: f.tunerName,
        categories: [...(f.tunerCategories || [])]
      } : null,
      serviceUpToDate: !!f.serviceUpToDate,
      fullServiceHistory: !!f.fullServiceHistory,
      hasLeather: !!f.hasLeather,
      coteRange: _est ? {low: _est.low, high: _est.high} : null,
      year: parseInt(f.year, 10),
      km: parseInt(f.km, 10) || 0,
      color: f.color.trim() || '—',
      chassis: '—',
      spec: f.spec.trim() || 'Saisie manuelle',
      acquired: 'aujourd\u2019hui',
      acquiredAt: now,
      paidPrice: paid,
      cote: cote,
      trend: 'flat',
      trendLabel: 'à réévaluer',
      lastService: '—',
      nextServiceDue: '—',
      docsCount: 0,
      photosCount: 0,
      location: '—',
      services: [],
      photos: _initialPhotos,
      photosCount: _initialPhotos.length,
      docs: []
    };
    State.garage = [newCar, ...(State.garage || [])];
    if(!safePersistGarage()){
      GarageFormState._submitting = false;
      const errBox = document.getElementById('garage-form-error');
      if(errBox){
        errBox.textContent = 'Sauvegarde locale impossible (stockage saturé). Retire des photos ou docs avant.';
        errBox.style.display = 'block';
      }
      return;
    }
    if(typeof renderKpis === 'function') renderKpis();
    Sheet.close();
    setTimeout(() => {
      // Switch sur Garage si pas déjà dessus + re-render si déjà dessus
      if(State.activeTab !== 'garage' && typeof switchTab === 'function'){
        switchTab('garage');
      } else if(typeof renderGaragePage === 'function'){
        renderGaragePage();
      }
      // Scroll en haut pour voir la nouvelle voiture (en première position)
      setTimeout(() => { scrollToTopOfActiveTab(); }, 50);
      // Toast flottant non-bloquant
      showToastFloat(`« ${newCar.brand} ${newCar.model} » ajoutée au Garage.`);
      resetGarageForm();
    }, 340);
    } catch(err) {
      GarageFormState._submitting = false;
      const errBox = document.getElementById('garage-form-error');
      const msg = 'Erreur inattendue : ' + (err && err.message ? err.message : String(err));
      if(errBox){
        errBox.textContent = msg;
        errBox.style.display = 'block';
      } else {
        alert(msg);
      }
      console.error('[garageFormSubmit] crash:', err);
    }
  },

  addPhoto(carId){
    const c = (State.garage || []).find(x => x.id === carId);
    if(!c) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.style.display = 'none';
    document.body.appendChild(input);
    input.addEventListener('change', (ev) => {
      const files = Array.from(ev.target.files || []);
      if(files.length === 0){ input.remove(); return; }
      const maxBytes = 800 * 1024;  // 800 ko/photo cap pour rester localStorage-friendly
      let added = 0, skipped = 0;
      const proceed = () => {
        const idx = (State.garage || []).findIndex(x => x.id === carId);
        if(idx === -1){ input.remove(); return; }
        const car = State.garage[idx];
        const photos = Array.isArray(car.photos) ? car.photos.slice() : [];
        let pending = files.length;
        files.forEach((file) => {
          if(file.size > maxBytes){
            skipped++; pending--; if(pending === 0) finalize();
            return;
          }
          const reader = new FileReader();
          reader.onload = (e) => {
            photos.push({
              id: 'p' + Date.now() + '_' + Math.floor(Math.random() * 1000),
              name: file.name,
              dataUrl: e.target.result,
              addedAt: Date.now()
            });
            added++; pending--;
            if(pending === 0) finalize();
          };
          reader.onerror = () => { skipped++; pending--; if(pending === 0) finalize(); };
          reader.readAsDataURL(file);
        });
        function finalize(){
          car.photos = photos;
          car.photosCount = photos.length;
          State.garage[idx] = car;
          if(!safePersistGarage()){ input.remove(); return; }
          input.remove();
          // Re-render le sheet voiture courant
          if(State.sheetView === 'garageCar' || State.sheetView === null){
            Sheet.open('garageCar', car);
          }
          setTimeout(() => {
            const msg = skipped > 0
              ? `${added} photo${added > 1 ? 's' : ''} ajoutée${added > 1 ? 's' : ''} · ${skipped} ignorée${skipped > 1 ? 's' : ''} (> 800 ko)`
              : `${added} photo${added > 1 ? 's' : ''} ajoutée${added > 1 ? 's' : ''}.`;
            Sheet.open('toast', msg);
          }, 340);
        }
      };
      proceed();
    });
    input.click();
  },

        name: f.tunerName,
        categories: [...(f.tunerCategories || [])]
      } : (f.tunerName === '__none__' ? { name: '__none__', categories: [] } : null)
    };
    State.garage[idx] = car;
    if(!safePersistGarage()){ SaleListingFormState._submitting = false; return; }
    const carCopy = car;
    Sheet.close();
    setTimeout(() => {
      resetSaleListingForm();
      if(State.activeTab === 'garage') renderGaragePage();
      showToastFloat(`Annonce publiée pour « ${carCopy.brand} ${carCopy.model} » \u00b7 90 jours d\u2019exposition.`);
    }, 340);
  },
  saleAuctionFormChange(field, value){
    if(!field || typeof SaleAuctionFormState[field] === 'undefined') return;
    SaleAuctionFormState[field] = String(value || '');
    const btn = document.querySelector('.sheet-actions [data-action="saleAuctionFormSubmit"]');
    if(btn){
      const valid = saleAuctionFormIsValid();
      btn.disabled = !valid;
      btn.textContent = valid ? "Lancer l\u2019enchère" : 'Estimation basse et haute requises';
    }
    // Re-render des boutons de durée (sélection visuelle)
    if(field === 'durationDays' && SaleAuctionFormState.carId){
      Sheet.open('saleAuctionForm', SaleAuctionFormState.carId);
    }
  },
  saleAuctionFormSubmit(){
    if(!saleAuctionFormIsValid()) return;
    if(SaleAuctionFormState._submitting) return;
    SaleAuctionFormState._submitting = true;
    const f = SaleAuctionFormState;
    const idx = (State.garage || []).findIndex(x => x.id === f.carId);
    if(idx === -1){ resetSaleAuctionForm(); Sheet.close(); return; }
    const car = State.garage[idx];
    const now = Date.now();
    const durDays = parseInt(f.durationDays, 10) || 14;
    car.saleStatus = 'auction';
    car.saleData = {
      mode: 'auction',
      startedAt: now,
      expiresAt: now + durDays * 86400000,
      estimateLow: parseInt(f.estimateLow, 10) || 0,
      estimateHigh: parseInt(f.estimateHigh, 10) || 0,
      reservePrice: parseInt(f.reservePrice, 10) || 0,
      durationDays: durDays,
      narrative: f.narrative.trim() || '',
      currentBid: 0,
      bidCount: 0,
      tuner: (f.tunerName && f.tunerName !== '__none__') ? {
        name: f.tunerName,
        categories: [...(f.tunerCategories || [])]
      } : (f.tunerName === '__none__' ? { name: '__none__', categories: [] } : null)
    };
    State.garage[idx] = car;
    if(!safePersistGarage()){ SaleAuctionFormState._submitting = false; return; }
    const carCopy = car;
    Sheet.close();
    setTimeout(() => {
      resetSaleAuctionForm();
      if(State.activeTab === 'garage') renderGaragePage();
      showToastFloat(`Enchère lancée pour « ${carCopy.brand} ${carCopy.model} » \u00b7 ${durDays} jours.`);
    }, 340);
  },
  cancelSale(id){
    const idx = (State.garage || []).findIndex(x => x.id === id);
    if(idx === -1) return;
    const car = State.garage[idx];
    const modeLabel = car.saleStatus === 'auction' ? 'l\u2019enchère' : 'l\u2019annonce';
    showConfirm({
      tag: 'à confirmer',
      tone: 'warning',
      title: `Annuler ${modeLabel} ?`,
      message: `« ${car.brand} ${car.model} » revient au Garage. Tu pourras la remettre en vente à tout moment.`,
      confirmLabel: 'Annuler la mise en vente',
      cancelLabel: 'Continuer la vente',
      onConfirm: () => {
        car.saleStatus = null;
        car.saleData = null;
        State.garage[idx] = car;
        if(!safePersistGarage()) return;
        if(State.activeTab === 'garage') renderGaragePage();
        showToastFloat(`Mise en vente annulée. « ${car.brand} ${car.model} » revient au Garage.`);
      }
    });
  },
  markAsSold(id){
    const c = (State.garage || []).find(x => x.id === id);
    if(!c) return;
    Sheet.open('soldForm', id);
  },
  soldFormChange(field, value){
    if(!field || typeof SoldFormState[field] === 'undefined') return;
    SoldFormState[field] = String(value || '');
    const btn = document.querySelector('.sheet-actions [data-action="soldFormSubmit"]');
    if(btn){
      const valid = soldFormIsValid();
      btn.disabled = !valid;
      btn.textContent = valid ? 'Archiver dans mes ventes' : 'Prix et date requis';
    }
  },
  soldFormSubmit(){
    if(!soldFormIsValid()) return;
    if(SoldFormState._submitting) return;
    SoldFormState._submitting = true;
    const f = SoldFormState;
    const idx = (State.garage || []).findIndex(x => x.id === f.carId);
    if(idx === -1){ resetSoldForm(); Sheet.close(); return; }
    const car = State.garage[idx];
    const saleSnapshot = car.saleData || {};
    car.saleStatus = 'sold';
    car.saleData = Object.assign({}, saleSnapshot, {
      soldAt: new Date(f.soldDate).getTime(),
      soldPrice: parseInt(f.soldPrice, 10) || 0,
      buyerNote: f.buyerNote.trim() || ''
    });
    State.garage[idx] = car;
    if(!safePersistGarage()){ SoldFormState._submitting = false; return; }
    const carCopy = car;
    Sheet.close();
    setTimeout(() => {
      resetSoldForm();
      if(State.activeTab === 'garage') renderGaragePage();
      showToastFloat(`« ${carCopy.brand} ${carCopy.model} » archivée dans tes ventes \u00b7 ${fmtPrice(carCopy.saleData.soldPrice)}.`);
    }, 340);
  },
  removeFromGarage(id){
    const idx = State.garage.findIndex(x => x.id === id);
    if(idx === -1) return;
    const c = State.garage[idx];
    const services = (c.services || []).length;
    const photos = (c.photos || []).length;
    const docs = (c.docs || []).length;
    const hasContent = services + photos + docs > 0;
    const detail = hasContent
      ? `${services} entretien${services > 1 ? 's' : ''} \u00b7 ${photos} photo${photos > 1 ? 's' : ''} \u00b7 ${docs} document${docs > 1 ? 's' : ''} \u2014 tout sera perdu.`
      : null;
    showConfirm({
      tag: 'définitif',
      tone: 'danger',
      title: `Retirer « ${c.brand} ${c.model} » du Garage ?`,
      message: hasContent
        ? `Cette voiture quitte le carnet, avec son dossier d\u2019entretien et ses archives. Sans retour possible.`
        : `Cette voiture quitte le carnet. Tu pourras la re-saisir plus tard si tu changes d\u2019avis.`,
      detail: detail,
      confirmLabel: 'Retirer',
      cancelLabel: 'Garder',
      onConfirm: () => {
        State.garage.splice(idx, 1);
        safePersistGarage();
        if(typeof renderKpis === 'function') renderKpis();
        if(State.activeTab === 'garage') renderGaragePage();
        showToastFloat(`« ${c.brand} ${c.model} » retirée du Garage.`);
      }
    });
  }
};

function renderEmptyState(opts){
  opts = opts || {};
  const showOrnament = opts.ornament !== false;
  const ornamentHtml = showOrnament ? `<div class="empty-state-ornament">${esc(opts.ornament || '·')}</div>` : '';
  const titleHtml = opts.title ? `<div class="empty-state-title">${esc(opts.title)}</div>` : '';
  const textHtml = opts.text ? `<div class="empty-state-text">${esc(opts.text)}</div>` : '';
  let ctaHtml = '';
  if(opts.cta){
    const ctaClass = 'empty-state-cta' + (opts.cta.primary ? ' primary' : '');
    const dataAttrs = (opts.cta.dataAttrs || []).map(a => `${esc(a.name)}="${esc(a.value)}"`).join(' ');
    ctaHtml = `<button class="${ctaClass}" data-action="${esc(opts.cta.action)}" ${dataAttrs}>${esc(opts.cta.label)}</button>`;
  }
  return `<div class="empty-state">${ornamentHtml}${titleHtml}${textHtml}${ctaHtml}</div>`;
}

function renderKpis(){
  // Lot 16 — KPI bar refonte φ : 1 hero KPI (Voitures au Garage) + 4 compactes en grid 2×2.
  // Calcule dynamiquement les valeurs depuis State pour rester en phase.
  // v6.15 : KPI "Voitures au Garage" + Cote = owned only (wishlist exclus)
  const allGarage = State.garage || [];
  const garage = allGarage.filter(c => c.ownership !== 'wishlist');
  const wishlist = allGarage.filter(c => c.ownership === 'wishlist');
  const garageValue = garage.reduce((acc, c) => acc + (c.cote || 0), 0);
  const garageValueLabel = garageValue >= 1000000
    ? (garageValue / 1000000).toFixed(2).replace(/\.0+$/, '').replace(/(\.\d)0$/, '$1') + ' M\u202F€ estimés'
    : (garageValue / 1000).toFixed(0) + ' k\u202F€ estimés';
  const alertsActiveCount = (State.alerts || []).filter(a => !a.paused).length;
  const alertsPausedCount = (State.alerts || []).filter(a => a.paused).length;
  const alertsDelta = alertsPausedCount > 0 ? alertsPausedCount + ' en pause' : 'toutes actives';
  const dynamicKpis = [
    {label:'Voitures au Garage', value: String(garage.length), delta: garage.length > 0 ? garageValueLabel : 'Garage vide', mood: garage.length > 0 ? 'positive' : 'neutral', target:'garage'},
    {label:'Alertes actives',    value: String(alertsActiveCount), delta: alertsDelta, mood: 'neutral', target:'alerts'},
    {label:'Détectées 7 j',      value: String((State.matches || []).length), delta:'+4 vs sem. dern.', mood:'positive', target:'matches'},
    {label:'Enchères suivies',   value: String((State.watchedAuctionIds || []).length), delta:'2 dans 7 jours', mood:'neutral', target:'auctions'},
    {label:'Modèles surveillés', value: String((State.watched || []).length), delta:'+1 ce mois', mood:'neutral', target:'watched'}
  ];
  const stripEl = document.querySelector('.kpi-strip');
  if(!stripEl) return;
  // Lot 16 — activer le layout grid
  stripEl.classList.add('is-grid');
  const [heroKpi, ...compactKpis] = dynamicKpis;
  const renderCard = (k, variant) => `
    <div class="kpi-card ${variant}" data-action="kpiNav" data-target="${esc(k.target || '')}" role="button" tabindex="0">
      <div class="kpi-label">${esc(k.label)}</div>
      <div class="kpi-value">${esc(k.value)}</div>
      <div class="kpi-delta ${k.mood === 'positive' ? '' : k.mood === 'negative' ? 'neg' : 'neutral'}">${esc(k.delta)}</div>
    </div>
  `;
  const heroHtml = heroKpi ? renderCard(heroKpi, 'is-hero') : '';
  const compactHtml = compactKpis.map(k => renderCard(k, 'is-compact')).join('');
  stripEl.innerHTML = heroHtml + compactHtml;
}

function renderNotifBadge(){
  const badge = document.getElementById('topbar-notif-badge');
  if(!badge) return;
  // Comptage : matches "frais" (détectés dans les dernières 24h — pattern "il y a Xh" ou "il y a Xmin")
  const fresh = (State.matches || []).filter(m => /^il y a \d+ ?(h|min)/.test(m.ago || ''));
  const n = fresh.length;
  if(n === 0){
    badge.style.display = 'none';
    badge.textContent = '';
  } else {
    badge.style.display = '';
    badge.textContent = n > 9 ? '9+' : String(n);
  }
}

function updateTabNav(){
  document.querySelectorAll('.tabnav-item').forEach(el => {
    const t = el.dataset.tab;
    el.classList.toggle('active', t === State.activeTab);
  });
  // v6.16 : Badge completion (point orange polo discret) sur tab Garage
  const garageTabEl = document.querySelector('.tabnav-item[data-tab="garage"]');
  if (garageTabEl) {
    const needsBadge = State.completionEnabled !== false
      && typeof countIncompleteOwnedCars === 'function'
      && countIncompleteOwnedCars() > 0;
    garageTabEl.classList.toggle('has-completion-badge', needsBadge);
  }
  // Live badge sur tab Enchères : nombre de lots LIVE encore actifs (effective offset > 0)
  const encheresTab = document.querySelector('.tabnav-item[data-tab="encheres"]');
  if(!encheresTab) return;
  const wrap = encheresTab.querySelector('.tabnav-icon-wrap');
  if(!wrap) return;
  const existing = wrap.querySelector('.tabnav-live-badge, .tabnav-live-badge-dot');
  if(existing) existing.remove();
  // Compute live count
  const elapsed = (typeof getElapsedHours === 'function') ? getElapsedHours() : 0;
  const liveCount = AUCTIONS.filter(a => a.status === 'live' && (a.hOffset - elapsed) > 0).length;
  if(liveCount > 0){
    const badge = document.createElement('span');
    badge.className = 'tabnav-live-badge';
    badge.textContent = String(liveCount);
    wrap.appendChild(badge);
  }
}

function renderEncheresPage(){
  const m = document.querySelector('main.main');
  if(!m) return;
  if(!affutShellSnapshot) affutShellSnapshot = m.innerHTML;
  const filter = State.encheresFilter || 'all';
  // Mes enchères actives (depuis le Garage)
  const myAuctions = (State.garage || []).filter(c => c.saleStatus === 'auction');
  // v6.3 : priorité live data si dispo, sinon fallback AUCTIONS mock
  const auctionsSource = (State.liveAuctions && State.liveAuctions.length > 0)
    ? State.liveAuctions
    : ((typeof AUCTIONS !== 'undefined') ? AUCTIONS : []);
  // Si live mode mais pas encore chargé, déclenche le fetch
  if (State.liveMode && !State.liveAuctions && !State._loadingAuctions) {
    loadAuctionsLive();
  }
  const live = auctionsSource.filter(a => a.status === 'live' && matchesEncheresFilter(a, filter)).sort((a,b) => a.hOffset - b.hOffset);
  const upcoming = auctionsSource.filter(a => a.status === 'upcoming' && matchesEncheresFilter(a, filter)).sort((a,b) => a.hOffset - b.hOffset);
  const sold = auctionsSource.filter(a => a.status === 'sold' && matchesEncheresFilter(a, filter)).sort((a,b) => b.hOffset - a.hOffset);
  const filterIsActive = filter !== 'all';
  const filterChips = ENCHERES_PRICE_FILTERS.map(f => `
    <button class="encheres-filter-chip ${filter === f.id ? 'selected' : ''}" data-action="setEncheresFilter" data-filter="${esc(f.id)}">${esc(f.label)}</button>

const LISTING_TIERS = [
  {id:'all',              label:'Tous'},
  {id:'daily',            label:'Daily'},
  {id:'driver',           label:'Driver'},
  {id:'modern-classic',   label:'Modern Classic'},
  {id:'investment',       label:'Investment'}
];

function listingMatchesTier(l, tierId){
  if(!tierId || tierId === 'all') return true;
  return l.tier === tierId;
}

function listingMatchesSearch(l, q){
  if(!q) return true;
  const needle = normalizeForSearch(q);
  if(!needle) return true;
  const hay = normalizeForSearch((l.mk || '') + ' ' + (l.mo || '') + ' ' + (l.src || '') + ' ' + (l.ci || ''));
  return hay.indexOf(needle) !== -1;
}

function renderListingsPage(){
  const m = document.querySelector('main.main');
  if(!m) return;
  if(!affutShellSnapshot) affutShellSnapshot = m.innerHTML;
  const filter = State.listingsFilter || 'all';
  const search = State.listingsSearch || '';
  // v6.0 : priorité live data si dispo, sinon fallback mock LISTINGS
  const allListings = (State.liveListings && State.liveListings.length > 0)
    ? State.liveListings
    : (State.liveMode && State._loadingListings ? [] : ((typeof LISTINGS !== 'undefined') ? LISTINGS : []));
  // Si live mode mais pas encore chargé, déclenche le fetch en arrière-plan
  if (State.liveMode && !State.liveListings && !State._loadingListings) {
    loadListingsLive();
  }
  // Mes annonces actives (depuis le Garage)
  const myListings = (State.garage || []).filter(c => c.saleStatus === 'listing');
  const filtered = allListings
    .filter(l => listingMatchesTier(l, filter))
    .filter(l => listingMatchesSearch(l, search))
    .sort((a, b) => (b.sc || 0) - (a.sc || 0));
  const filterChips = LISTING_TIERS.map(t => `
    <button class="encheres-filter-chip ${filter === t.id ? 'selected' : ''}" data-action="setListingsFilter" data-filter="${esc(t.id)}">${esc(t.label)}</button>
  `).join('');
  const hasQuery = (search || '').trim().length > 0;
  const hasFilter = filter !== 'all';
  let body;
  // v6.0 : Si on est en mode live et qu'on charge encore, afficher skeleton
  // v6.4 : bouton "Voir plus"
  const remaining = State.liveListingsTotal && State.liveListings
    ? Math.max(0, State.liveListingsTotal - State.liveListings.length)
    : 0;
  const nextBatch = Math.min(LISTINGS_PAGE_SIZE, remaining);
  const loadMoreHtml = (State.liveMode && State.liveListingsHasMore && State.liveListings && State.liveListings.length > 0)
    ? `<div class="listings-loadmore">
         <button class="sheet-btn full" data-action="loadMoreListings"${State._loadingListings ? ' disabled' : ''}>
           ${State._loadingListings ? 'Chargement\u2026' : `Voir plus \u00b7 ${nextBatch} suivantes`}
         </button>
       </div>`
    : '';
  if (State.liveMode && State._loadingListings && (!State.liveListings || State.liveListings.length === 0)) {
    body = renderListingsSkeleton(5);
  } else if(filtered.length === 0){
    if(hasQuery){
      body = renderEmptyState({
        title: 'Aucun résultat pour « ' + search + ' »',
        text: hasFilter ? 'Élargis le tier ou modifie la recherche.' : 'Modifie ta recherche pour parcourir l\u2019ensemble du stock.'
      });
    } else {
      body = renderEmptyState({
        title: 'Aucune voiture dans ce tier',
        text: 'Élargis le tier pour voir plus de voitures du stock.'
      });
    }
  } else {
    body = `<div class="listings-feed">${filtered.map(renderListingCard).join('')}</div>` + loadMoreHtml;
  }
  m.innerHTML = `
    <section class="hero">
      <div class="hero-tag">ANNONCES</div>
      <h1 class="hero-title">Le stock.</h1>
      <p class="hero-sub">${allListings.length} voitures sélectionnées · marchands premium et marketplaces collector.</p>
    </section>
    ${myListings.length > 0 ? `
      <section class="section section-my-sales">
        <div class="section-header">
          <h2 class="section-title">Tes annonces</h2>
          <span class="section-count">${myListings.length} en ligne · suis-les depuis ta fiche</span>
        </div>
        <div class="listings-feed">
          ${myListings.map(renderMyListingCard).join('')}
        </div>
      </section>
    ` : ''}
    <section class="section">
      ${myListings.length > 0 ? `
        <div class="section-header" style="margin-bottom:var(--s-2)">
          <h2 class="section-title">Le marché</h2>
          <span class="section-count">stock public</span>

      <div class="listings-search-wrap">

  // Format équivalent fmtPrice mais isolé pour ne pas dépendre de l'order de boot

  return eur.toLocaleString('fr-FR').replace(/\u00a0/g, ' ') + ' \u20ac';
}

// ─── Lot 13 (Phase α refactor) — CarnetOverlay factory ─────────────────
// Composant réutilisable pour créer un mode plein écran avec ouverture/
// fermeture standardisée. Utilisé par les Lots 14+. Les Lots 5/6/7
// conservent leurs propres window.CARNET_X_DEMO indépendants.
//
// Convention :
//   - L'élément overlay reçoit la classe `.carnet-overlay`.
//   - Toute interaction avec un élément `data-action="closeOverlay"`
//     déclenche la fermeture (pas besoin d'un handler manuel par mode).
//   - Le body scroll est verrouillé pendant l'ouverture, restauré à la
//     fermeture.
//
// Usage type pour un nouveau mode (Lot 14+) :
//   window.CARNET_FOO_DEMO = CarnetOverlay.create(
//     'carnet-foo-overlay',
//     function() { return renderFooContent(); }
//   );
//   CARNET_FOO_DEMO.open();   // ouvre
//   CARNET_FOO_DEMO.close();  // ferme (ou clic sur [data-action=closeOverlay])
//
window.CarnetOverlay = {
  create: function(overlayId, renderFn) {
    return {
      open: function() {
        let overlay = document.getElementById(overlayId);
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = overlayId;
          overlay.className = 'carnet-overlay';
          document.body.appendChild(overlay);
          overlay.addEventListener('click', function(e) {
            const closeBtn = e.target.closest('[data-action="closeOverlay"]');
            if (closeBtn) {
              overlay.setAttribute('hidden', '');
              document.body.style.overflow = '';
            }
          });
        }
        overlay.innerHTML = renderFn();
        overlay.removeAttribute('hidden');
        document.body.style.overflow = 'hidden';
      },
      close: function() {
        const overlay = document.getElementById(overlayId);
        if (overlay) overlay.setAttribute('hidden', '');
        document.body.style.overflow = '';
      }
    };
  }
};

// ─── Lot 14 (Phase α) — Filtre archétype Garage ─────────────────────
// inferCarArchetypes(car) : retourne array d'archetype IDs basé sur les
// caractéristiques de la voiture. Multi-tag — une voiture peut matcher
// plusieurs archétypes (ex: Porsche 911 R 2017 peu kilométrée → track_rat
// + collector + enthusiast).
//
// IDs cohérents avec COLLECTOR_PROFILES : collector, flipper, track_rat,
// builder, enthusiast, driver, non_driver, social.
function inferCarArchetypes(car){
  if(!car) return [];
  const set = new Set();
  const brand = (car.brand || '').toLowerCase();
  const model = (car.model || '').toLowerCase();
  const fullName = brand + ' ' + model;
  const year = car.year || 0;
  const km = car.km || 0;
  const cote = car.cote || 0;

  // Track Rat — voitures circuit
  if(/\bgt3\b|\bgt2\b|\bcup\b|trophy|\brs\b|sport evo|black series|caterham|lotus|bac mono|ktm x-bow|radical|porsche r\b|\b911 r\b|cayman gt4|m4 csl/i.test(fullName)){
    set.add('track_rat');
  }

  // Builder / Outlaw — préparateurs et restomods
  if(/singer|brabus|mansory|\bruf\b|alpina|liberty walk|restomod|tuner|wide ?body|hennessey|gunther werks|tuthill/i.test(fullName)){
    set.add('builder');
  }

  // Driver / Gros rouleur — kilométrage élevé, breaks, berlines GT
  if(km > 100000){
    set.add('driver');
  }
  if(/\bs-class\b|7 ?series|panamera|continental|ghost|phantom|maybach|\bcls\b|break|estate|wagon|touring|avant|sportwagon|shooting brake/i.test(fullName)){
    set.add('driver');
  }

  // Non-Driver / Gardien — hypercars + low km, ou cote très élevée + low km
  if(cote >= 500000 && km < 10000){
    set.add('non_driver');
  }
  if(/zonda|huayra|veyron|chiron|valkyrie|laferrari|918 spyder|p1|senna|jesko|tuatara|jewel|battista|nevera|evija|t.50|aventador svj|sf90|monza sp/i.test(fullName)){
    set.add('non_driver');
  }

  // Collector — classics et valeurs de référence
  if(year && year < 1990){
    set.add('collector');
  }
  if(cote >= 200000){
    set.add('collector');
  }

  // Enthusiast — séries limitées, spécifications particulières
  if(/limited|special|anniversary|jubilee|carrera gt|enzo|\bf50\b|\bf40\b|carrera rs|stradale|aperta|spyder|targa florio|speedster|gma|chassis|matching/i.test(fullName)){
    set.add('enthusiast');
  }

  // Flipper — opportunité de revente (trend up)
  if(car.trend === 'up'){
    set.add('flipper');
  }

  // Social / Rallye — supercars exotiques connues des Gumball
  if(/aventador|huracan|sf90|\b296\b|\b812\b|720s|gt-r|\bgtr\b|amg gt|\bm8\b|\brs6\b|\brs7\b|gallardo|murcielago|diablo|countach|defender|g.?wagon|g 63|g63|urus/i.test(fullName)){
    set.add('social');
  }

  return Array.from(set);
}

// getGarageArchetypeCounts(cars) : retourne Map archetypeId → count.
function getGarageArchetypeCounts(cars){
  const counts = {};
  (cars || []).forEach(c => {
    const archs = inferCarArchetypes(c);
    archs.forEach(a => { counts[a] = (counts[a] || 0) + 1; });
  });
  return counts;
}

// applyGarageArchetypeFilter(cars, activeFilters) : filtre OR.
// Si activeFilters est vide, retourne cars inchangé.
function applyGarageArchetypeFilter(cars, activeFilters){
  if(!activeFilters || activeFilters.length === 0) return cars;
  const filtersSet = new Set(activeFilters);
  return (cars || []).filter(c => {
    const archs = inferCarArchetypes(c);
    return archs.some(a => filtersSet.has(a));
  });
}

// renderGarageArchetypeFilters(archetypeCounts, activeFilters) : HTML chips.
// Affiche uniquement les archétypes présents dans le garage (count > 0).
function renderGarageArchetypeFilters(archetypeCounts, activeFilters){
  const presentArchetypes = Object.keys(archetypeCounts).filter(id => archetypeCounts[id] > 0);
  if(presentArchetypes.length === 0) return '';
  // Tri : actifs d'abord, puis par count décroissant
  const activeSet = new Set(activeFilters || []);
  presentArchetypes.sort((a, b) => {
    const aActive = activeSet.has(a) ? 1 : 0;
    const bActive = activeSet.has(b) ? 1 : 0;
    if(aActive !== bActive) return bActive - aActive;
    return archetypeCounts[b] - archetypeCounts[a];
  });
  const chipsHtml = presentArchetypes.map(id => {
    const profile = COLLECTOR_PROFILES.find(p => p.id === id);
    if(!profile) return '';
    const isActive = activeSet.has(id);
    const count = archetypeCounts[id];
    return `<button type="button"
      class="garage-archetype-chip${isActive ? ' is-active' : ''}"
      data-action="toggleGarageArchetype"
      data-archetype="${esc(id)}"
      aria-pressed="${isActive}">
      <span>${esc(profile.chip)}</span>
      <span class="garage-archetype-chip-count">${count}</span>
    </button>`;
  }).join('');
  return `<div class="garage-archetype-filters" aria-label="Filtres par archétype">
    <span class="garage-archetype-filters-label">Profil</span>
    ${chipsHtml}
  </div>`;
}

function renderGaragePage(){
  const m = document.querySelector('main.main');
  if(!m) return;
  if(!affutShellSnapshot) affutShellSnapshot = m.innerHTML;
  const allGarage = State.garage || [];
  // v6.15 : split owned vs wishlist (wishlist exempt du carnet/cote)
  const garage = allGarage.filter(c => c.ownership !== 'wishlist');
  const wishlistCars = allGarage.filter(c => c.ownership === 'wishlist');
  // Buckets par statut (sur owned uniquement — wishlist n'a pas de sale flow)
  const activeCars = garage.filter(c => !c.saleStatus || c.saleStatus === null);
  const inSaleCars = garage.filter(c => c.saleStatus === 'listing' || c.saleStatus === 'auction');
  const soldCars = garage.filter(c => c.saleStatus === 'sold').sort((a, b) => {
    return (b.saleData?.soldAt || 0) - (a.saleData?.soldAt || 0);
  });
  // Lot 14 — filtre archétype (s'applique aux 3 buckets vivants, pas aux archives)
  const _archetypeFilters = State.garageArchetypeFilter || [];
  const _archetypeCounts = getGarageArchetypeCounts([...activeCars, ...inSaleCars, ...wishlistCars]);
  const _filteredActiveCars = applyGarageArchetypeFilter(activeCars, _archetypeFilters);
  const _filteredInSaleCars = applyGarageArchetypeFilter(inSaleCars, _archetypeFilters);
  const _filteredWishlistCars = applyGarageArchetypeFilter(wishlistCars, _archetypeFilters);
  const _hasFilterMismatch = _archetypeFilters.length > 0
    && _filteredActiveCars.length === 0
    && _filteredInSaleCars.length === 0
    && _filteredWishlistCars.length === 0
    && (activeCars.length + inSaleCars.length + wishlistCars.length) > 0;
  // Calculs collection ACTIVE (n'inclut pas les vendues)
  const valuableCars = [...activeCars, ...inSaleCars]; // collection vivante
  const totalValue = valuableCars.reduce((acc, c) => acc + (c.cote || 0), 0);
  const totalPaid = valuableCars.reduce((acc, c) => acc + (c.paidPrice || 0), 0);
  const delta = totalValue - totalPaid;
  const deltaPercent = totalPaid > 0 ? ((delta / totalPaid) * 100) : 0;
  const deltaSign = delta >= 0 ? '+' : '−';
  const deltaColor = delta >= 0 ? 'var(--vert-anglais)' : '#9c2a2a';
  // KPI lifetime ventes
  const lifetimeSalesTotal = soldCars.reduce((acc, c) => acc + (c.saleData?.soldPrice || 0), 0);

  let body;
  if(garage.length === 0 && wishlistCars.length === 0){
    body = renderProfileOnboardingBanner() + renderEmptyState({
      title: 'Garage à remplir',
      text: "Entre ta première voiture. Suivi de cote, entretien, photos, factures — tout reste là, accessible. Plus tard, fouille annonces et enchères pour étoffer, ou prépare une revente depuis CARNET.",
      cta: { label: '+ Ajouter ma première voiture', action: 'openAddGarage', primary: true }
    });
  } else {
    const totalDocs = valuableCars.reduce((a,c) => a + (c.docsCount||0), 0);
    const totalPhotos = valuableCars.reduce((a,c) => a + (c.photosCount||0), 0);

    // Section "Mes ventes actives" si applicable (Lot 14 — utilise version filtrée)
    const inSaleSection = _filteredInSaleCars.length > 0 ? `
      <div class="garage-section-divider">
        <span class="garage-section-divider-label">EN VENTE · ${_filteredInSaleCars.length}${_archetypeFilters.length > 0 && _filteredInSaleCars.length < inSaleCars.length ? ' / ' + inSaleCars.length : ''}</span>
      </div>
      <div class="garage-feed">
        ${_filteredInSaleCars.map(renderGarageCard).join('')}
      </div>
    ` : '';

    // Section "Collection" (cars sans sale en cours) (Lot 14 — utilise version filtrée)
    const collectionSection = _filteredActiveCars.length > 0 ? `
      ${_filteredInSaleCars.length > 0 ? `
        <div class="garage-section-divider">
          <span class="garage-section-divider-label">COLLECTION · ${_filteredActiveCars.length}${_archetypeFilters.length > 0 && _filteredActiveCars.length < activeCars.length ? ' / ' + activeCars.length : ''}</span>
        </div>
      ` : ''}
      <div class="garage-feed">
        ${_filteredActiveCars.map(renderGarageCard).join('')}
      </div>
    ` : '';

    // v6.15 : Section Wishlist (Lot 14 — utilise version filtrée)
    const wishlistSection = _filteredWishlistCars.length > 0 ? `
      <div class="garage-section-divider wishlist">
        <span class="garage-section-divider-label">WISHLIST \u00b7 ${_filteredWishlistCars.length}${_archetypeFilters.length > 0 && _filteredWishlistCars.length < wishlistCars.length ? ' / ' + wishlistCars.length : ''}</span>
        <span class="garage-section-divider-meta">${_filteredWishlistCars.length > 1 ? 'voitures suivies' : 'voiture suivie'}</span>
      </div>
      <div class="garage-feed garage-feed-wishlist">
        ${_filteredWishlistCars.map(renderGarageCard).join('')}
      </div>
      <div class="garage-wishlist-note">Les voitures que tu suis sans encore les posséder. Aucun dossier requis — juste un signet pour ne pas oublier.</div>
    ` : '';

    // Lot 14 — empty state si filtre trop strict
    const archetypeEmptyState = _hasFilterMismatch ? `
      <div class="garage-archetype-empty-state">
        Aucune voiture ne matche ce filtre.<br>
        <span class="garage-archetype-empty-state-clear" data-action="clearGarageArchetypeFilter">Tout afficher \u2192</span>
      </div>
    ` : '';

    // Section "Archives — Vendues"
    const archivesSection = soldCars.length > 0 ? `
      <div class="garage-section-divider archives">
        <span class="garage-section-divider-label">ARCHIVES · ${soldCars.length} vendue${soldCars.length > 1 ? 's' : ''}</span>
        ${lifetimeSalesTotal > 0 ? `<span class="garage-section-divider-meta">${esc(fmtPrice(lifetimeSalesTotal))} cumulés</span>` : ''}
      </div>
      <div class="garage-archives-list">
        ${soldCars.map(renderSoldCard).join('')}
      </div>
      <div class="garage-archives-note">Une voiture qui sort, mais ses souvenirs restent en mémoire.</div>
    ` : '';

    body = `
      <div class="garage-summary">
        <div class="garage-summary-label">VALEUR ESTIM\u00c9E \u00b7 COTE CARNET</div>
        <div class="garage-summary-value">${esc(fmtPrice(totalValue))}</div>
        ${valuableCars.length > 0 ? `<div class="garage-summary-delta" style="color:${deltaColor}">${deltaSign} ${esc(fmtPrice(Math.abs(delta)))} \u00b7 ${deltaSign}${Math.abs(deltaPercent).toFixed(1)} % depuis acquisition</div>` : ''}
        ${renderGarageSparkline()}
        <div class="garage-summary-meta">
          <span>${valuableCars.length} voiture${valuableCars.length === 1 ? '' : 's'}</span>
          <span>${totalDocs} document${totalDocs === 1 ? '' : 's'}</span>
          <span>${totalPhotos} photo${totalPhotos === 1 ? '' : 's'}</span>
        </div>
        ${inSaleCars.length > 0 ? `<div class="garage-summary-sale">${inSaleCars.length} en vente \u00b7 suis-les depuis ta fiche voiture</div>` : ''}
        ${soldCars.length > 0 ? `<div class="garage-summary-lifetime">${soldCars.length} vendue${soldCars.length > 1 ? 's' : ''} cumul\u00e9e${soldCars.length > 1 ? 's' : ''} \u00b7 ${esc(fmtPrice(lifetimeSalesTotal))}</div>` : ''}
      </div>
      ${renderGarageDeadlinesBlock()}
      <button class="garage-card-add garage-card-add-top" data-action="openAddGarage" onclick="if(window.Actions && window.Actions.openAddGarage) window.Actions.openAddGarage();">
        <span class="garage-card-add-plus">+</span>
        <span class="garage-card-add-label">Ajouter une voiture</span>
      </button>
      ${renderProfileOnboardingBanner()}
      ${(() => { const _c = findCarNeedingCompletion(); return _c ? renderCompletionBanner(_c) : ''; })()}
      ${renderGarageAdviceSection(activeCars)}
      ${renderGarageArchetypeFilters(_archetypeCounts, _archetypeFilters)}
      ${archetypeEmptyState}
      ${inSaleSection}
      ${collectionSection}
      ${wishlistSection}
      ${archivesSection}
      ${renderGarageMemoriesSection()}
      ${renderGarageTaxTimingSection()}
      ${renderGarageBlockchainSection()}
      ${renderGarageMarketOppsSection()}
      ${renderGarageTribuSection()}
      ${renderGarageLedgerSection()}
      ${renderGarageCirclesSection()}
    `;
  }
  m.innerHTML = `
    <section class="hero hero-garage">
      <div class="hero-garage-header">
        <span class="garage-kicker">Garage <span class="garage-kicker-count">\u00b7 ${padCarCount(activeCars.length)}</span></span>
        <span class="garage-sync">SYNC <span class="garage-sync-dot">\u25cf</span></span>
      </div>
      <h1 class="hero-title">Ma collection.</h1>
      <p class="hero-sub"><em class="garage-sub-lead">${frCarsCount(activeCars.length)}</em> Leur cote, leur carnet, leur place sur le march\u00e9.</p>
      <a class="garage-discover-link" data-action="openDiscoverCarnet">Pourquoi CARNET \u2192</a>
      ${(State.userProfiles || []).length === 0 ? `<a class="garage-discover-link" data-action="openSelectProfile" style="margin-left:14px;color:var(--gris);border-bottom-color:var(--gris);">Mon profil \u2192</a>` : ''}
      ${(State.userProfiles || []).length > 0 ? `
        <div class="hero-profile-chips">
          ${(State.userProfiles || []).map(id => {
            const p = COLLECTOR_PROFILES.find(x => x.id === id);
            return p ? `<span class="hero-profile-chip">${esc(p.chip)}</span>` : '';
          }).join('')}
        </div>
      ` : ''}
    </section>
    <section class="section">
      ${body}
    </section>
  `;
}

function renderSoldCard(c){
  const d = c.saleData || {};
  const soldDate = d.soldAt ? new Date(d.soldAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
  const modeLabel = d.mode === 'auction' ? 'ENCHÈRE' : 'ANNONCE';
  const initial = (c.brand || '?').charAt(0);
  return `
    <button class="sold-card" data-action="openSoldDetail" data-id="${esc(c.id)}">
      <div class="sold-card-thumb"><span>${esc(initial)}</span></div>
      <div class="sold-card-body">
        <div class="sold-card-top">
          <span class="sold-card-name">${esc(c.brand)} ${esc(c.model)}</span>
          <span class="sold-card-year">${c.year || ''}</span>
        </div>
        <div class="sold-card-meta">${esc(modeLabel)} · vendue ${esc(soldDate)}</div>
        <div class="sold-card-price">${esc(fmtPrice(d.soldPrice || 0))}</div>
      </div>
    </button>
  `;
}

function renderGarageCard(c){
  // Badge mise en vente
  let saleBadgeHtml = '';
  if(c.saleStatus === 'listing' && c.saleData){
    const days = getDaysRemaining(c.saleData.expiresAt);
    saleBadgeHtml = `<div class="garage-card-sale-badge listing">À VENDRE · ANNONCE · J-${days}</div>`;
  } else if(c.saleStatus === 'auction' && c.saleData){
    const days = getDaysRemaining(c.saleData.expiresAt);
    saleBadgeHtml = `<div class="garage-card-sale-badge auction">AUX ENCHÈRES · J-${days}</div>`;
  }
  // Tag header : MARQUE · ANNÉE [· FINITION]
  const tagParts = [c.brand, c.year];
  if(c.finish) tagParts.push(c.finish);
  const topTag = tagParts.filter(p => p).map(p => esc(String(p).toUpperCase())).join(' · ');
  // Subline : km · couleur (suppression de "Saisie manuelle")
  const sublineParts = [];
  if(c.km && c.km > 0) sublineParts.push(fmtKm(c.km));
  if(c.color && c.color !== '—' && c.color !== 'Anthracite') sublineParts.push(c.color);
  else if(c.color === 'Anthracite') sublineParts.push('Anthracite');
  const subline = sublineParts.join(' · ');
  // Tuner badge (subtle)
  let tunerBadge = '';
  if(c.tuner && c.tuner.name && c.tuner.name !== '__none__'){
    tunerBadge = `<div class="garage-card-tuner">préparée par ${esc(c.tuner.name)}</div>`;
  } else if(c.tuner && c.tuner.name === '__none__'){
    tunerBadge = `<div class="garage-card-tuner garage-card-tuner-origine">d\u2019origine</div>`;
  }
  // Money : fourchette d'estimation + delta achat
  const cote = c.cote || 0;
  const paid = c.paidPrice || 0;
  const delta = cote - paid;
  let deltaCls = 'flat';
  if(delta > paid * 0.05) deltaCls = 'positive';
  else if(delta < -paid * 0.05) deltaCls = 'negative';
  // Fourchette : on prend ce qui est stocké, sinon on recalcule à la volée
  let cRange = c.coteRange;
  if(!cRange && typeof estimateCoteRange === 'function'){
    const _e = estimateCoteRange(c.brand, c.model, c.year, c.km || 0, c.finish, c.tuner && c.tuner.name, c.tuner && c.tuner.categories, c.serviceUpToDate, c.fullServiceHistory, c.hasLeather);
    if(_e) cRange = {low: _e.low, high: _e.high};
  }
  const moneyLeft = cRange
    ? `<div class="garage-card-money-side">
        <div class="garage-card-cote-range">${esc(fmtPrice(cRange.low))} \u2014 ${esc(fmtPrice(cRange.high))}</div>
        <div class="garage-card-label">fourchette CARNET</div>
      </div>`
    : `<div class="garage-card-money-side">
        <div class="garage-card-cote-amount">${esc(fmtPrice(cote))}</div>
        <div class="garage-card-label">cote CARNET</div>
      </div>`;
  const moneyRight = (paid > 0) ? `
    <div class="garage-card-money-side">
      <div class="garage-card-delta ${deltaCls}">${formatDeltaShort(delta)}</div>
      <div class="garage-card-label">sur achat</div>
    </div>
  ` : `
    <div class="garage-card-money-side">
      <div class="garage-card-delta flat">→ à réévaluer</div>
      <div class="garage-card-label">prix payé non renseigné</div>
    </div>
  `;
  // Voix CARNET brève
  const voice = getCardVoice(c);
  const voiceHtml = voice.text ? `
    <div class="garage-card-voice voice-${voice.mode}">
      <em>${esc(voice.text)}</em>
    </div>
  ` : '';
  return `
    <div class="garage-card ${c.saleStatus ? 'in-sale' : ''}" data-action="openGarageCar" data-id="${esc(c.id)}">
      ${saleBadgeHtml}
      ${renderCarThumb(c, 'card')}
      <div class="garage-card-body">
        <div class="garage-card-tag">${topTag}</div>
        <h3 class="garage-card-model">${esc(c.model)}</h3>
        ${subline ? `<div class="garage-card-subline">${esc(subline)}</div>` : ''}
        ${tunerBadge}
        <div class="garage-card-divider"></div>
        <div class="garage-card-money">
          ${moneyLeft}
          ${moneyRight}
        </div>
        ${voiceHtml}
      </div>
    </div>
  `;
}

function renderAuctionCard(a){
  const isWatched = (State.watchedAuctionIds || []).indexOf(a.id) !== -1;
  // Header common to all variants
  const badgeText = formatBadgeText(a.hOffset, a.status);
  let badge;
  if(a.status === 'live'){
    badge = `<span class="auction-card-badge auction-card-badge-live" data-raw-h-offset="${a.hOffset}" data-status="live"><span class="auction-card-badge-live-dot"></span><span class="auction-card-badge-text">${esc(badgeText)}</span></span>`;
  } else if(a.status === 'upcoming'){
    badge = `<span class="auction-card-badge auction-card-badge-upcoming" data-raw-h-offset="${a.hOffset}" data-status="upcoming"><span class="auction-card-badge-text">${esc(badgeText)}</span></span>`;
  } else {
    badge = `<span class="auction-card-badge auction-card-badge-sold" data-raw-h-offset="${a.hOffset}" data-status="sold"><span class="auction-card-badge-text">${esc(badgeText)}</span></span>`;
  }
  const flag = a.country ? getCountryFlag(a.country) : '';
  // Price block varies by status
  let priceBlock;
  if(a.status === 'live'){
    const reserveTxt = a.reserveMet
      ? '<span class="auction-card-reserve auction-card-reserve-met">● Réserve atteinte</span>'
      : '<span class="auction-card-reserve auction-card-reserve-pending">○ Réserve non atteinte</span>';
    priceBlock = `
      <div class="auction-card-price-block">
        <div class="auction-card-price-main">
          <div class="auction-card-price-label">Enchère actuelle</div>
          <div class="auction-card-price-value">${esc(fmtAuctionPrice(a.bidCurrent))}</div>
          ${reserveTxt}
        </div>
        <div class="auction-card-price-aux">
          <div class="auction-card-price-aux-label">Estimation</div>
          <div class="auction-card-price-aux-value">${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        </div>
      </div>
    `;
  } else if(a.status === 'upcoming'){
    priceBlock = `
      <div class="auction-card-price-block">
        <div class="auction-card-price-main">
          <div class="auction-card-price-label">Estimation</div>
          <div class="auction-card-price-value">${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        </div>
      </div>
    `;
  } else {
    // SOLD
    const delta = getSoldDelta(a.soldPrice || a.bidCurrent, a.estimateLow, a.estimateHigh);
    const deltaTxt = delta
      ? `<div class="auction-card-delta auction-card-delta-${delta.mood}">${esc(delta.label)}</div>`
      : '';
    priceBlock = `
      <div class="auction-card-price-block">
        <div class="auction-card-price-main">
          <div class="auction-card-price-label">Vendue</div>
          <div class="auction-card-price-value">${esc(fmtAuctionPrice(a.soldPrice || a.bidCurrent))}</div>
          ${deltaTxt}
        </div>
        <div class="auction-card-price-aux">
          <div class="auction-card-price-aux-label">Estimation</div>
          <div class="auction-card-price-aux-value">${esc(fmtRange(a.estimateLow, a.estimateHigh))}</div>
        </div>
      </div>
    `;
  }
  // Footer stats
  let footerStats;
  if(a.status === 'live'){
    footerStats = `
      <div class="auction-card-stats">
        <span><span class="auction-card-stat-value">${a.bids}</span> enchères</span>
        <span><span class="auction-card-stat-value">${a.watching}</span> suivent</span>
      </div>
    `;
  } else if(a.status === 'upcoming'){
    footerStats = `
      <div class="auction-card-stats">
        <span><span class="auction-card-stat-value">${a.watching}</span> suivent déjà</span>
      </div>
    `;
  } else {
    footerStats = `
      <div class="auction-card-stats">
        <span><span class="auction-card-stat-value">${a.bids}</span> enchères au final</span>
      </div>
    `;
  }
  return `
    <article class="auction-card" data-action="openAuction" data-auction="${esc(a.id)}">
      <div class="auction-card-head">
        ${badge}
        <div class="auction-card-source">
          ${esc(a.source)}
          <span class="auction-card-source-lot">${esc(a.lot)}</span>
        </div>
      </div>
      <div class="auction-card-title">
        <div class="auction-card-brand">${esc(a.brand)}</div>
        <div class="auction-card-model">${esc(a.model)}</div>
      </div>
      <div class="auction-card-meta">
        <span>${esc(a.year)}</span>
        <span class="auction-card-meta-sep">·</span>
        <span>${esc(a.km)} km</span>
        <span class="auction-card-meta-sep">·</span>
        <span>${flag ? flag + ' ' : ''}${esc(a.ci)}</span>
      </div>
      <div class="auction-card-divider"></div>
      ${priceBlock}
      <div class="auction-card-footer">
        ${footerStats}
        <button class="auction-card-watch ${isWatched ? 'watched' : ''}" data-action="toggleWatchAuction" data-auction="${esc(a.id)}" onclick="event.stopPropagation()">${isWatched ? '✓ Suivie' : 'Suivre'}</button>
      </div>
    </article>
  `;
}

// ===== EVENT DELEGATION =====
function handleClick(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  if(typeof Actions[action] !== 'function') return;

  // Garage actions étendues
  if(action === 'removeService'){ Actions.removeService(t.dataset.car, t.dataset.id); return; }
  if(action === 'removeDoc'){ Actions.removeDoc(t.dataset.car, t.dataset.id); return; }
  if(action === 'removePhoto'){ Actions.removePhoto(t.dataset.car, t.dataset.id); return; }
  if(action === 'openPhoto'){ Actions.openPhoto(t.dataset.id, t.dataset.car); return; }
  // Autocomplete picks
  if(action === 'pickGarageBrand'){ Actions.pickGarageBrand(t.dataset.value); return; }
  if(action === 'pickGarageModel'){ Actions.pickGarageModel(t.dataset.value); return; }
  if(action === 'pickGarageFinish'){ Actions.pickGarageFinish(t.dataset.value); return; }
  if(action === 'removeGaragePhoto'){ Actions.removeGaragePhoto(t.dataset.id); return; }
  if(action === 'toggleGarageTuner'){ Actions.toggleGarageTuner(t.dataset.name); return; }
  if(action === 'toggleGarageTunerCat'){ Actions.toggleGarageTunerCat(t.dataset.cat); return; }
  if(action === 'toggleGarageCondition'){ Actions.toggleGarageCondition(t.dataset.field); return; }
  // Lot 14 — filtre archétype
  if(action === 'toggleGarageArchetype'){ Actions.toggleGarageArchetype(t.dataset.archetype); return; }
  if(action === 'clearGarageArchetypeFilter'){ Actions.clearGarageArchetypeFilter(); return; }
  // Sale flow
  if(action === 'chooseSaleMode'){ Actions.chooseSaleMode(t.dataset.id, t.dataset.mode); return; }
  if(action === 'saleAuctionFormChange' && t.dataset.value !== undefined){
    Actions.saleAuctionFormChange(t.dataset.field, t.dataset.value); return;
  }
  if(action === 'toggleTuner'){ Actions.toggleTuner(t.dataset.form, t.dataset.name); return; }
  if(action === 'toggleTunerCategory'){ Actions.toggleTunerCategory(t.dataset.form, t.dataset.cat); return; }

  if(action === 'switchTab'){
    Actions.switchTab(t.dataset.tab);
  } else if(action === 'openAuction'){
    Actions.openAuction(t.dataset.auction);
  } else if(action === 'viewSource'){
    Actions.viewSource(t.dataset.id);
  } else if(action === 'toggleWatchAuction'){
    Actions.toggleWatchAuction(t.dataset.auction);
  } else if(action === 'setEncheresFilter'){
    Actions.setEncheresFilter(t.dataset.filter);
  } else if(action === 'kpiNav'){
    Actions.kpiNav(t.dataset.target);
  } else if(action === 'dismissOnboarding'){
    Actions.dismissOnboarding();
  } else if(action === 'builderSetType'){
    Actions.builderSetType(t.dataset.type);
  } else if(action === 'builderSetPosture'){
    Actions.builderSetPosture(t.dataset.posture);
  } else if(action === 'builderApplyPreset'){
    Actions.builderApplyPreset(t.dataset.preset);
  } else if(action === 'builderToggleAxis'){
    Actions.builderToggleAxis(t.dataset.axis);
  } else if(action === 'builderToggleSig'){
    Actions.builderToggleSig(t.dataset.sig);
  } else if(action === 'builderToggleAxisItem'){
    Actions.builderToggleAxisItem(t.dataset.axis, t.dataset.item);
  } else if(action === 'builderSetModel'){
    Actions.builderSetModel(t.dataset.model);
  } else if(action === 'builderSetRarityProduction'){
    Actions.builderSetRarityProduction(t.dataset.rarity);
  } else if(action === 'builderSetRarityCirculation'){
    Actions.builderSetRarityCirculation(t.dataset.rarity);
  } else if(action === 'builderToggleRarityConfig'){
    Actions.builderToggleRarityConfig(t.dataset.rarity);
  } else if(action === 'builderToggleSignalFlag'){
    Actions.builderToggleSignalFlag(t.dataset.flag);
  } else if(action === 'builderSetEcrTier'){
    Actions.builderSetEcrTier(t.dataset.ecr);
  } else if(action === 'builderToggleEcrRequirement'){
    Actions.builderToggleEcrRequirement(t.dataset.ecr);
  } else if(action === 'builderSetFilterBudget'){
    Actions.builderSetFilterBudget(t.dataset.filter);
  } else if(action === 'builderSetFilterKm'){
    Actions.builderSetFilterKm(t.dataset.filter);
  } else if(action === 'builderSetFilterYearRange'){
    Actions.builderSetFilterYearRange(t.dataset.filter);
  } else if(action === 'builderToggleFilterOption'){
    Actions.builderToggleFilterOption(t.dataset.filter);
  } else if(action === 'builderToggleReceptionChannel'){
    Actions.builderToggleReceptionChannel(t.dataset.reception);
  } else if(action === 'builderSetReceptionFrequency'){
    Actions.builderSetReceptionFrequency(t.dataset.reception);
  } else if(action === 'builderSetReceptionHours'){
    Actions.builderSetReceptionHours(t.dataset.reception);
  } else if(t.dataset.id !== undefined){
    const raw = t.dataset.id;
    const num = parseInt(raw, 10);
    // Si raw représente un entier pur, passer en number ; sinon garder le string (alerts/auctions créés via Builder)
    const arg = (!isNaN(num) && String(num) === raw) ? num : raw;
    Actions[action](arg);
  } else {
    Actions[action]();
  }
}

function handleInput(e){
  // Service form (entretien) — text/number/textarea
  const serviceField = e.target.closest('[data-action="serviceFormChange"]');
  if(serviceField){
    Actions.serviceFormChange(serviceField.dataset.field, e.target.value);
    return;
  }
  // Sale listing form
  const slField = e.target.closest('[data-action="saleListingFormChange"]');
  if(slField){
    Actions.saleListingFormChange(slField.dataset.field, e.target.value);
    return;
  }
  // Sale auction form (text/number/textarea uniquement, duration géré via click)
  const saField = e.target.closest('[data-action="saleAuctionFormChange"]');
  if(saField && saField.dataset.value === undefined){
    Actions.saleAuctionFormChange(saField.dataset.field, e.target.value);
    return;
  }
  // Sold form
  const soldField = e.target.closest('[data-action="soldFormChange"]');
  if(soldField){
    Actions.soldFormChange(soldField.dataset.field, e.target.value);
    return;
  }

  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  if(typeof Actions[action] !== 'function') return;
  if(action === 'builderSetSearch'){
    Actions.builderSetSearch(t.value);
  } else if(action === 'garageFormChange'){
    Actions.garageFormChange(t.dataset.field, t.value);
  } else if(action === 'setListingsSearch'){
    Actions.setListingsSearch(t.value);
  }
}

// ===== SHEET DRAG TO CLOSE =====
let dragStartY = 0;
let dragging = false;
let sheetEl = null;
let sheetContentEl = null;

function handleDragStart(e){
  if(!State.sheetOpen) return;
  const target = e.target.closest('[data-sheet-drag]');
  if(!target) return;
  dragStartY = e.touches ? e.touches[0].clientY : e.clientY;
  dragging = true;
  sheetEl = document.querySelector('.sheet');
  sheetEl.style.transition = 'none';
}

function handleDragMove(e){
  if(!dragging) return;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  const dy = y - dragStartY;
  if(dy > 0){
    sheetEl.style.transform = `translateY(${dy}px)`;
    if(e.cancelable) e.preventDefault();
  }
}

function handleDragEnd(e){
  if(!dragging) return;
  dragging = false;
  sheetEl.style.transition = '';
  const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
  const dy = y - dragStartY;
  if(dy > 120){
    Sheet.close();
  } else {
    sheetEl.style.transform = '';
  }
  sheetEl = null;
}

// ===== INIT =====
function init(){
  // Charger les données persistées AVANT le premier render
  const persistedAlerts = loadPersistedAlerts();
  if(persistedAlerts !== null) State.alerts = persistedAlerts;
  const persistedWatched = loadPersistedWatchedAuctions();
  if(persistedWatched !== null) State.watchedAuctionIds = persistedWatched;
  const persistedGarage = loadPersistedGarage();
  if(persistedGarage !== null) State.garage = persistedGarage;
  const persistedProfiles = loadPersistedProfiles();
  if(persistedProfiles !== null) State.userProfiles = persistedProfiles;
  // Migration v5 : s'assurer que toute voiture a services/photos/docs initialisés
  (State.garage || []).forEach(car => {
    if(!Array.isArray(car.services)) car.services = [];
    if(!Array.isArray(car.photos)) car.photos = [];
    if(!Array.isArray(car.docs)) car.docs = [];
    if(typeof car.saleStatus === 'undefined') car.saleStatus = null;
    if(typeof car.saleData === 'undefined') car.saleData = null;
  });
  // Moteur d'auto-transition annonce → enchère
  const transitions = checkSaleTransitions();

  renderAll();
  captureAffutSnapshot();
  // Annoncer les transitions automatiques si applicables
  if(transitions && transitions.length > 0) announceTransitions(transitions);
  // Si l'utilisateur démarre sur Garage (default), on bascule maintenant
  // captureAffutSnapshot() a déjà figé le shell Affût pour pouvoir y revenir.
  if(State.activeTab === 'garage' && typeof renderGaragePage === 'function'){
    renderGaragePage();
  } else if(State.activeTab === 'encheres' && typeof renderEncheresPage === 'function'){
    renderEncheresPage();
  } else if(State.activeTab === 'annonces' && typeof renderListingsPage === 'function'){
    renderListingsPage();
  }
  if(typeof updateTabNav === 'function') updateTabNav();
  // Démarrer le ticker au boot pour que le badge LIVE reflète l'état réel même hors page Enchères
  if(typeof startCountdownTicker === 'function') startCountdownTicker();
  document.addEventListener('click', handleClick);
  // Click-outside : ferme les dropdowns autocomplete si on clique ailleurs
  document.addEventListener('click', (e) => {
    if(!e.target.closest('.garage-autocomplete-wrap')) closeAllAutocomplete();
  }, true); // capture phase pour fermer avant que d'autres handlers ne traitent
  document.addEventListener('input', handleInput);
  document.addEventListener('scroll', handleOnboardingScroll, true);
  document.addEventListener('touchstart', handleDragStart, { passive: true });
  document.addEventListener('touchmove', handleDragMove, { passive: false });
  document.addEventListener('touchend', handleDragEnd);
  document.addEventListener('mousedown', handleDragStart);
  document.addEventListener('mousemove', handleDragMove);
  document.addEventListener('mouseup', handleDragEnd);

  // Expose for debugging
  window.State = State;
  window.Sheet = Sheet;
  window.Actions = Actions;
  // Helper bulletproof : appelé via onclick direct
  window.tryGarageSubmit = function(){
    try {
      if(typeof Actions === 'undefined' || typeof Actions.garageFormSubmit !== 'function'){
        const msg = 'Erreur : Actions.garageFormSubmit indisponible. Recharge la page.';
        const errBox = document.getElementById('garage-form-error');
        if(errBox){ errBox.textContent = msg; errBox.style.display = 'block'; }
        else alert(msg);
        return;
      }
      Actions.garageFormSubmit();
    } catch(e){
      const msg = 'Erreur submit : ' + (e && e.message ? e.message : String(e));
      const errBox = document.getElementById('garage-form-error');
      if(errBox){ errBox.textContent = msg; errBox.style.display = 'block'; }
      else alert(msg);
      console.error('[tryGarageSubmit]', e);
    }
  };

  // Debug helpers (Sly : tape carnetDebug.X() en console)
  window.carnetDebug = {
    formState: () => JSON.stringify(GarageFormState, null, 2),
    validity: () => ({
      brand: !!GarageFormState.brand.trim(),
      model: !!GarageFormState.model.trim(),
      year: /^\d{4}$/.test(GarageFormState.year.trim()),
      yearInRange: parseInt(GarageFormState.year, 10) >= 1900 && parseInt(GarageFormState.year, 10) <= new Date().getFullYear() + 1,
      isSubmitting: GarageFormState._submitting,
      overallValid: garageFormIsValid()
    }),
    forceSubmit: () => {
      console.log('[carnetDebug] State avant submit:', JSON.parse(JSON.stringify(GarageFormState)));
      Actions.garageFormSubmit();
    },
    submitButton: () => {
      const btn = document.querySelector('.sheet-actions [data-action="garageFormSubmit"]');
      return btn ? {
        exists: true,
        disabled: btn.disabled,
        text: btn.textContent,
        hasOnclick: !!btn.onclick,
        dataAction: btn.dataset.action
      } : { exists: false };
    },
    resetGarage: () => {
      State.garage = [];
      localStorage.removeItem('carnet:v1:garage');
      if(typeof renderGaragePage === 'function') renderGaragePage();
      console.log('Garage reset.');
    }
  };
  window.Builder = Builder;
  window.BuilderState = BuilderState;
  window.resetCarnetStorage = resetCarnetStorage;

  // Onboarding première visite — après que tout est en place
  // Pas si un draft est déjà en cours (priorité : resumeDraft)
  const hasSeenOnboarding = safeStorageGet(STORAGE_KEYS.ONBOARDING_SEEN, false);
  const persistedDraft = safeStorageGet(STORAGE_KEYS.BUILDER_DRAFT, null);
  if(!hasSeenOnboarding && !persistedDraft && !State.sheetOpen){
    setTimeout(() => Sheet.open('onboarding'), 400);
  }
}

// Dot tracking pour onboarding scroll-snap (Chunk 10.a)
function handleOnboardingScroll(e){
  const track = e.target;
  if(!track || !track.id || track.id !== 'onboarding-track') return;
  const w = track.clientWidth;
  if(w === 0) return;
  const idx = Math.round(track.scrollLeft / w);
  const dotsEl = document.getElementById('onboarding-dots');
  if(!dotsEl) return;
  dotsEl.querySelectorAll('.onboarding-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === idx);
  });
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

// v6.0 : auto-init Supabase au load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => setTimeout(bootSupabase, 200));
} else {
  setTimeout(bootSupabase, 200);
}

// ─── AUTH MODULE (Lot 1 — Sprint Convergence) ────────────────────────
// Module défini ici (fin de script) pour profiter de Sheet, Actions, getSupabaseClient
const Auth = {
  state: { user: null, loading: false, initialized: false, pendingEmail: null },

  async init() {
    if (Auth.state.initialized) return;
    const sb = (typeof getSupabaseClient === 'function') ? getSupabaseClient() : null;
    if (!sb || !sb.auth) {
      // Supabase pas encore prêt → retry
      setTimeout(() => Auth.init(), 300);
      return;
    }
    Auth.state.initialized = true;

    // Session existante ?
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) Auth.state.user = session.user;
    } catch(e) {
      console.warn('[Auth] getSession failed:', e);
    }
    Auth.updateUI();

    // Listen state changes
    sb.auth.onAuthStateChange((event, session) => {
      Auth.state.user = session ? session.user : null;
      Auth.updateUI();
      if (event === 'SIGNED_IN') {
        Auth.state.pendingEmail = null;
        if (State.sheetView === 'auth' || State.sheetView === 'authVerify') Sheet.close();
        setTimeout(() => Sheet.open('toast', 'Connecté · ta veille te retrouve'), 360);
      } else if (event === 'SIGNED_OUT') {
        if (State.sheetView === 'userMenu') Sheet.close();
        setTimeout(() => Sheet.open('toast', 'Déconnecté'), 360);
      }
    });
  },

  updateUI() {
    const loginBtn = document.getElementById('auth-login-btn');
    const userBtn = document.getElementById('auth-user-btn');
    const initial = document.getElementById('topbar-user-initial');
    if (!loginBtn || !userBtn || !initial) return;
    if (Auth.state.user) {
      loginBtn.style.display = 'none';
      userBtn.style.display = '';
      const email = Auth.state.user.email || '';
      initial.textContent = email ? email[0].toUpperCase() : '·';
    } else {
      loginBtn.style.display = '';
      userBtn.style.display = 'none';
    }
  },

  // Défensif : si sb null, force bootSupabase et retry une fois
  async _getSb() {
    let sb = getSupabaseClient();
    if (!sb) {
      if (typeof bootSupabase === 'function') bootSupabase();
      await new Promise(r => setTimeout(r, 300));
      sb = getSupabaseClient();
    }
    return sb;
  },

  async sendMagicLink(email, isResend) {
    if (!email || !email.includes('@')) {
      Sheet.open('toast', 'Email invalide');
      return;
    }
    if (Auth.state.loading) return;
    Auth.state.loading = true;
    const btn = document.querySelector('[data-action="sendMagicLink"]') || document.querySelector('[data-action="resendCode"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Envoi…'; }

    const sb = await Auth._getSb();
    if (!sb) {
      Sheet.open('toast', 'Service indisponible');
      Auth.state.loading = false;
      if (btn) btn.disabled = false;
      return;
    }
    try {
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href }
      });
      if (error) {
        Sheet.open('toast', `Erreur · ${error.message}`);
      } else {
        Auth.state.pendingEmail = email;
        if (isResend) {
          Sheet.open('toast', `Code renvoyé à ${email}`);
        } else {
          Sheet.open('authVerify');
        }
      }
    } catch(e) {
      Sheet.open('toast', `Erreur · ${e.message || 'inconnue'}`);
    } finally {
      Auth.state.loading = false;
      const btn2 = document.querySelector('[data-action="sendMagicLink"]') || document.querySelector('[data-action="resendCode"]');
      if (btn2) { btn2.disabled = false; btn2.textContent = isResend ? 'Renvoyer le code' : 'Recevoir le code'; }
    }
  },

  async verifyOtp(token) {
    if (!token || token.length < 6) {
      Sheet.open('toast', 'Code à 6 chiffres requis');
      return;
    }
    if (!Auth.state.pendingEmail) {
      Sheet.open('toast', 'Session expirée · recommence');
      Sheet.open('auth');
      return;
    }
    if (Auth.state.loading) return;
    Auth.state.loading = true;
    const btn = document.querySelector('[data-action="verifyOtp"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Vérification…'; }

    const sb = await Auth._getSb();
    if (!sb) {
      Sheet.open('toast', 'Service indisponible');
      Auth.state.loading = false;
      if (btn) btn.disabled = false;
      return;
    }
    try {
      const { error } = await sb.auth.verifyOtp({
        email: Auth.state.pendingEmail,
        token: token,
        type: 'email'
      });
      if (error) {
        Sheet.open('toast', `Code incorrect · ${error.message}`);
      }
      // Succès → onAuthStateChange('SIGNED_IN') ferme la sheet automatiquement
    } catch(e) {
      Sheet.open('toast', `Erreur · ${e.message || 'inconnue'}`);
    } finally {
      Auth.state.loading = false;
      const btn2 = document.querySelector('[data-action="verifyOtp"]');
      if (btn2) { btn2.disabled = false; btn2.textContent = 'Se connecter'; }
    }
  },

  async signInWithGoogle() {
    const sb = await Auth._getSb();
    if (!sb) { Sheet.open('toast', 'Service indisponible'); return; }
    try {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) Sheet.open('toast', `Erreur Google · ${error.message}`);
    } catch(e) {
      Sheet.open('toast', `Erreur · ${e.message || 'inconnue'}`);
    }
  },

  async signOut() {
    const sb = getSupabaseClient();
    if (!sb) return;
    try {
      await sb.auth.signOut();
    } catch(e) {
      console.warn('[Auth] signOut failed:', e);
    }
  }
};
window.Auth = Auth;

// Boot Auth après Supabase (delay > bootSupabase)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => setTimeout(() => Auth.init(), 500));
} else {
  setTimeout(() => Auth.init(), 500);
}
