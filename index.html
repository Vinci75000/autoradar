    .banner.banner-warning .banner-cta { color: var(--orange-polo); }
    .banner.banner-success .banner-cta { color: var(--vert-anglais); }
    .banner.banner-danger .banner-cta { color: #9c2a2a; }


    /* ─────────────────────────────────────────────────────────
       FORM COMPONENTS — base unifiée
       
       Usage : <div class="form-field">
                 <label class="form-label">Marque</label>
                 <input class="form-input" type="text" placeholder="..." />
                 <div class="form-hint">Optionnel — un mot suffit.</div>
                 <div class="form-error">Champ requis</div>
               </div>
       ───────────────────────────────────────────────────────── */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 13px;
    }
    .form-label {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 3px;
    }
    .form-label .required {
      color: var(--orange-polo);
    }
    .form-input,
    .form-textarea,
    .form-select {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.4;
      padding: 13px;
      border: 1px solid var(--gris-line);
      background: var(--papier-bright);
      color: var(--encre);
      border-radius: 2px;
      transition: border-color var(--duration-fast) ease, background var(--duration-fast) ease;
      width: 100%;
      box-sizing: border-box;
      -webkit-appearance: none;
    }
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--encre);
      background: var(--papier);
    }
    .form-input.error,
    .form-textarea.error,
    .form-select.error {
      border-color: #9c2a2a;
      background: rgba(156, 42, 42, 0.02);
    }
    .form-input::placeholder,
    .form-textarea::placeholder {
      color: var(--gris-soft);
      font-style: italic;
    }
    .form-textarea {
      min-height: 84px;
      resize: vertical;
      font-family: var(--editorial);
    }
    .form-hint {
      font-family: var(--editorial);
      font-style: italic;
      font-size: 12px;
      line-height: 1.4;
      color: var(--gris);
      margin-top: 3px;
    }
    .form-error {
      font-family: var(--editorial);
      font-style: italic;
      font-size: 12px;
      line-height: 1.4;
      color: #9c2a2a;
      margin-top: 3px;
    }

    /* Tick / Checkbox stylisé */
    .form-tick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 1px solid var(--gris-line);
      border-radius: 2px;
      background: var(--papier-bright);
      cursor: pointer;
      transition: all var(--duration-fast) ease;
      font-family: var(--editorial);
      font-style: italic;
      font-size: 13px;
      color: var(--encre);
      user-select: none;
    }
    .form-tick:active {
      background: var(--papier-soft);
    }
    .form-tick.checked {
      border-color: var(--vert-anglais);
      background: rgba(31, 77, 47, 0.04);
      color: var(--vert-anglais);
    }
    .form-tick-box {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--gris-line);
      border-radius: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .form-tick.checked .form-tick-box {
      background: var(--vert-anglais);
      border-color: var(--vert-anglais);
    }
    .form-tick.checked .form-tick-box::after {
      content: '\u2713';
      color: var(--papier-bright);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
    }

    /* Toggle / Switch */
    .form-toggle {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      cursor: pointer;
      user-select: none;
    }
    .form-toggle-track {
      width: 44px;
      height: 24px;
      background: var(--gris-line);
      border-radius: 99px;
      position: relative;
      transition: background var(--duration-fast) ease;
      flex-shrink: 0;
    }
    .form-toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: var(--papier-bright);
      border-radius: 50%;
      transition: left var(--duration-fast) ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .form-toggle.on .form-toggle-track {
      background: var(--vert-anglais);
    }
    .form-toggle.on .form-toggle-thumb {
      left: 22px;
    }
    .form-toggle-label {
      font-family: var(--editorial);
      font-style: italic;
      font-size: 14px;
      color: var(--encre);
    }

    /* ═══════════════════════════════════════════════════════════
       MICRO-INTERACTIONS + ANIMATIONS (v5.49)
       Mouvement subtil, accessibilité respectée, jamais gadget
       ═══════════════════════════════════════════════════════════ */

    /* ─── A. Accessibilité : respecter prefers-reduced-motion ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ─── B. Tab content fade-in (à chaque switch) ─── */
    main.main {
      animation: tab-fade-in var(--duration-fast) var(--ease);
    }
    @keyframes tab-fade-in {
      from {
        opacity: 0.4;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── C. Cards stagger entrance (cascade légère 6 premières) ─── */
    .garage-card,
    .alert-card,
    .auction-card,
    .match-card,
    .listing-card,
    .advice-card {
      animation: card-rise 340ms var(--ease) backwards;
    }
    .garage-card:nth-child(1),
    .alert-card:nth-child(1),
    .auction-card:nth-child(1),
    .match-card:nth-child(1),
    .listing-card:nth-child(1),
    .advice-card:nth-child(1)   { animation-delay: 0ms; }
    .garage-card:nth-child(2),
    .alert-card:nth-child(2),
    .auction-card:nth-child(2),
    .match-card:nth-child(2),
    .listing-card:nth-child(2),
    .advice-card:nth-child(2)   { animation-delay: 40ms; }
    .garage-card:nth-child(3),
    .alert-card:nth-child(3),
    .auction-card:nth-child(3),
    .match-card:nth-child(3),
    .listing-card:nth-child(3),
    .advice-card:nth-child(3)   { animation-delay: 80ms; }
    .garage-card:nth-child(4),
    .alert-card:nth-child(4),
    .auction-card:nth-child(4),
    .match-card:nth-child(4),
    .listing-card:nth-child(4),
    .advice-card:nth-child(4)   { animation-delay: 120ms; }
    .garage-card:nth-child(5),
    .alert-card:nth-child(5),
    .auction-card:nth-child(5),
    .match-card:nth-child(5),
    .listing-card:nth-child(5),
    .advice-card:nth-child(5)   { animation-delay: 160ms; }
    .garage-card:nth-child(6),
    .alert-card:nth-child(6),
    .auction-card:nth-child(6),
    .match-card:nth-child(6),
    .listing-card:nth-child(6),
    .advice-card:nth-child(6)   { animation-delay: 200ms; }
    /* après 6, plus de delay — instantané pour éviter cumul */

    @keyframes card-rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── D. Countdown urgence : pulse < 1h ─── */
    .auction-card-countdown.urgent,
    .auction-countdown.urgent,
    .sheet-detail-since.urgent {
      animation: countdown-pulse 1.4s ease-in-out infinite;
    }
    @keyframes countdown-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }

    /* ─── E. Sheet content fade-in après ouverture ─── */
    .sheet.open .sheet-content,
    .sheet.open .sheet-content-detail {
      animation: sheet-content-fade 280ms var(--ease) 80ms backwards;
    }
    @keyframes sheet-content-fade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── F. KPI cards stagger (sur la strip) ─── */
    .kpi-card {
      animation: card-rise 280ms var(--ease) backwards;
    }
    .kpi-card:nth-child(1) { animation-delay: 0ms; }
    .kpi-card:nth-child(2) { animation-delay: 50ms; }

    .car-thumb.car-thumb-with-photo {
      position: relative;
      overflow: hidden;
      background: var(--papier-soft);  /* derrière le skeleton */
    }
    .car-thumb-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        var(--papier-soft) 25%,
        var(--papier-bright) 50%,
        var(--papier-soft) 75%
      );
      background-size: 200% 100%;
      animation: thumb-shimmer 1.6s ease-in-out infinite;
      transition: opacity 300ms ease-out;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes thumb-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .car-thumb-real-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0;
      transition: opacity 380ms ease-out;
      z-index: 2;
      /* Browser-level lazy + decoding */
    }
    .car-thumb-real-img.loaded {
      opacity: 1;
    }
    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      .car-thumb-skeleton { animation: none; }
      .car-thumb-real-img { transition: none; }

/* ═══════════════════════════════════════════════════════════════════════
   LOT 13 (Phase α refactor) — carnet-overlay générique
   Composant réutilisable pour les futurs modes plein écran (Lot 14+).
   Les Lots 5/6/7 conservent leurs namespaces dédiés (.copilote-* /
   .trackday-* / .gumball-*) — migration in-place possible dans un
   Lot 13b dédié si nécessaire.
   ═══════════════════════════════════════════════════════════════════════ */

/* Wrapper plein écran */
.carnet-overlay {
  position: fixed;
  inset: 0;
  background: var(--papier);
  color: var(--encre);
  z-index: 9999;
  overflow-y: auto;
  overflow-x: hidden;
  font-family: var(--sans);
  -webkit-overflow-scrolling: touch;
}
.carnet-overlay[hidden] { display: none; }

/* Bouton × top-right (par-dessus le header noir au scroll top) */
.carnet-overlay-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(244, 241, 234, 0.15);
  color: var(--papier);
  border: none;
  font-family: var(--mono);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
}
.carnet-overlay-close:hover { background: rgba(244, 241, 234, 0.3); }

/* Header noir éditorial */
.carnet-overlay-header {
  padding: 14px 18px;
  background: var(--encre);
  color: var(--papier);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}
.carnet-overlay-header-left { flex: 1; }
.carnet-overlay-header-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: #9FE1CB;
  text-transform: uppercase;
  margin: 0;
}
.carnet-overlay-header-title {
  font-family: var(--display);
  font-style: italic;
  font-size: 16px;
  margin: 2px 0 0 0;
  line-height: 1.1;
  color: var(--papier);
}
.carnet-overlay-header-right {
  text-align: right;
  font-family: var(--mono);
  font-size: 11px;
  color: #D5D0C4;
  padding-right: 40px;
}
.carnet-overlay-header-live {
  font-size: 9px;
  color: #9FE1CB;
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* Bottom actions sticky (grid 3 boutons par défaut) */
.carnet-overlay-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: #D5D0C4;
  border-top: 1px solid #D5D0C4;
  position: sticky;
  bottom: 0;
}
.carnet-overlay-actions.is-two-col { grid-template-columns: 1fr 1fr; }
.carnet-overlay-actions.is-four-col { grid-template-columns: 1fr 1fr 1fr 1fr; }

.carnet-overlay-action {
  padding: 14px 0;
  background: var(--papier);
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--encre);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.carnet-overlay-action:hover { background: #FAFAF7; }
.carnet-overlay-action.is-alert { color: var(--orange-polo); }
.carnet-overlay-action.is-primary { color: var(--vert-anglais); }
.carnet-overlay-action[disabled] { opacity: 0.4; cursor: not-allowed; }

.carnet-overlay-action-icon {
  font-size: 18px;
  line-height: 1;
  display: block;
}

    padding: 55px 34px 21px;
  }

    font-size: 89px;
    line-height: 0.92;
  }
  .hero:not(.hero-garage) .hero-sub {
    font-size: 19px;
  }

/* KPI bar — nouvelle structure grid (activée via .is-grid sur le strip) */
.kpi-strip.is-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 8px;
  padding: 13px 21px 21px;
  overflow: visible;
}
.kpi-strip.is-grid::-webkit-scrollbar { display: none; }

/* Hero KPI — full width, encre noir, grand chiffre */
.kpi-card.is-hero {
  grid-column: 1 / -1;
  flex: none;
  min-height: 144px;
  background: var(--encre);
  color: var(--papier);
  border: none;
  border-radius: var(--r);
  padding: 18px 22px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 4px;
  cursor: pointer;
  transition: transform var(--duration-fast) ease, background var(--duration-fast) ease;
}
.kpi-card.is-hero:active {
  transform: scale(0.985);
  background: #0d0d0d;
}
.kpi-card.is-hero .kpi-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: #9FE1CB;
  text-transform: uppercase;
}
.kpi-card.is-hero .kpi-value {
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
  font-size: 72px;
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--papier);
  align-self: center;
  margin: 0;
}
.kpi-card.is-hero .kpi-delta {
  font-family: var(--editorial);
  font-style: italic;
  font-size: 14px;
  line-height: 1.3;
  color: rgba(244,241,234,0.78);
}
.kpi-card.is-hero .kpi-delta.neg { color: var(--orange-polo); }
@media (min-width: 600px) {
  .kpi-card.is-hero { min-height: 178px; padding: 22px 28px; }
  .kpi-card.is-hero .kpi-value { font-size: 89px; }
}

/* Compactes — grid 2x2, papier, valeur moyenne */
.kpi-card.is-compact {
  flex: none;
  min-height: 89px;
  background: var(--papier-bright);
  border: 1px solid var(--gris-line-soft);
  border-radius: var(--r);
  padding: 13px 16px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 2px;
  cursor: pointer;
  transition: background var(--duration-fast) ease, transform var(--duration-fast) ease;
}
.kpi-card.is-compact:active {
  background: var(--papier-soft);
  transform: scale(0.97);
}
.kpi-card.is-compact .kpi-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--gris);
  text-transform: uppercase;
}
.kpi-card.is-compact .kpi-value {
  font-family: var(--display);
  font-style: italic;
  font-weight: 400;
  font-size: 34px;
  line-height: 1;
  color: var(--encre);
  letter-spacing: -0.025em;
  align-self: center;
}
.kpi-card.is-compact .kpi-delta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.04em;
  color: var(--vert-anglais);
  line-height: 1.2;
}
.kpi-card.is-compact .kpi-delta.neg { color: var(--orange-polo); }
.kpi-card.is-compact .kpi-delta.neutral { color: var(--gris); }

/* Animations stagger Fibonacci (0, 80, 130, 210, 340 ms) */
.kpi-strip.is-grid .kpi-card { animation: kpiFadeIn 380ms ease both; }
.kpi-strip.is-grid .kpi-card:nth-child(1) { animation-delay: 0ms; }
.kpi-strip.is-grid .kpi-card:nth-child(2) { animation-delay: 80ms; }
.kpi-strip.is-grid .kpi-card:nth-child(3) { animation-delay: 130ms; }
.kpi-strip.is-grid .kpi-card:nth-child(4) { animation-delay: 210ms; }
.kpi-strip.is-grid .kpi-card:nth-child(5) { animation-delay: 340ms; }
@keyframes kpiFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

   ═══════════════════════════════════════════════════════════════════════ */

/* Hauteur Fibonacci (55) — surcharge directe, safe-area iOS préservée */
.tabnav {
  height: calc(55px + env(safe-area-inset-bottom, 0));
}

/* Item — espacements Fibonacci + position relative pour la barre active */
.tabnav-item {
  gap: 5px;
  padding: 8px var(--s-2);
  position: relative;
}

/* Barre indicateur d'onglet actif — signature orange polo, scaleX animée */
.tabnav-item::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  width: 21px;
  height: 2px;
  background: var(--orange-polo);
  border-radius: 0 0 1px 1px;
  transform: translateX(-50%) scaleX(0);
  transform-origin: center;
  transition: transform var(--duration-fast) ease;
  pointer-events: none;
}
.tabnav-item.active::before {
  transform: translateX(-50%) scaleX(1);
}

/* Icône — transition douce + feedback pressed (scale 0.92) */
.tabnav-icon {
  transition: opacity var(--duration-fast) ease, transform var(--duration-fast) ease;
}
.tabnav-item.active .tabnav-icon {
  opacity: 1;
}
.tabnav-item:active .tabnav-icon {
  opacity: 1;
  transform: scale(0.92);
}

/* Label — l'onglet actif gagne un poil de poids pour ancrer le regard */
.tabnav-item.active {
  color: var(--encre);
  font-weight: 700;
}

/* ═══════════════════════════════════════════════════════════════════════
   /LOT 17 (Phase α)
   ═══════════════════════════════════════════════════════════════════════ */

  height: auto;
  min-height: 55px;
  padding: 17px 21px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;

              transform var(--duration-fast) ease;
}
.new-alert-btn:active {
  background: #0d0d0d;
  opacity: 1;
  transform: scale(0.985);
}

/* Le « + » conserve l'orange polo — lien chromatique avec la charte */
.new-alert-plus {
  font-size: 16px;
}

   /LOT 18 (Phase α)
   ═══════════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════════

}

function getAuctionEffectivePrice(a){
  if(a.status === 'live') return a.bidCurrent || a.estimateLow || 0;
  if(a.status === 'upcoming') return a.estimateLow || 0;
  return a.soldPrice || a.bidCurrent || 0;
}
function matchesEncheresFilter(a, filterId){
  if(!filterId || filterId === 'all') return true;
  const f = ENCHERES_PRICE_FILTERS.find(x => x.id === filterId);
  if(!f) return true;
  const price = getAuctionEffectivePrice(a);
  if(f.min !== undefined && price < f.min) return false;
  if(f.max !== undefined && price >= f.max) return false;
  return true;
}

// ===== HELPERS =====
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtPrice(n){
  if(n >= 1000000){
    const m = n / 1000000;
    return (m === Math.floor(m) ? m.toFixed(0) : m.toFixed(m >= 10 ? 1 : 2).replace(/\.?0+$/,'')) + ' M€';
  }
  return n.toLocaleString('fr-FR').replace(/\s/g,'\u00A0') + ' €';
}
function fmtKm(n){return n.toLocaleString('fr-FR').replace(/\s/g,'\u00A0') + ' km';}
function fmtRange(low, high){
  const fmt = (n) => {
    if(n >= 1000000){
      const m = n / 1000000;
      return (m === Math.floor(m) ? m.toFixed(0) : m.toFixed(1).replace(/\.0$/,'')) + ' M';
    }
    if(n >= 1000) return (n/1000).toFixed(0) + 'k';
    return String(n);
  };
  return fmt(low) + ' – ' + fmt(high) + ' €';
}
// Temps relatif depuis un timestamp ms (Chunk 11.c)
function formatRelativeTime(ts){
  if(!ts || typeof ts !== 'number') return '';
  const diffMs = Date.now() - ts;
  const diffMin = Math.floor(diffMs / 60000);
  if(diffMin < 1) return 'à l\u2019instant';
  if(diffMin < 60) return 'il y a ' + diffMin + ' min';
  const diffH = Math.floor(diffMin / 60);
  if(diffH < 24) return 'il y a ' + diffH + ' h';
  const diffJ = Math.floor(diffH / 24);
  if(diffJ < 30) return 'il y a ' + diffJ + ' j';
  const diffM = Math.floor(diffJ / 30);
  if(diffM < 12) return 'il y a ' + diffM + ' mois';
  const diffY = Math.floor(diffM / 12);
  return 'il y a ' + diffY + ' an' + (diffY > 1 ? 's' : '');
}
function getAlertSinceLabel(alert){
  if(!alert) return '';
  // Priorité : si modifiée (lastModifiedAt > createdAt), afficher "modifiée …"
  if(alert.lastModifiedAt && alert.createdAt && alert.lastModifiedAt > alert.createdAt + 1000){
    return 'modifiée ' + formatRelativeTime(alert.lastModifiedAt);
  }
  if(alert.createdAt){
    return 'créée ' + formatRelativeTime(alert.createdAt);
  }
  // Seed alerts (string statique)
  return alert.since || 'récemment';
}
// ─── v5.49 helper : countdown urgence (< 1 h) ───
function isCountdownUrgent(hOffset, status) {
  if (status !== 'live' && status !== 'upcoming') return false;
  // hOffset est en heures (offset signé : positif = à venir, négatif = passé)
  // Pour les enchères live : à urgence quand hOffset est entre -1 et 0 (dernière heure)
  // Pour upcoming : urgence quand hOffset est entre 0 et 1 (commence dans <1h)
  const abs = Math.abs(hOffset);
  return abs < 1;
}

function formatTimeLeft(hOffset){
  // Robuste : on travaille en minutes entières pour éviter les artefacts d'arrondi (5h 60min, 3j 23h, etc.)
  const totalMinutes = Math.round(Math.abs(hOffset) * 60);
  if(totalMinutes === 0) return '0 min';
  if(totalMinutes < 60) return totalMinutes + ' min';
  const totalHours = Math.floor(totalMinutes / 60);
  const remainingMin = totalMinutes - totalHours * 60;
  if(totalHours < 24){
    return totalHours + 'h' + (remainingMin > 0 ? ' ' + (remainingMin < 10 ? '0' + remainingMin : remainingMin) + 'min' : '');
  }
  const totalDays = Math.floor(totalHours / 24);
  const remainingHours = totalHours - totalDays * 24;
  return totalDays + 'j' + (remainingHours > 0 ? ' ' + remainingHours + 'h' : '');
}
function fmtAuctionPrice(n){
  if(n === null || n === undefined) return '—';
  if(n >= 1000000){
    const m = n / 1000000;
    return (m === Math.floor(m) ? m.toFixed(0) : m.toFixed(2).replace(/\.?0+$/,'')) + ' M€';
  }
  if(n >= 1000) return Math.round(n / 1000) + 'k €';
  return n.toLocaleString('fr-FR').replace(/\s/g,'\u00A0') + ' €';
}
function getCountryFlag(code){
  // Regional indicator symbols pour drapeau emoji (compose 2 char codes)
  if(!code || code.length !== 2) return '';
  const base = 0x1F1E6 - 0x41;
  return String.fromCodePoint(base + code.charCodeAt(0)) + String.fromCodePoint(base + code.charCodeAt(1));
}
function getSoldDelta(soldPrice, estLow, estHigh){
  // Retourne {label, mood} où mood = 'positive' | 'negative' | 'neutral'
  if(!soldPrice || !estLow || !estHigh) return null;
  const estMid = (estLow + estHigh) / 2;
  const deltaPct = Math.round(((soldPrice - estMid) / estMid) * 100);
  if(deltaPct >= 5) return { label: '+' + deltaPct + '% au-dessus de l\u2019estimation', mood: 'positive' };
  if(deltaPct <= -5) return { label: deltaPct + '% sous l\u2019estimation', mood: 'negative' };
  return { label: 'dans la fourchette', mood: 'neutral' };
}

// ===== LIVE COUNTDOWN (Chunk 5) =====
// Pour la démo mock, on accélère le temps : 1 seconde wall = 12 secondes virtuelles
// → un offset de 6h descend à 0 en 30 minutes wall. Pas réaliste, juste démonstrable.
const bootTimestamp = Date.now();
const PREVIEW_SPEED_MULTIPLIER = 12;

function getElapsedHours(){
  return (Date.now() - bootTimestamp) * PREVIEW_SPEED_MULTIPLIER / 3600000;
}
function formatBadgeText(rawHOffset, status){
  // Retourne le texte plein (sans le dot SVG) pour un badge auction selon le statut + offset effectif
  const elapsed = getElapsedHours();
  const effective = rawHOffset - elapsed;
  if(status === 'live'){
    if(effective <= 0) return 'Clôturée';
    return 'En direct · ' + formatTimeLeft(effective);
  }
  if(status === 'upcoming'){
    if(effective <= 0) return 'En direct';
    return 'Dans ' + formatTimeLeft(effective);
  }
  // SOLD — hOffset negatif, devient plus négatif
  return 'Vendue · il y a ' + formatTimeLeft(rawHOffset - elapsed);
}
function formatStatusLine(rawHOffset, status){
  // Pour la statusLine dans le sheet auction
  const elapsed = getElapsedHours();
  const effective = rawHOffset - elapsed;
  if(status === 'live'){
    if(effective <= 0) return '<span style="color:var(--orange-polo);font-weight:500">Clôturée</span>';
    return '<span style="color:var(--orange-polo);font-weight:500">En direct</span> · clôture dans ' + formatTimeLeft(effective);
  }
  if(status === 'upcoming'){
    if(effective <= 0) return 'Vient de démarrer';
    return 'Ouverture dans ' + formatTimeLeft(effective);
  }
  return 'Vendue il y a ' + formatTimeLeft(rawHOffset - elapsed);
}

function tickCountdowns(){
  const elapsed = getElapsedHours();
  // Update all auction-card badges in place
  document.querySelectorAll('.auction-card-badge[data-raw-h-offset]').forEach(badge => {
    const raw = parseFloat(badge.dataset.rawHOffset);

    if(textEl && textEl.textContent !== text){
      // Détecter le passage LIVE → Clôturée et déclencher l'animation

      const nowClosed = text === 'Clôturée';
      if(status === 'live' && wasNotClosed && nowClosed && !badge.classList.contains('just-closed')){

        if(card) card.classList.add('just-closed-card');
        setTimeout(() => {
          if(card) card.classList.remove('just-closed-card');
          // Garde 'just-closed' sur le badge pour ne pas re-déclencher l'animation
        }, 900);

function normalizeForSearch(s){
  return String(s || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim();
}
function matchesQuery(label, query, keywords){
  if(!query) return true;
  const q = normalizeForSearch(query);
  if(!q) return true;
  if(normalizeForSearch(label).includes(q)) return true;
  if(keywords && normalizeForSearch(keywords).includes(q)) return true;
  return false;
}
function getTargetSummary(d){
  if(!d || !d.type) return '';
  if(d.type === 'criteres'){
    const posture = POSTURES.find(p => p.id === d.posture);
    const preset = PRESETS.find(p => p.id === d.presetUsed);
    let parts = [];
    if(posture) parts.push(posture.label);
    if(preset) parts.push(preset.title);
    const totalAxes = Object.values(d.axes || {}).reduce((s,a) => s + (a || []).length, 0);
    if(totalAxes > 0) parts.push(totalAxes + ' critère' + (totalAxes === 1 ? '' : 's') + ' affiné' + (totalAxes === 1 ? '' : 's'));
    return parts.length > 0 ? parts.join(' · ') : 'Aucun critère';
  }
  if(d.type === 'modele'){
    const m = MODELS.find(x => x.id === d.modelId);
    if(!m) return 'Aucun modèle';
    return m.brand + ' ' + m.model + ' (' + m.years + ')';
  }
  if(d.type === 'rarete'){
    const r = d.rarity || {};
    let parts = [];
    if(r.production){
      const p = RARITY_PRODUCTION.find(x => x.id === r.production);
      if(p) parts.push('Production ' + p.label.toLowerCase());
    }
    if(r.circulation){
      const c = RARITY_CIRCULATION.find(x => x.id === r.circulation);
      if(c) parts.push('Circulation ' + c.label.toLowerCase());
    }
    (r.configs || []).forEach(cid => {
      const cfg = RARITY_CONFIGS.find(x => x.id === cid);
      if(cfg) parts.push(cfg.label);
    });
    return parts.length > 0 ? parts.join(' · ') : 'Aucune contrainte';
  }
  if(d.type === 'signal'){
    const flags = (d.signal && d.signal.flags) || [];
    if(flags.length === 0) return 'Aucun signal';
    return flags.map(fid => {
      const f = SIGNAL_FLAGS.find(x => x.id === fid);
      return f ? f.label : '';
    }).filter(Boolean).join(' · ');
  }
  if(d.type === 'ecr'){
    const e = d.ecr || {};
    let parts = [];
    if(e.tier){
      const t = ECR_TIERS.find(x => x.id === e.tier);
      if(t) parts.push(t.label);
    }
    (e.requirements || []).forEach(rid => {
      const req = ECR_REQUIREMENTS.find(x => x.id === rid);
      if(req) parts.push(req.label);
    });
    return parts.length > 0 ? parts.join(' · ') : 'ECR sans critère';
  }
  return '';
}

function getReceptionSummary(d){
  const r = (d && d.reception) || {};
  const channelLabels = (r.channels || []).map(cid => {
    const c = RECEPTION_CHANNELS.find(x => x.id === cid);
    return c ? c.label.toLowerCase() : '';
  }).filter(Boolean);
  if(channelLabels.length === 0) return 'Aucun canal sélectionné';
  let chPhrase;
  if(channelLabels.length === 1) chPhrase = channelLabels[0];
  else if(channelLabels.length === 2) chPhrase = channelLabels[0] + ' et ' + channelLabels[1];
  else chPhrase = channelLabels.slice(0,-1).join(', ') + ' et ' + channelLabels[channelLabels.length-1];
  const freq = RECEPTION_FREQUENCY.find(x => x.id === r.frequency);
  const hours = RECEPTION_HOURS.find(x => x.id === r.hours);
  let phrase = chPhrase.charAt(0).toUpperCase() + chPhrase.slice(1);
  if(freq) phrase += ', ' + freq.label.toLowerCase();
  if(hours) phrase += ', ' + hours.label.toLowerCase();
  return phrase + '.';
}

function calcBuilderMatches(){
  let n = 1487;
  const d = BuilderState.draft;
  if(d.type === 'criteres'){
    if(d.posture) n = Math.floor(n * 0.18);
    if(d.presetUsed) n = Math.floor(n * 0.42);
    let totalAxisCount = 0;
    if(d.axes){
      for(const k in d.axes) totalAxisCount += (d.axes[k] || []).length;
    }
    if(totalAxisCount > 0) n = Math.floor(n * Math.pow(0.65, totalAxisCount));
  } else if(d.type === 'modele') n = Math.floor(n * 0.04);
  else if(d.type === 'rarete'){
    const r = d.rarity || {};
    let mult = 1;
    if(r.production){
      const p = RARITY_PRODUCTION.find(x => x.id === r.production);
      if(p) mult *= p.mult;
    }
    if(r.circulation){
      const c = RARITY_CIRCULATION.find(x => x.id === r.circulation);
      if(c) mult *= c.mult;
    }
    if(r.configs && r.configs.length > 0){
      r.configs.forEach(cid => {
        const cfg = RARITY_CONFIGS.find(x => x.id === cid);
        if(cfg) mult *= cfg.mult;
      });
    }
    n = Math.floor(n * mult);
  }
  else if(d.type === 'signal'){
    const flags = (d.signal && d.signal.flags) || [];
    let total = 0;
    flags.forEach(fid => {
      const f = SIGNAL_FLAGS.find(x => x.id === fid);
      if(f) total += f.rate;
    });
    n = total;
  }
  else if(d.type === 'ecr'){
    const e = d.ecr || {};
    let mult = 0.093;
    if(e.tier){
      const tier = ECR_TIERS.find(x => x.id === e.tier);
      if(tier) mult *= tier.mult;
    }
    (e.requirements || []).forEach(rid => {
      const req = ECR_REQUIREMENTS.find(x => x.id === rid);
      if(req) mult *= req.mult;
    });
    n = Math.floor(n * mult);
  }
  // Step 3 filtres — multiplicateurs chaînés sur le n calculé en Step 2
  const f = d.filters || {};
  let fMult = 1;
  if(f.budget){
    const b = FILTER_BUDGET.find(x => x.id === f.budget);
    if(b) fMult *= b.mult;
  }
  if(f.km){
    const k = FILTER_KM.find(x => x.id === f.km);
    if(k) fMult *= k.mult;
  }
  if(f.yearRange){
    const y = FILTER_YEARS.find(x => x.id === f.yearRange);
    if(y) fMult *= y.mult;
  }
  (f.options || []).forEach(oid => {
    const opt = FILTER_OPTIONS.find(x => x.id === oid);
    if(opt) fMult *= opt.mult;
  });
  n = Math.floor(n * fMult);
  return Math.max(n, 0);
}

function safeStorageGet(key, fallback){
  try {
    if(typeof localStorage === 'undefined') return fallback;
    const raw = localStorage.getItem(key);
    if(raw === null || raw === undefined) return fallback;
    const parsed = JSON.parse(raw);
    return parsed === null || parsed === undefined ? fallback : parsed;
  } catch(e){
    console.warn('[carnet] localStorage read failed for', key, '·', e.message);
    return fallback;
  }
}
function safeStorageSet(key, value){
  try {
    if(typeof localStorage === 'undefined') return false;
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  } catch(e){
    console.warn('[carnet] localStorage write failed for', key, '·', e.message);
    return false;
  }
}
function safeStorageRemove(key){
  try {
    if(typeof localStorage === 'undefined') return;
    localStorage.removeItem(key);
  } catch(e){
    /* silent — best effort */
  }
}

const CARNET_PAY_API = 'https://carnet-payements.schaillout.workers.dev';

// Donor session ID (UUID v4 anonyme, généré une fois par appareil)
function getDonorSessionId() {
  let sid = safeStorageGet(STORAGE_KEY_PREFIX + 'donor-session-id', null);
  if (!sid) {
    sid = ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
    );
    safeStorageSet(STORAGE_KEY_PREFIX + 'donor-session-id', sid);
  }
  return sid;
}

// Création réelle de payload Xaman via le Worker
// opts: { amount_eur, currency: 'XRP'|'RLUSD' }
async function createXamanPayload(opts) {
  const method = (opts.currency || 'XRP').toLowerCase();
  const body = {
    amount_eur: opts.amount_eur,
    method: method,
    donor_session_id: getDonorSessionId()
  };
  const resp = await fetch(`${CARNET_PAY_API}/xaman/donation/create`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    throw new Error(`Création paiement échouée (${resp.status}) : ${text || 'réseau indisponible'}`);
  }
  const data = await resp.json();
  return {
    uuid: data.uuid,
    qr_png: data.qr_png,
    deeplink: data.deeplink,
    amount_units: data.amount_units,
    currency: data.currency,
    amount_eur: data.amount_eur,
    destination: 'rJBhnYvg5kq9PgWFZziEXu2EcdJfcq8WSU',
    created_at: Date.now(),
    expires_at: data.expires_at || (Date.now() + 5 * 60 * 1000)
  };
}

// Polling du statut Xaman (toutes les 2.5s, max 5 min)
function pollXamanStatus(uuid, onResult) {
  let stopped = false;
  let consecutiveErrors = 0;
  const startTime = Date.now();
  const MAX_DURATION_MS = 5 * 60 * 1000;
  const POLL_INTERVAL_MS = 2500;

  async function tick() {
    if (stopped) return;
    if (Date.now() - startTime > MAX_DURATION_MS) {
      onResult({ uuid, status: 'expired', signed: false });
      return;
    }
    try {
      const resp = await fetch(`${CARNET_PAY_API}/xaman/status/${encodeURIComponent(uuid)}`);
      if (!resp.ok) throw new Error(`status ${resp.status}`);
      const data = await resp.json();
      consecutiveErrors = 0;
      if (data.signed === true || data.status === 'signed') {
        onResult({
          uuid: data.uuid,
          status: 'signed',
          signed: true,
          tx_hash: data.tx_hash,
          signed_at: data.signed_at,
          donor_wallet: data.donor_wallet
        });
        return;
      }
      if (data.status === 'expired' || data.status === 'rejected') {
        onResult({ uuid: data.uuid, status: data.status, signed: false });
        return;
      }
      if (!stopped) setTimeout(tick, POLL_INTERVAL_MS);
    } catch (err) {
      consecutiveErrors++;
      if (consecutiveErrors >= 3) {
        onResult({ uuid, status: 'error', signed: false, error: err.message });
        return;
      }
      if (!stopped) setTimeout(tick, POLL_INTERVAL_MS);
    }
  }

  setTimeout(tick, 1000);

  return { stop() { stopped = true; } };
}

// Record a successful donation (commune pour CB, Xaman, etc.)
function recordDonation(payload) {
  // payload : { amount_eur, method, currency?, tx_hash?, stripe_id? }
  State.donations = State.donations || [];
  const entry = {
    id: 'don_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    amount_eur: parseFloat(payload.amount_eur) || 0,

    currency: payload.currency || null,

  };
  State.donations.push(entry);
  State.isSupporter = true;
  persistDonations();
  persistSupporter();
  const newBadges = evaluateBadges();
  return { entry, newBadges };
}



// Calcule un score de complétion 0-100 pour une car owned
function completionScore(car) {
  if (!car) return 0;
  let score = 0;
  const photosCount = car.photosCount || (Array.isArray(car.photos) ? car.photos.length : 0);
  const servicesCount = Array.isArray(car.services) ? car.services.length : 0;
  const docsCount = car.docsCount || (Array.isArray(car.docs) ? car.docs.length : 0);
  const hasVin = !!(car.chassis && car.chassis.length >= 8);
  if (photosCount >= 3) score += 30;
  if (servicesCount >= 1) score += 30;
  if (docsCount >= 1) score += 20;
  if (hasVin) score += 20;
  return score;
}

// Détecte si une car owned mérite un nudge maintenant (toutes conditions cumulatives)
function carNeedsCompletionNudge(car) {
  if (!car) return false;
  if (State.completionEnabled === false) return false;
  if (car.ownership === 'wishlist') return false;
  if (car.saleStatus === 'sold') return false;
  if (completionScore(car) >= 50) return false;
  // J+7 après ajout
  const addedAt = car.addedAt || car.acquiredAt || 0;
  if (!addedAt) return false; // unknown age, skip
  const J7 = 7 * 24 * 3600 * 1000;
  if (Date.now() < addedAt + J7) return false;
  // Dismiss permanent
  if ((State.completionDismissed || []).indexOf(car.id) !== -1) return false;
  // Snooze actif
  const snoozedUntil = (State.completionSnoozedUntil || {})[car.id];
  if (snoozedUntil && Date.now() < snoozedUntil) return false;
  // Smart timing : visité < 24h
  const lastVisit = (State.completionLastVisit || {})[car.id];
  const HRS_24 = 24 * 3600 * 1000;
  if (lastVisit && Date.now() < lastVisit + HRS_24) return false;
  // Cadence : 1×/mois depuis dernier banner
  const lastBanner = (State.completionLastBannerAt || {})[car.id];
  const MO = 30 * 24 * 3600 * 1000;
  if (lastBanner && Date.now() < lastBanner + MO) return false;
  // Silence pour cette session (× sur banner)
  if ((State.completionSessionSilenced || {})[car.id]) return false;
  return true;
}

// Trouve la première car qui mérite un nudge (ou null)
function findCarNeedingCompletion() {
  const cars = State.garage || [];
  for (let i = 0; i < cars.length; i++) {
    if (carNeedsCompletionNudge(cars[i])) return cars[i];
  }
  return null;
}

// Compte les owned cars incomplètes (pour badge tab bar)
function countIncompleteOwnedCars() {
  return (State.garage || []).filter(c =>
    c.ownership !== 'wishlist'
    && (c.saleStatus !== 'sold')
    && completionScore(c) < 50
  ).length;
}

// Messages voix CARNET — variations selon ce qui manque le plus
function getCompletionMessage(car) {
  const photosCount = car.photosCount || (Array.isArray(car.photos) ? car.photos.length : 0);
  const servicesCount = Array.isArray(car.services) ? car.services.length : 0;
  const docsCount = car.docsCount || 0;
  const hasVin = !!(car.chassis && car.chassis.length >= 8);
  const label = `${car.brand || ''} ${car.model || ''}`.trim() || 'cette voiture';
  // Choix du wording selon le manque principal
  if (photosCount < 3) {
    return `Ta « ${label} » mérite mieux. Trois photos de plus et son carnet prend du relief.`;
  }
  if (servicesCount < 1) {
    return `Pas d\u2019entretien renseigné sur « ${label} ». Une entrée, et la cote sera plus juste.`;
  }
  if (docsCount < 1) {
    return `Une facture, un certificat — « ${label} » gagne en transparence pour la revente.`;
  }
  if (!hasVin) {

}

function formatRelativeTime(timestamp){
  if(!timestamp) return '';
  const elapsed = Date.now() - timestamp;
  if(elapsed < 0) return 'à l\u2019instant';
  const minutes = Math.floor(elapsed / 60000);
  if(minutes < 1) return 'à l\u2019instant';
  if(minutes < 60) return 'il y a ' + minutes + ' min';
  const hours = Math.floor(minutes / 60);
  if(hours < 24) return 'il y a ' + hours + 'h';
  const days = Math.floor(hours / 24);
  return 'il y a ' + days + ' jour' + (days === 1 ? '' : 's');
}

function deriveFreshLabel(updatedAt) {
  if (!updatedAt) return '';
  const then = new Date(updatedAt).getTime();
  const now = Date.now();
  const diffMs = now - then;
  const diffH = diffMs / 3600000;
  if (diffH < 1) return 'à l\u2019instant';
  if (diffH < 24) return `il y a ${Math.round(diffH)} h`;
  const diffD = Math.round(diffH / 24);
  if (diffD < 7) return `il y a ${diffD} j`;
  if (diffD < 30) return `il y a ${Math.round(diffD / 7)} sem.`;
  return `il y a ${Math.round(diffD / 30)} mois`;
}

function buildChipsFromFeats(row) {
  const chips = [];
  // Ordre = priorité d'affichage (max 3 affichés sur la card)
  if (row.feat_matching_numbers === true) chips.push('Matching numbers');
  if (row.feat_carnet_complet === true) chips.push('CARNET complet');
  if (row.feat_first_owner === true) chips.push('Première main');
  if (row.feat_serie_limitee === true) chips.push('Série limitée');
  if (row.feat_etat_concours === true) chips.push('État concours');
  if (row.feat_etat_origine === true) chips.push('État d\u2019origine');
  if (row.feat_certificat_constructeur === true) chips.push('Certificat constructeur');
  if (row.feat_factures_completes === true) chips.push('Factures complètes');
  if (row.feat_suivi_constructeur === true) chips.push('Suivi constructeur');
  if (row.feat_suivi_specialiste === true) chips.push('Suivi spécialiste');
  if (row.feat_revision_recente === true) chips.push('Révision récente');
  if (row.feat_sous_garantie_constructeur === true) chips.push('Sous garantie');
  if (row.feat_garantie_extension === true) chips.push('Garantie étendue');
  if (row.feat_peinture_origine === true) chips.push('Peinture d\u2019origine');
  if (row.feat_pneus_neufs === true) chips.push('Pneus neufs');
  return chips;
}

// ─── v6.9 : Chips sanitization (DB ch peut être array, string, objet JSONB) ─
function sanitizeChips(ch) {
  if (!ch) return [];
  if (Array.isArray(ch)) {
    return ch.map(item => {
      if (typeof item === 'string') return item.trim();
      if (item && typeof item === 'object') {
        return item.label || item.name || item.text || item.title || null;
      }
      return null;
    }).filter(Boolean);
  }
  if (typeof ch === 'string') {
    return ch.split(/[\u00b7,;]/).map(s => s.trim()).filter(Boolean);
  }
  if (typeof ch === 'object') {
    // JSONB object : on tente quelques structures connues
    if (ch.list && Array.isArray(ch.list)) return sanitizeChips(ch.list);
    if (ch.values && Array.isArray(ch.values)) return sanitizeChips(ch.values);
    // Sinon on prend les valeurs string de l'objet
    return Object.values(ch).filter(v => typeof v === 'string' && v.length > 0);
  }
  return [];
}

// ─── v6.9 : Title cleaner (mo peut contenir le titre annonce scraper) ──────
function cleanTitle(mo) {
  if (!mo) return '';
  let s = String(mo);
  // Strip leading/trailing decorations
  s = s.replace(/^[\s*\u2605\u2606\u2728\u25aa\u25ab\u2764\ufe0f\-_=]+/, '');
  s = s.replace(/[\s*\u2605\u2606\u2728\u25aa\u25ab\u2764\ufe0f\-_=]+$/, '');
  // Strip common scraper noise
  s = s.replace(/\b(BTW|MWST|TVA|EXKL\.?|INCL\.?|KORTING|NEUWAGEN|JAHRESWAGEN|GARANTIE)\b/gi, '');
  // Compact spaces
  s = s.replace(/\s+/g, ' ').trim();
  // Title case si tout en majuscules (long > 5 chars)
  if (s.length > 5 && s === s.toUpperCase()) {
    s = s.split(' ').map(w => {
      if (w.length === 0) return w;
      // Garder les abbreviations courtes en maj (SL, RS, M3...)
      if (w.length <= 2 || /^[0-9]/.test(w)) return w;
      return w.charAt(0) + w.slice(1).toLowerCase();
    }).join(' ');
  }
  return s;
}

// ─── v6.12 : Photos via Cloudflare Worker (lazy proxy R2) ───────────
// Pipeline : car_id → Worker → src_url → og:image → cache R2 → image
// Si DB stocke un jour des champs photo natifs, ils gagnent la priorité.
const PHOTO_PROXY_URL = 'https://carnet-photos-proxy.schaillout.workers.dev';

function extractPhotosFromRow(row) {
  if (!row) return [];
  // Champs candidats par ordre de préférence
  const candidates = ['photos', 'images', 'photo_urls', 'image_urls', 'pictures', 'gallery', 'ss', 'hs', 'thumbnail', 'image_url', 'photo_url'];
  for (const field of candidates) {
    const val = row[field];
    if (!val) continue;
    // Array natif
    if (Array.isArray(val)) {
      const urls = val.map(v => {
        if (typeof v === 'string') return v;
        if (v && v.url) return v.url;
        if (v && v.src) return v.src;
        return null;
      }).filter(u => u && u.startsWith('http'));
      if (urls.length > 0) return urls;
    }
    // String : JSON array ou URL unique ou CSV
    if (typeof val === 'string') {
      const trimmed = val.trim();
      if (trimmed.startsWith('[')) {
        try {
          const parsed = JSON.parse(trimmed);
          if (Array.isArray(parsed)) {
            const urls = parsed.map(v => typeof v === 'string' ? v : (v && v.url) ? v.url : null).filter(u => u && u.startsWith('http'));
            if (urls.length > 0) return urls;
          }
        } catch {}
      }
      // CSV
      if (trimmed.includes(',http') || trimmed.includes(';http')) {
        const urls = trimmed.split(/[,;]/).map(s => s.trim()).filter(s => s.startsWith('http'));
        if (urls.length > 0) return urls;
      }
      // URL unique
      if (trimmed.startsWith('http')) return [trimmed];
    }
    // Objet { url } ou { src }
    if (typeof val === 'object' && val.url && typeof val.url === 'string') {
      return [val.url];
    }
  }
  // v6.12 : fallback Worker lazy proxy (Worker scrape og:image + cache R2)
  if (row.id) {
    return [`${PHOTO_PROXY_URL}/${row.id}`];
  }
  return [];
}

function dbRowToListing(row) {
  // v6.11 : titre canonique (vs titre annonce trash)
  // Priorité : mo_canon > mod > mo (cleaned)
  const titleRaw = row.mo_canon || row.mod || row.mo || '';
  const cleanedTitle = cleanTitle(titleRaw);

  // v6.11 : chips construites depuis feat_* booleans + fallback ch + feat_chips
  const featChips = buildChipsFromFeats(row);
  const dbChips = sanitizeChips(row.feat_chips || row.ch);
  // Merge sans doublons (case-insensitive)
  const seenLower = new Set();
  const allChips = [];
  for (const chip of [...featChips, ...dbChips]) {
    const key = String(chip).toLowerCase().trim();
    if (key && !seenLower.has(key)) {
      seenLower.add(key);
      allChips.push(chip);
    }
  }

  return {
    id: row.id,
    mk: row.mk || '',
    mo: cleanedTitle,
    mo_raw: row.mo || '',  // garde l'original pour debug
    yr: row.yr || null,
    km: row.km || 0,
    px: row.px || 0,
    ci: row.ci || '',
    co: row.co || '',
    src: row.src || 'Source',
    src_url: row.src_url || '',
    tier: deriveTier(row.px),
    sc: row.feat_score || row.sc || 0,  // feat_score (curated) prioritaire
    ve: row.ve || '',
    ch: allChips,
    de: row.de || '',  // description full pour fiche détail
    feat_llm_summary: row.feat_llm_summary || '',
    feat_llm_highlights: row.feat_llm_highlights || '',
    photos: extractPhotosFromRow(row),
    fresh: deriveFreshLabel(row.updated_at || row.created_at)
  };
}

function dbRowToAuction(row) {
  // Phase 2 : row contient un champ JSONB `auction` avec lot, estimateLow, etc.

// ─── v6.4 : Pagination 95-par-95 (cap Supabase 1000, ~24k accessibles) ─
const LISTINGS_PAGE_SIZE = 42;

async function fetchListingsLive(opts) {
  opts = opts || {};
  const pageSize = LISTINGS_PAGE_SIZE;
  const offset = opts.offset || 0;
  const supa = getSupabaseClient();
  if (!supa) return null;

  try {
    // v6.7 : retiré is_autoradar=true pour ouvrir le pool aux 42 top par score
    // (tri sc DESC garantit la qualité en premier sur ~24k cars actives)
    // v6.8 : SELECT * pour récupérer tous les champs incl. photos candidates
    let query = supa.from('cars')
      .select('*', { count: 'exact' })
      .eq('status', 'active')
      .eq('is_auction', false)
      .gt('px', 0)
      .order('sc', { ascending: false, nullsFirst: false })
      .range(offset, offset + pageSize - 1);

    if (opts.tier && opts.tier !== 'all') {
      if (opts.tier === 'investment') query = query.gte('px', 1000000);
      else if (opts.tier === 'modern-classic') query = query.gte('px', 200000).lt('px', 1000000);
      else if (opts.tier === 'sportive') query = query.lt('px', 200000).gt('px', 0);
    }

    if (opts.search && opts.search.trim()) {
      const q = opts.search.trim().replace(/[%_,]/g, '');
      query = query.or(`mk.ilike.%${q}%,mo.ilike.%${q}%,ci.ilike.%${q}%`);
    }

    const { data, error, count } = await query;
    if (error) { console.error('[CARNET] fetchListings error :', error); return null; }
    // v6.10 : audit DB intelligent — scanne TOUS les champs pour URLs images
    if (data && data.length > 0 && offset === 0 && !window._carnetDbAudited) {
      window._carnetDbAudited = true;
      const sample = data.slice(0, Math.min(5, data.length));
      function findUrlsInValue(val) {
        const urls = [];
        if (typeof val === 'string') {
          const m = val.match(/https?:\/\/[^\s"'<>\]]+/g);
          if (m) urls.push(...m);
        } else if (Array.isArray(val)) {
          val.forEach(v => urls.push(...findUrlsInValue(v)));
        } else if (val && typeof val === 'object') {
          Object.values(val).forEach(v => urls.push(...findUrlsInValue(v)));
        }
        return urls;
      }
      function looksLikeImage(url) {
        return /\.(jpg|jpeg|png|webp|gif|avif|bmp)(\?|#|$)/i.test(url) ||
               /\b(image|photo|picture|thumb|img|media)\b/i.test(url);
      }
      const fieldStats = {};
      for (const r of sample) {
        for (const [key, val] of Object.entries(r)) {
          const urls = findUrlsInValue(val);
          if (urls.length === 0) continue;
          if (!fieldStats[key]) fieldStats[key] = { total: 0, images: 0, samples: [] };
          fieldStats[key].total += urls.length;
          urls.forEach(u => {
            if (looksLikeImage(u)) {
              fieldStats[key].images++;
              if (fieldStats[key].samples.length < 3) fieldStats[key].samples.push(u);
            }
          });
        }
      }
      const photoFields = Object.entries(fieldStats)
        .filter(([k, v]) => v.images > 0)
        .sort((a, b) => b[1].images - a[1].images);
      console.group('[CARNET] DB photos audit');
      console.log('Tous les champs (78) :', Object.keys(data[0]).sort());
      if (photoFields.length > 0) {
        console.log('%c\u2713 Champs contenant des URLs images :', 'color: green; font-weight: bold');
        photoFields.forEach(([field, stats]) => {
          console.log(`  → ${field} : ${stats.images} URLs images dans 5 sample rows`);
          console.log(`    samples :`, stats.samples);
        });
      } else {
        console.warn('%c\u26a0 Aucun champ avec des URLs images trouvé dans 5 sample rows', 'color: orange; font-weight: bold');
        console.log('Tous les champs contenant des URLs (toutes types) :', Object.fromEntries(Object.entries(fieldStats).map(([k, v]) => [k, v.total + ' URLs total'])));
      }
      console.log('Sample row complet (1ère row) :', data[0]);
      console.groupEnd();
    }
    return {
      data: (data || []).map(dbRowToListing),
      total: count || 0,
      hasMore: (data || []).length === pageSize,
      offset: offset
    };
  } catch (e) {
    console.error('[CARNET] fetchListings exception :', e);
    return null;
  }
}

// ─── v6.4 : Matches live calculées depuis liveListings + alertes ────
function ruleMatchesCarText(rule, carText) {
  if (!rule || !carText) return false;
  const r = String(rule).toLowerCase();
  const t = String(carText).toLowerCase();
  const tokens = r.split(/[\s\-\u00b7,\.]+/).filter(w => w.length >= 3);
  if (tokens.length === 0) return false;
  const hits = tokens.filter(w => t.includes(w)).length;
  return hits / tokens.length >= 0.5;
}

function carMatchesAlert(car, alert) {
  if (!alert || alert.paused) return false;
  const carText = `${car.mk || ''} ${car.mo || ''}`;
  if (alert.type === 'modele') return ruleMatchesCarText(alert.rule, carText);
  if (alert.type === 'criteres') return ruleMatchesCarText(alert.rule, carText) || ruleMatchesCarText(alert.meta, carText);
  return false;
}

function buildMatchFromCar(car, alert) {
  return {
    id: `live-${car.id}-${alert.id}`,
    name: `${car.mk || ''} ${car.mo || ''}`.trim(),
    year: car.yr,
    km: car.km || 0,
    price: car.px || 0,
    src: car.src || 'Source',
    src_url: car.src_url || '',
    alertLabel: alert.rule,
    alertId: alert.id,
    ago: car.fresh || 'récente',
    ci: car.ci || '',
    co: car.co || '',
    sc: car.sc || 0
  };
}

function computeLiveMatches() {
  if (!State.liveListings || State.liveListings.length === 0) return [];
  const activeAlerts = (State.alerts || []).filter(a => !a.paused);
  if (activeAlerts.length === 0) return [];
  const matches = [];
  const seenCarIds = new Set();
  for (const car of State.liveListings) {
    if (seenCarIds.has(car.id)) continue;
    for (const alert of activeAlerts) {
      if (carMatchesAlert(car, alert)) {
        matches.push(buildMatchFromCar(car, alert));
        seenCarIds.add(car.id);
        break;
      }
    }
  }
  return matches;
}

  State._loadingListings = false;
  if (result && result.data) {
    if (append && State.liveListings) {
      State.liveListings = State.liveListings.concat(result.data);
    } else {
      State.liveListings = result.data;
    }
    State.liveListingsTotal = result.total;
    State.liveListingsHasMore = result.hasMore;
    State.liveMode = true;
    if (typeof computeLiveMatches === 'function') {
      State.liveMatches = computeLiveMatches();
    }
    if (State.activeTab === 'annonces' && typeof renderListingsPage === 'function') {
      renderListingsPage();
    }
    if (State.activeTab === 'affut' && typeof renderMatches === 'function') {
      renderMatches();
    }
  }
}

async function loadAuctionsLive() {
  if (State._loadingAuctions) return;
  State._loadingAuctions = true;
  const data = await fetchAuctionsLive({ limit: 60 });
  State._loadingAuctions = false;
  if (data) {
    State.liveAuctions = data;
    State.liveMode = true;
    if (State.activeTab === 'encheres' && typeof renderEncheresPage === 'function') {
      renderEncheresPage();
    }
  }
}

function updateLiveBadge() {
  const heros = document.querySelectorAll('main.main .hero');
  heros.forEach(hero => {
    let badge = hero.querySelector('.live-mode-badge');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'live-mode-badge';
      // Position relative dans hero (ensure parent has position relative)
      if (getComputedStyle(hero).position === 'static') {
        hero.style.position = 'relative';
      }
      hero.appendChild(badge);
    }
    if (State.liveMode) {
      badge.classList.add('live');
      badge.textContent = 'LIVE';
    } else {
      badge.classList.remove('live');
      badge.textContent = 'DEMO';
    }
  });
}

// Simple mock QR (vrais QR à brancher avec qrcode.js lib en production)
function renderMockQR(data) {
  // SVG placeholder ressemblant à un QR — pour la démo
  const cells = 21;
  let rects = '';
  // Hash simple pour pattern deterministe basé sur data
  const seed = data ? data.length : 0;
  for (let y = 0; y < cells; y++) {
    for (let x = 0; x < cells; x++) {
      const corner = (x < 7 && y < 7) || (x >= cells - 7 && y < 7) || (x < 7 && y >= cells - 7);
      const inner = (x >= 2 && x < 5 && y >= 2 && y < 5)
                 || (x >= cells - 5 && x < cells - 2 && y >= 2 && y < 5)
                 || (x >= 2 && x < 5 && y >= cells - 5 && y < cells - 2);
      const corner_outer = (x === 0 || x === 6 || y === 0 || y === 6) && (x < 7 && y < 7)
                        || (x === cells - 7 || x === cells - 1 || y === 0 || y === 6) && (x >= cells - 7 && y < 7)
                        || (x === 0 || x === 6 || y === cells - 7 || y === cells - 1) && (x < 7 && y >= cells - 7);
      // Use deterministic pattern based on seed + position
      const noise = ((x * 7919 + y * 6151 + seed * 3001) % 47) > 23;
      const filled = inner || corner_outer || (!corner && noise);
      if (filled) {
        rects += `<rect x="${x * 8}" y="${y * 8}" width="8" height="8" fill="currentColor"/>`;
      }
    }
  }
  return `<svg viewBox="0 0 ${cells * 8} ${cells * 8}" xmlns="http://www.w3.org/2000/svg" class="paywall-qr-svg">${rects}</svg>`;
}

function formatEur(v) {
  if (v < 10) return v.toFixed(2).replace('.', ',') + '\u202f\u20ac';
  return Math.round(v).toLocaleString('fr-FR').replace(',', '\u202f') + '\u202f\u20ac';
}

// ─── Collection manager feedback (profit/perte) ────────────────────
function computeCollectionFeedback(paidPrice, brand, model, year, km, manualCote, finish, tunerName, tunerCategories, serviceUpToDate, fullServiceHistory, hasLeather){
  if(!paidPrice || paidPrice <= 0) return null;
  let coteUsed = (manualCote && manualCote > 0) ? manualCote : 0;
  if(!coteUsed){
    const est = estimateCoteRange(brand, model, year, km, finish, tunerName, tunerCategories, serviceUpToDate, fullServiceHistory, hasLeather);
    if(!est) return null;
    // Médiane biaisée vers le haut (valorisation) : 60% high + 40% low
    coteUsed = Math.round(est.low * 0.4 + est.high * 0.6);
  }
  if(!coteUsed) return null;
  const delta = coteUsed - paidPrice;
  const percent = (delta / paidPrice) * 100;
  // Phrases CARNET (voix complice, jamais condescendante)
  const WIN_PHRASES = [
    "Bien joué. On garde ce flair pour la prochaine.",
    "Beau coup. La cote te suit, c'est bon signe.",
    "Excellent. C'est le pari de quelqu'un qui sait lire.",
    "Bien vu. Tu lis le marché avant le marché.",
    "Joli. La collection démarre fort.",
    "Achat malin. On continue sur cette lancée."
  ];
  const BIG_WIN_PHRASES = [
    "Magnifique. Ce genre de coup, ça se savoure.",
    "Coup de maître. Tu as senti avant les autres.",
    "Trouvaille. Le marché va te donner raison.",
    "Là, c'est du flair pur. On marque le coup.",
    "Quand on chasse comme ça, on garde les preuves."
  ];
  const NEUTRAL_PHRASES = [
    "Prix juste. La cote te suit, c'est rassurant.",
    "Pile dans la fourchette. Pas de regret.",
    "Le marché te valide.",
    "Achat aligné. On continue.",
    "Tu paies ce que ça vaut. Ni plus ni moins."
  ];
  const LOSS_PHRASES = [
    "Outch. On te trouvera mieux la prochaine.",
    "Aïe, un poil cher. La prochaine, on regarde ensemble.",
    "Pas l'affaire du siècle. On compense sur la suivante.",
    "Au-dessus de la cote. Pas dramatique. On chasse mieux après.",
    "Le marché en parlera. On apprend, on avance."
  ];
  const BIG_LOSS_PHRASES = [
    "Bon, on va dire qu'elle te plaît vraiment.",
    "Le cœur a parlé. La raison, on la met de côté pour la suite.",
    "Pas le coup du siècle. La prochaine, on t'attend au tournant.",
    "Sentiment de collectionneur. La logique reviendra."
  ];
  let mode, message;
  const seed = _hashCarId((brand || '') + (model || '') + (year || ''));
  if(percent >= 25){
    mode = 'big-win';
    message = BIG_WIN_PHRASES[seed % BIG_WIN_PHRASES.length];
  } else if(percent >= 5){
    mode = 'win';
    message = WIN_PHRASES[seed % WIN_PHRASES.length];
  } else if(percent <= -25){
    mode = 'big-loss';
    message = BIG_LOSS_PHRASES[seed % BIG_LOSS_PHRASES.length];
  } else if(percent <= -5){
    mode = 'loss';
    message = LOSS_PHRASES[seed % LOSS_PHRASES.length];
  } else {
    mode = 'neutral';
    message = NEUTRAL_PHRASES[seed % NEUTRAL_PHRASES.length];
  }
  return { delta, percent, mode, message, coteUsed, paidPrice };
}

function renderCollectionFeedbackBlock(){
  const f = GarageFormState;
  const paidPrice = parseInt(f.paidPrice, 10) || 0;
  const manualCote = parseInt(f.cote, 10) || 0;
  const fb = computeCollectionFeedback(paidPrice, f.brand, f.model, f.year, parseInt(f.km, 10) || 0, manualCote, f.finish, f.tunerName, f.tunerCategories, f.serviceUpToDate, f.fullServiceHistory, f.hasLeather);
  if(!fb) return '';
  const fmtNum = (n) => {
    if(n >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace('.', ',') + ' M\u202f\u20ac';
    if(n >= 1000) return Math.round(n / 1000) + ' k\u202f\u20ac';
    return n + ' \u20ac';
  };
  const arrow = fb.delta >= 0 ? '\u25b2' : '\u25bc';
  const sign = fb.delta >= 0 ? '+' : '\u2212';
  const percentSign = fb.percent >= 0 ? '+' : '';
  const direction = fb.delta >= 0 ? 'sous la cote' : 'au-dessus de la cote';
  return `
    <div class="collection-feedback-block mode-${fb.mode}">
      <div class="cf-delta-row">
        <span class="cf-arrow">${arrow}</span>
        <span class="cf-amount">${sign}\u202f${esc(fmtNum(Math.abs(fb.delta)))}</span>
        <span class="cf-percent">${percentSign}${fb.percent.toFixed(1)} % ${direction}</span>
      </div>
      <div class="cf-message">${esc(fb.message)}</div>
    </div>
  `;
}

function updateCollectionFeedback(){
  const container = document.getElementById('collection-feedback-container');
  if(!container) return;
  container.innerHTML = renderCollectionFeedbackBlock();
}

function getFinishesForBrand(brand){
  if(!brand) return [];
  const trimmed = String(brand).trim();
  if(FINISH_BY_BRAND[trimmed]) return FINISH_BY_BRAND[trimmed];
  const lower = trimmed.toLowerCase();
  for(const key in FINISH_BY_BRAND){
    if(key.toLowerCase() === lower) return FINISH_BY_BRAND[key];
  }
  return [];
}

function searchFinishes(brand, query){
  const all = getFinishesForBrand(brand);
  if(all.length === 0) return [];
  if(!query) return all.slice(0, 12);
  const q = String(query).toLowerCase().trim();
  if(q.length === 0) return all.slice(0, 12);
  const startsWith = [];
  const includes = [];
  for(const f of all){
    const fl = f.toLowerCase();
    if(fl.startsWith(q)) startsWith.push(f);
    else if(fl.indexOf(q) !== -1) includes.push(f);
  }
  return [...startsWith, ...includes];
}

function updateFinishSuggestions(){
  const input = document.getElementById('garage-input-finish');
  const list = document.getElementById('garage-autocomplete-finish');
  if(!input || !list) return;
  const brand = GarageFormState.brand;
  if(!brand){
    list.innerHTML = '';
    list.classList.remove('open');
    return;
  }
  const q = input.value.trim();
  const matches = searchFinishes(brand, q).slice(0, 8);
  if(matches.length === 0 || (matches.length === 1 && matches[0].toLowerCase() === q.toLowerCase())){
    list.innerHTML = '';
    list.classList.remove('open');
    return;
  }
  list.innerHTML = matches.map(f => `
    <button type="button" class="garage-autocomplete-item" data-action="pickGarageFinish" data-value="${esc(f)}">
      ${esc(f)}
    </button>
  `).join('');
  list.classList.add('open');
}

// Boost cote selon préparation tuner
function getTunerBoost(tunerName, categories){
  if(!tunerName) return 1;
  if(tunerName === '__none__') return 1.05; // matching numbers / d'origine = rassurant collector
  // Tuners "transformateurs" : changent radicalement la valeur perçue
  const HIGH_TRANSFORMERS = ['Singer', 'Gunther Werks', 'Theon Design', 'RUF', 'Alpina'];
  // Tuners premium reconnus
  const PREMIUM_TUNERS = ['Brabus', 'Carlsson', 'Mansory', 'Hennessey', 'Saleen', 'Shelby', 'Lingenfelter', 'Callaway', 'AC Schnitzer'];
  // Tuners moyens (préparations connues mais moins iconiques)
  const MID_TUNERS = ['TechArt', 'Gemballa', '9ff', 'Lorinser', 'Hamann', 'G-Power', 'Hartge', 'ABT', 'MTM', 'Wheelsandmore', 'Novitec', 'DMC', 'Liberty Walk', 'Overfinch', 'Kahn Design', 'Startech', 'Wald', 'Spofec', 'AEV', 'TRD', "TOM'S", 'HKS', 'Mugen', 'Spoon Sports', 'Prodrive', 'Ralliart', 'STI', 'Oettinger', 'Nismo', "Mine's"];
  let boost;
  if(HIGH_TRANSFORMERS.indexOf(tunerName) !== -1) boost = 1.40;
  else if(PREMIUM_TUNERS.indexOf(tunerName) !== -1) boost = 1.18;
  else if(MID_TUNERS.indexOf(tunerName) !== -1) boost = 1.10;
  else boost = 1.06; // tuner inconnu = boost modeste
  // Bonus selon nombre de catégories modifiées (max +20%)
  if(categories && categories.length){
    boost += Math.min(0.20, categories.length * 0.04);
  }
  return boost;
}

function extractBrandFromName(name){
  if(!name) return '';
  const trimmed = String(name).trim();
  if(typeof BRANDS_REFERENTIAL !== 'undefined'){
    // Match le plus long en premier (Mercedes-Benz avant Mercedes, Land Rover avant Land)
    const sorted = [...BRANDS_REFERENTIAL].sort((a,b) => b.length - a.length);
    for(const brand of sorted){
      if(trimmed.toLowerCase().startsWith(brand.toLowerCase() + ' ')){
        return brand;
      }
      if(trimmed.toLowerCase() === brand.toLowerCase()){
        return brand;
      }
    }
  }
  return trimmed.split(/\s+/)[0] || '';
}

function extractModelFromName(name, brand){
  if(!name) return '';
  const trimmed = String(name).trim();
  if(!brand) return trimmed;
  if(trimmed.toLowerCase().startsWith(brand.toLowerCase() + ' ')){
    return trimmed.substring(brand.length).trim();
  }
  return trimmed;
}

// Calcule l'opportunité d'un match vs cote CARNET
function getMatchOpportunity(match){
  if(!match || !match.price) return null;
  const brand = extractBrandFromName(match.name);
  const model = extractModelFromName(match.name, brand);
  if(typeof estimateCoteRange !== 'function') return null;
  const est = estimateCoteRange(brand, model, match.year, match.km || 0);
  if(!est) return null;
  const median = Math.round(est.low * 0.5 + est.high * 0.5);
  const delta = match.price - median;
  const pct = (delta / median) * 100;
  let mode = 'flat';
  let label = 'au prix';
  if(pct <= -20){ mode = 'big-win'; label = 'belle affaire'; }
  else if(pct <= -10){ mode = 'win'; label = 'sous la cote'; }
  else if(pct <= -3){ mode = 'win-light'; label = 'légèrement sous'; }
  else if(pct < 3){ mode = 'flat'; label = 'dans le marché'; }
  else if(pct < 10){ mode = 'loss-light'; label = 'un peu engagé'; }
  else if(pct < 20){ mode = 'loss'; label = 'au-dessus'; }
  else { mode = 'big-loss'; label = 'haut de gamme'; }
  return {delta, pct, mode, label, median, range: {low: est.low, high: est.high}};
}

// ─── Voix CARNET brève pour la card (gestionnaire collection condensé) ───
function getCardVoice(car){
  if(!car) return {text: '', mode: 'neutral'};
  const cote = car.cote || 0;
  const paid = car.paidPrice || 0;
  if(paid === 0 || cote === 0) return {text: '', mode: 'neutral'};
  const delta = cote - paid;
  const pct = (delta / paid) * 100;
  // Phrases CARNET courtes (italic, no superlatif)
  if(pct >= 50) return {text: "Bien joué — la cote s'est envolée.", mode: 'big-win'};
  if(pct >= 20) return {text: "Tu as bien acheté.", mode: 'win'};
  if(pct >= 5)  return {text: "Plus-value tranquille.", mode: 'win'};
  if(pct >= -5) return {text: "Le marché reste stable, comme prévu.", mode: 'flat'};
  if(pct >= -20) return {text: "La cote glisse — à garder en visu.", mode: 'loss'};
  return {text: "Coup dur, mais on garde le cap.", mode: 'big-loss'};
}

function formatDeltaShort(delta){
  if(delta === 0) return '— 0 €';
  const sign = delta > 0 ? '↗' : '↘';
  const prefix = delta > 0 ? '+' : '−';
  return `${sign} ${prefix} ${fmtPrice(Math.abs(delta))}`;
}

function getBrandLogoSvg(brand){
  if(!brand) return null;
  const trimmed = String(brand).trim();
  if(BRAND_LOGOS_SVG[trimmed]) return BRAND_LOGOS_SVG[trimmed];
  // Cas insensible à la casse
  const lower = trimmed.toLowerCase();
  for(const key in BRAND_LOGOS_SVG){
    if(key.toLowerCase() === lower) return BRAND_LOGOS_SVG[key];
  }
  // Mercedes alias
  if(lower === 'mercedes') return BRAND_LOGOS_SVG['Mercedes-Benz'];
  return null;
}

// ─── Photo + monogramme fallback (Garage v5.30) ────────────────────
function getCarFirstPhoto(car){
  if(!car || !car.photos || !Array.isArray(car.photos) || car.photos.length === 0) return null;
  const first = car.photos[0];
  // v6.8 : support both shapes
  // - Garage local : { id, dataUrl } (FileReader base64)
  // - Live DB : string URL directe
  if (typeof first === 'string') return first;
  if (first && first.dataUrl) return first.dataUrl;
  if (first && first.url) return first.url;
  return null;
}

function getBrandMonogram(brand){
  if(!brand) return '?';
  const trimmed = String(brand).trim();
  // Cas spéciaux pour les marques composées ou iconiques
  const SPECIAL = {
    'Mercedes-Benz': 'M', 'Mercedes-AMG': 'AMG', 'Mercedes': 'M',
    'Range Rover': 'RR', 'Land Rover': 'LR',
    'Rolls-Royce': 'RR', 'Aston Martin': 'AM',
    'Alfa Romeo': 'AR', 'Tesla': 'T',
    'BMW': 'BMW', 'AMG': 'AMG'
  };
  if(SPECIAL[trimmed]) return SPECIAL[trimmed];
  return trimmed.charAt(0).toUpperCase();
}


// ─── v6.13 : Photo error → cascade fallback brand (helper global) ────
function _thumbErrorFallback(imgEl) {
  if (!imgEl) return;
  const brand = imgEl.dataset.brand || '';
  imgEl.style.display = 'none';
  const sk = imgEl.previousElementSibling;
  if (sk && sk.classList.contains('car-thumb-skeleton')) {
    sk.style.display = 'none';
  }
  // v6.14 : SVG d'abord (vrai logo CARNET stylé), CDN ensuite, mono en dernier
  const svg = (typeof getBrandLogoSvg === 'function') ? getBrandLogoSvg(brand) : null;
  const cdn = (typeof getBrandLogoCdnUrl === 'function') ? getBrandLogoCdnUrl(brand) : null;
  const mono = (typeof getBrandMonogram === 'function') ? getBrandMonogram(brand) : (brand.charAt(0).toUpperCase() || '?');
  let fallbackHtml;
  if (svg) {
    fallbackHtml = '<div class="car-thumb-fallback car-thumb-svg-mode">' + svg + '</div>';
  } else if (cdn) {
    fallbackHtml = '<img class="car-thumb-cdn-img" src="' + esc(cdn) + '" alt="' + esc(brand) + '" loading="lazy" />';
  } else {
    fallbackHtml = '<div class="car-thumb-fallback car-thumb-mono-mode"><span class="car-thumb-mono-letter">' + esc(mono) + '</span></div>';
  }
  imgEl.insertAdjacentHTML('afterend', fallbackHtml);
}

function renderCarThumb(car, size){
  // size : 'card' (cards Garage), 'hero' (en-tête fiche détail)
  size = size || 'card';
  const photo = getCarFirstPhoto(car);
  if(photo){
    // v6.13 : <img> avec lazy + skeleton + onerror → _thumbErrorFallback global
    const brand = (car && car.brand) || (car && car.mk) || '';
    const model = (car && car.model) || (car && car.mo) || '';
    const photoEsc = esc(photo);
    const brandEsc = esc(brand);
    const altText = esc(brand + ' ' + model);
    return '<div class="car-thumb car-thumb-' + esc(size) + ' car-thumb-with-photo">'
      + '<div class="car-thumb-skeleton"></div>'
      + '<img class="car-thumb-real-img" src="' + photoEsc + '" alt="' + altText + '" data-brand="' + brandEsc + '" loading="lazy" decoding="async"'
      + ' onload="this.classList.add(\'loaded\'); var sk=this.previousElementSibling; if(sk) sk.style.opacity=0;"'
      + ' onerror="_thumbErrorFallback(this);" />'
      + '</div>';
  }
  // Cascade : CDN officiel → SVG stylisé → monogramme
  const cdnUrl = getBrandLogoCdnUrl(car ? car.brand : '');
  const svgFallback = getBrandLogoSvg(car ? car.brand : '');
  const monoFallback = getBrandMonogram(car ? car.brand : '');
  // Construction du fallback (SVG si dispo, sinon monogramme)
  let fallbackHtml;
  if(svgFallback){
    fallbackHtml = `<div class="car-thumb-fallback car-thumb-svg-mode">${svgFallback}</div>`;
  } else {
    fallbackHtml = `<div class="car-thumb-fallback car-thumb-mono-mode"><span class="car-thumb-mono-letter">${esc(monoFallback)}</span></div>`;
  }
  // Si on a un domain → on tente le CDN officiel avec onerror fallback
  if(cdnUrl){
    return `
      <div class="car-thumb car-thumb-${size} car-thumb-brand-cdn">
        <img class="car-thumb-cdn-img"
             src="${cdnUrl}"
             alt="${esc(car && car.brand ? car.brand : 'logo')}"
             loading="lazy"
             onerror="this.style.display='none'; const fb = this.nextElementSibling; if(fb) fb.style.display='flex';" />
        <div class="car-thumb-cdn-fallback" style="display:none">${svgFallback || `<span class="car-thumb-mono-letter">${esc(monoFallback)}</span>`}</div>
      </div>
    `;
  }
  // Pas de domain → SVG stylé directement
  if(svgFallback){
    return `<div class="car-thumb car-thumb-${size} car-thumb-logo">${svgFallback}</div>`;
  }
  // Fallback ultime : monogramme
  return `<div class="car-thumb car-thumb-${size} car-thumb-mono"><span class="car-thumb-mono-letter">${esc(monoFallback)}</span></div>`;
}

// ─── Projection cote future (v5.30) ───────────────────────────────
function projectFutureValue(car, monthsAhead){
  if(!car || !car.year) return null;
  if(typeof estimateCoteRange !== 'function') return null;
  const yearsToAdd = monthsAhead / 12;
  // Calcule le year virtuel (même brand/model/km mais "plus vieux")
  const projectedYear = car.year - yearsToAdd; // older = older "year" in our model
  // En fait notre estimateCoteRange prend year, donc on simule en passant un year qui correspond à l'âge futur
  // Astuce : pour avoir l'âge futur (currentAge + yearsToAdd), on passe year = today - (currentAge + yearsToAdd)
  const currentAge = new Date().getFullYear() - car.year;
  const futureAge = currentAge + yearsToAdd;
  const fakeYear = new Date().getFullYear() - futureAge;
  // On utilise les options actuelles de la voiture
  const est = estimateCoteRange(
    car.brand, car.model, fakeYear, car.km || 0,
    car.finish || '', (car.tuner && car.tuner.name) || '',
    (car.tuner && car.tuner.categories) || [],
    car.serviceUpToDate, car.fullServiceHistory, car.hasLeather
  );
  if(!est) return null;
  const median = Math.round(est.low * 0.5 + est.high * 0.5);
  const currentCote = car.cote || median;
  const delta = median - currentCote;
  const deltaPct = currentCote > 0 ? Math.round((delta / currentCote) * 100) : 0;
  return {
    low: est.low,
    high: est.high,
    median: median,
    delta: delta,
    deltaPct: deltaPct,
    monthsAhead: monthsAhead
  };
}

function renderValuationProjection(car){
  if(!car || !car.year) return '';
  const horizons = [
    {months: 6, label: 'À 6 mois'},
    {months: 12, label: 'À 1 an'},
    {months: 36, label: 'À 3 ans'},
    {months: 120, label: 'À 10 ans'}
  ];
  const projections = horizons.map(h => ({...h, proj: projectFutureValue(car, h.months)})).filter(p => p.proj);
  if(projections.length === 0) return '';
  // Détecte le tournant (premier horizon où la cote remonte au-dessus du précédent)
  const tier = (typeof getCollectorTier === 'function') ? getCollectorTier(car.brand) : 'medium';
  const isCollectorTier = (tier === 'very-high' || tier === 'high');
  return `
    <div class="sheet-section-label">VALORISATION À VENIR</div>
    <div class="valuation-projection">
      ${projections.map(p => {
        const sign = p.proj.deltaPct > 0 ? '↗' : (p.proj.deltaPct < 0 ? '↘' : '→');
        const cls = p.proj.deltaPct > 5 ? 'up' : (p.proj.deltaPct < -5 ? 'down' : 'flat');
        const pctTxt = p.proj.deltaPct === 0 ? 'stable' : `${p.proj.deltaPct > 0 ? '+' : ''}${p.proj.deltaPct}%`;
        return `
          <div class="valuation-row">
            <span class="valuation-horizon">${esc(p.label)}</span>
            <span class="valuation-range">${esc(fmtPrice(p.proj.low))} \u2014 ${esc(fmtPrice(p.proj.high))}</span>
            <span class="valuation-delta ${cls}">${sign} ${esc(pctTxt)}</span>
          </div>
        `;
      }).join('')}
    </div>
    ${isCollectorTier ? `
      <div class="valuation-hint">
        <em>Les marques de cette gamme passent en phase collector vers 25-35 ans. La courbe remonte si l'auto est bien conservée.</em>
      </div>
    ` : `
      <div class="valuation-hint">
        <em>Les marques de cette gamme stabilisent leur cote autour de 20-30 ans. Une config rare ou un état exceptionnel change la donne.</em>
      </div>
    `}
  `;
}

function getCarAgePhase(car){
  if(!car || !car.year) return 'mature';
  const age = new Date().getFullYear() - car.year;
  if(age <= 5) return 'new';
  if(age <= 15) return 'mature';
  if(age <= 25) return 'bottom';
  if(age <= 35) return 'collector_entry';
  if(age <= 50) return 'vintage';
  return 'oldtimer';
}

function getAIAdviceForCar(car, profileIds){
  if(!car) return null;
  const profiles = Array.isArray(profileIds) ? profileIds : [];
  if(profiles.length === 0) return null;
  const phase = getCarAgePhase(car);
  // Récupère le conseil pour le PREMIER profile sélectionné (primary)
  const primary = profiles[0];
  const advice = PROFILE_ADVICE[primary];
  if(!advice) return null;
  return {
    profileLabel: advice.label,
    text: advice[phase] || advice['mature'] || ''
  };
}

function renderAIAdviceBlock(car){
  const profiles = State.userProfiles || [];
  if(profiles.length === 0){
    return `
      <div class="sheet-section-label">CONSEIL AI · CARNET</div>
      <div class="ai-advice-block ai-advice-empty">
        <em>Précise ton profil collectionneur pour recevoir un conseil personnalisé sur cette voiture.</em>
        <button class="ai-advice-cta" data-action="openSelectProfile">Définir mon profil</button>
      </div>
    `;
  }
  const advice = getAIAdviceForCar(car, profiles);
  if(!advice) return '';
  return `
    <div class="sheet-section-label">CONSEIL AI · CARNET</div>
    <div class="ai-advice-block">
      <div class="ai-advice-tag">Selon ton profil · ${esc(advice.profileLabel)}</div>
      <div class="ai-advice-text">${esc(advice.text)}</div>
    </div>
  `;
}

// ─── v6.15 : Ajout unifié au Garage (owned ou wishlist) ──────────────
function _addCarToGarage(source, ownership, originContext) {
  // source : peut être un match, auction, ou listing
  // ownership : 'owned' | 'wishlist'
  // originContext : 'match' | 'auction' | 'listing'
  const now = Date.now();
  let brand, model, year, paidPrice, cote, spec, src;

  if (originContext === 'match') {
    brand = extractBrandFromName ? extractBrandFromName(source.name) : (source.name || '').split(' ')[0];
    model = extractModelFromName ? extractModelFromName(source.name, brand) : (source.name || '').split(' ').slice(1).join(' ');
    year = source.year;
    paidPrice = source.price || 0;
    cote = source.price || 0;
    spec = `Détectée via CARNET${source.src ? ' \u00b7 ' + source.src : ''}`;
    src = source.src || '';
  } else if (originContext === 'auction') {
    brand = source.brand;
    model = source.model;
    year = source.year;
    paidPrice = source.bidCurrent || source.estimateLow || 0;
    cote = source.estimateHigh || source.bidCurrent || 0;
    spec = `Vue en enchère sur ${source.source || ''}`;
    src = source.source || '';
  } else if (originContext === 'listing') {
    brand = source.mk;
    model = source.mo;
    year = source.yr;
    paidPrice = source.px || 0;
    cote = source.px || 0;
    spec = `Annonce ${source.src || ''}${source.ch && Array.isArray(source.ch) ? ' \u00b7 ' + source.ch.slice(0, 2).join(' \u00b7 ') : ''}`;
    src = source.src || '';
  }

  const newCar = {
    id: 'g_' + now,
    brand: brand || '',
    model: model || '',
    year: year || null,
    km: 0,
    color: '',
    chassis: '',
    spec: spec || '',
    acquired: ownership === 'owned' ? 'aujourd\u2019hui' : '\u2014',
    acquiredAt: ownership === 'owned' ? now : null,
    paidPrice: paidPrice,
    cote: cote,
    trend: 'flat',
    trendLabel: 'cote initiale',
    lastService: '\u2014',
    nextServiceDue: '\u2014',
    docsCount: 0,
    photosCount: 0,
    location: '',
    services: [],
    photos: [],
    docs: [],
    ownership: ownership,
    addedFrom: originContext,
    addedAt: now,
    src: src
  };

  State.garage = State.garage || [];
  State.garage.push(newCar);
  safePersistGarage();
  if (typeof renderKpis === 'function') renderKpis();
  if (State.activeTab === 'garage' && typeof renderGaragePage === 'function') renderGaragePage();

  const label = `${newCar.brand} ${newCar.model}`.trim();
  const dest = ownership === 'wishlist' ? 'Wishlist' : 'Collection';
  showToastFloat(`« ${label} » ajoutée \u00e0 ta ${dest}.`);
}

function renderConfirmSheet(opts) {
  if (!opts) return '';
